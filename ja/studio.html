          </style><script type="application/ld+json">{"@context":"https://schema.org","@type":"CollectionPage","@id":"https://nguyenlephong.github.io/ja/studio#studio","name":"Studio — Engineering Flows, AI Notes & System Design","description":"A public working shelf for system design flows, release readiness, AI-assisted delivery, machine setup, daily learning checklists, and skill libraries.","url":"https://nguyenlephong.github.io/ja/studio","inLanguage":"ja","isPartOf":{"@type":"WebSite","@id":"https://nguyenlephong.github.io/#website"},"author":{"@type":"Person","@id":"https://nguyenlephong.github.io/#person"},"hasPart":[{"@type":"TechArticle","headline":"AI Operating System","description":"This note turns the AI stack into a daily operating system: NotebookLM keeps source-backed truth, GPT plans, Claude critiques, Codex ships code, Antigravity verifies prototypes, and every useful lesson becomes a reusable artifact.","url":"https://nguyenlephong.github.io/ja/studio#ai-operating-system","dateModified":"2026-06-21","keywords":"AI OS, NotebookLM, GPT, Claude, Codex, Antigravity, Daily learning"},{"@type":"TechArticle","headline":"AI-Driven Engineering Foundation","description":"This note keeps the long-term learning direction visible: AI can generate code quickly, but senior leverage comes from asking the right technical questions, choosing the right trade-offs, verifying failure modes, and owning production behavior.","url":"https://nguyenlephong.github.io/ja/studio#ai-driven-engineering-foundation","dateModified":"2026-06-21","keywords":"Engineering roadmap, Architecture, Data, Resilience, Observability, AI workflow"},{"@type":"TechArticle","headline":"AI-Driven System Engineering Roadmap","description":"This roadmap keeps the next learning layer visible: AI can write code faster, but a senior engineer must own architecture decisions, verify distributed failure modes, understand storage trade-offs, and use AI as a disciplined reviewer.","url":"https://nguyenlephong.github.io/ja/studio#ai-system-engineering-roadmap","dateModified":"2026-06-21","keywords":"AI up-skill, System engineering, SDLC, Distributed systems, Storage, AI workflow"},{"@type":"TechArticle","headline":"Antigravity Awesome Skills","description":"This is not a list of every installed skill. It is the install note I need when I move to a new machine: what to run, where the source lives, and what to ask an agent to restore.","url":"https://nguyenlephong.github.io/ja/studio#antigravity-awesome-skills","dateModified":"2026-06-20","keywords":"AI setup, Antigravity, Codex, Claude, Gemini, Skills"},{"@type":"TechArticle","headline":"Open Design","description":"Open Design can support this Studio direction as a design reference and future MCP integration. I do not have a callable Open Design tool in this session, but the project itself is worth keeping in the setup notes.","url":"https://nguyenlephong.github.io/ja/studio#open-design","dateModified":"2026-06-20","keywords":"Design, MCP, Codex, Claude, Gemini, Antigravity"},{"@type":"TechArticle","headline":"Computer setup","description":"This note is for the non-terminal part of a new engineering machine: folders, browsers, fonts, login flows, and basic safety rules.","url":"https://nguyenlephong.github.io/ja/studio#computer-baseline","dateModified":"2026-06-20","keywords":"Computer setup, macOS, Browser, Security"},{"@type":"TechArticle","headline":"Terminal setup","description":"This note keeps the command-line setup close to the actual work: Git, GitHub CLI, Node/Bun, Java/PlantUML, deployment commands, and AI CLI install commands.","url":"https://nguyenlephong.github.io/ja/studio#terminal-baseline","dateModified":"2026-06-20","keywords":"Terminal setup, Git, Node, Bun, PlantUML"},{"@type":"TechArticle","headline":"Multi-agent AI","description":"Future note for patterns where multiple agents help plan, code, review, test, or research without turning the workflow into noise.","url":"https://nguyenlephong.github.io/ja/studio#multi-agent-ai","dateModified":"2026-06-20","keywords":"AI learning, Multi-agent, Workflow"},{"@type":"TechArticle","headline":"OpenHands","description":"A placeholder note for OpenHands. The useful future version should include install commands, project fit, and where it overlaps with Codex or Claude.","url":"https://nguyenlephong.github.io/ja/studio#openhands","dateModified":"2026-06-20","keywords":"AI learning, OpenHands"},{"@type":"TechArticle","headline":"CrewAI","description":"A placeholder note for CrewAI. The future note should focus on when a crew abstraction helps more than a plain script or a single agent.","url":"https://nguyenlephong.github.io/ja/studio#crewai","dateModified":"2026-06-20","keywords":"AI learning, CrewAI, Agents"},{"@type":"HowTo","name":"System Design Interview Flow for Senior Software Engineers","description":"A practical system design flow for framing requirements, choosing boundaries, modeling data, handling scale, and explaining trade-offs clearly.","url":"https://nguyenlephong.github.io/ja/studio?route=flow-system-design&flow=system-design#flow-system-design","keywords":"System Design, Architecture, Trade-offs, Interview","step":[{"@type":"HowToStep","position":1,"name":"Frame the problem","text":"Restate users, jobs, constraints, and non-goals before naming any technology. A short problem frame and a list of assumptions to confirm."},{"@type":"HowToStep","position":2,"name":"Shape the interfaces","text":"Sketch APIs, events, user actions, and admin actions around the real workflow. API/event contract notes with the first boundary decisions."},{"@type":"HowToStep","position":3,"name":"Model the data","text":"Choose ownership, consistency rules, indexes, retention, and migration direction. Data model sketch plus consistency and migration notes."},{"@type":"HowToStep","position":4,"name":"Design the runtime","text":"Place services, queues, cache, workers, and gateways only where they solve a named pressure. Runtime architecture with the reason behind each moving part."},{"@type":"HowToStep","position":5,"name":"Stress the failure modes","text":"Walk through slow dependencies, duplicate requests, partial writes, bad deploys, and stale reads. Failure-mode table with mitigation and monitoring hooks."},{"@type":"HowToStep","position":6,"name":"Explain the evolution path","text":"Name the first practical version, the breaking points, and the next design when traffic or team size changes. Versioned roadmap: v1, scale trigger, and rejected alternatives."}]},{"@type":"HowTo","name":"Architecture Decision Flow with RFC and ADR Thinking","description":"A practical architecture decision flow for comparing options, scoring trade-offs, documenting risks, and aligning teams before implementation.","url":"https://nguyenlephong.github.io/ja/studio?route=flow-architecture-decision&flow=architecture-decision#flow-architecture-decision","keywords":"RFC, ADR, Architecture Review, Decision Matrix","step":[{"@type":"HowToStep","position":1,"name":"Name the decision","text":"Write the decision in one sentence and make the scope small enough to approve. Decision statement with scope and non-goals."},{"@type":"HowToStep","position":2,"name":"Extract invariants","text":"List what must remain true for users, money, permissions, data, audit, and support. Invariant list that every option must satisfy."},{"@type":"HowToStep","position":3,"name":"Compare real options","text":"Evaluate two or three practical options, not a perfect design against a strawman. Option table with honest trade-offs."},{"@type":"HowToStep","position":4,"name":"Set risk gates","text":"Define validation, telemetry, rollout, and rollback before implementation starts. Decision gates and launch conditions."},{"@type":"HowToStep","position":5,"name":"Write the decision","text":"Keep the final note short enough to read during review, but complete enough to survive handoff. ADR/RFC entry ready for review."}]},{"@type":"HowTo","name":"Production Incident Response Flow for Engineering Teams","description":"A production incident flow for triage, blast-radius control, rollback, communication, root cause analysis, and follow-up tracking.","url":"https://nguyenlephong.github.io/ja/studio?route=flow-incident-response&flow=incident-response#flow-incident-response","keywords":"Incident, SRE, Rollback, Postmortem","step":[{"@type":"HowToStep","position":1,"name":"Confirm the signal","text":"Separate a real user-impacting incident from a noisy metric or isolated dependency blip. Incident status, severity, and initial owner."},{"@type":"HowToStep","position":2,"name":"Contain blast radius","text":"Protect users first with flags, rate limits, rollback, traffic shift, or temporary disablement. Mitigation action with expected user impact."},{"@type":"HowToStep","position":3,"name":"Coordinate the room","text":"Assign incident lead, comms, investigation, and verification so the team does not duplicate effort. Shared incident timeline and communication cadence."},{"@type":"HowToStep","position":4,"name":"Verify recovery","text":"Do not close the incident just because one graph improves; check the user path and downstream queues. Recovery confirmation and watch window."},{"@type":"HowToStep","position":5,"name":"Write the follow-up","text":"Turn the incident into prevention work without blaming the person who touched the deploy. Postmortem, action items, owners, and due dates."}]},{"@type":"HowTo","name":"Release Readiness Flow for Safe Software Rollouts","description":"A release readiness flow for validating tests, analytics, migration safety, observability, communication, rollout gates, and rollback plans.","url":"https://nguyenlephong.github.io/ja/studio?route=flow-release-readiness&flow=release-readiness#flow-release-readiness","keywords":"Release, Rollout, QA, Observability","step":[{"@type":"HowToStep","position":1,"name":"Confirm scope","text":"Match the release to the ticket, acceptance criteria, non-goals, and user-facing behavior. Release scope and explicit non-goals."},{"@type":"HowToStep","position":2,"name":"Verify behavior","text":"Run the checks that match the risk: unit, integration, E2E, accessibility, typecheck, and manual smoke. Verification note with remaining risk."},{"@type":"HowToStep","position":3,"name":"Check data and migrations","text":"Review schema changes, backfills, indexes, caches, analytics events, and SEO paths. Data and tracking readiness checklist."},{"@type":"HowToStep","position":4,"name":"Prepare observability","text":"Make sure the release can be watched after deploy with actionable signals, not vanity graphs. Watch plan and escalation path."},{"@type":"HowToStep","position":5,"name":"Make the rollout decision","text":"Choose gradual rollout, immediate release, hold, or rollback based on evidence. Go/hold decision with rollback trigger."}]},{"@type":"HowTo","name":"AI-Assisted Software Delivery Flow with Human Review","description":"An AI-assisted delivery flow for scoping tasks, packaging context, applying changes, verifying behavior, and handing off review-ready work.","url":"https://nguyenlephong.github.io/ja/studio?route=flow-ai-delivery&flow=ai-delivery#flow-ai-delivery","keywords":"AI Delivery, Agents, Code Review, Verification","step":[{"@type":"HowToStep","position":1,"name":"Scope the task","text":"Translate the request into acceptance criteria, affected surfaces, non-goals, and privacy boundaries. Task brief with clear boundaries."},{"@type":"HowToStep","position":2,"name":"Package context","text":"Give the agent the files, examples, conventions, tests, and warnings that matter. Context pack and implementation hints."},{"@type":"HowToStep","position":3,"name":"Execute in small slices","text":"Keep edits narrow, use existing abstractions, and verify each risky boundary before moving on. Focused implementation diff."},{"@type":"HowToStep","position":4,"name":"Verify and review","text":"Run tests, inspect the diff, check copy quality, analytics wiring, and security/privacy implications. Verification summary and review notes."},{"@type":"HowToStep","position":5,"name":"Handoff cleanly","text":"Prepare commit, PR, release notes, or deployment only when the human request allows it. Commit/PR/deploy-ready handoff."}]},{"@type":"HowTo","name":"Engineering Portfolio Story Flow for CV and Interview Proof","description":"A portfolio story flow for turning engineering work into clear context, actions, trade-offs, impact, evidence, and next-step learning.","url":"https://nguyenlephong.github.io/ja/studio?route=flow-portfolio-story&flow=portfolio-story#flow-portfolio-story","keywords":"CV, Portfolio, Writing, Career","step":[{"@type":"HowToStep","position":1,"name":"Capture context","text":"Name the team situation, user pain, constraints, and why the work mattered at that moment. Context paragraph that feels specific, not inflated."},{"@type":"HowToStep","position":2,"name":"Show the actions","text":"Describe what you changed, decided, coordinated, or simplified in plain engineering language. Action list with technical and collaboration detail."},{"@type":"HowToStep","position":3,"name":"Name the trade-offs","text":"Explain the constraint that made the work interesting: time, reliability, UX, cost, privacy, or team capacity. Trade-off note that shows judgment."},{"@type":"HowToStep","position":4,"name":"Prove the impact","text":"Use numbers when available, but also capture reduced risk, cleaner handoff, better reliability, or faster support. Impact statement with evidence and caveat."},{"@type":"HowToStep","position":5,"name":"Shape the story","text":"Turn the raw material into the right format for CV, interview, blog, or portfolio page. CV bullet, STAR answer, blog outline, or case-study draft."}]},{"@type":"HowTo","name":"React Flow Example for Software Diagrams","description":"A React Flow studio demo with built-in node styles, custom architecture shapes, grouping, layout, validation, whiteboard annotation, edge types, labels, markers, minimap, controls, and background.","url":"https://nguyenlephong.github.io/ja/studio?route=flow-react-flow-architecture-demo&flow=react-flow-architecture-demo#flow-react-flow-architecture-demo","keywords":"React Flow, XYFlow, Architecture Diagram, Node Shapes, Edge Types","step":[{"@type":"HowToStep","position":1,"name":"Show node primitives","text":"Render input, default, output, and group-style nodes before adding custom architecture vocabulary. A baseline canvas that shows the primitives React Flow starts from."},{"@type":"HowToStep","position":2,"name":"Add architecture shapes","text":"Use custom nodes for API gateways, services, workers, databases, cache, queues, topics, external systems, decisions, risks, and notes. A reusable shape catalog for system diagrams."},{"@type":"HowToStep","position":3,"name":"Compare edge types","text":"Show default, straight, step, smoothstep, and simplebezier edges with labels, arrows, and animated async paths. An edge language that makes architecture diagrams easier to read."},{"@type":"HowToStep","position":4,"name":"Use canvas controls","text":"Keep Background, Controls, MiniMap, fitView, zoom, and pan available so large architecture maps remain inspectable. A diagram surface that works for both overview and inspection."},{"@type":"HowToStep","position":5,"name":"Model system architecture","text":"Place client, edge, domain, data, external, and operations zones in one architecture story. A checkout-style reference architecture that demonstrates the full shape set."},{"@type":"HowToStep","position":6,"name":"Turn demo into a template","text":"Use the demo as a starting point for architecture review, RFC, ADR, onboarding, or incident explanation. A React Flow architecture template ready to adapt."}]},{"@type":"HowTo","name":"React Flow System Design Blueprint Example","description":"A large React Flow system design blueprint with grouped architecture zones, custom nodes, labeled edges, animated async paths, minimap, controls, and focused diagram views.","url":"https://nguyenlephong.github.io/ja/studio?route=flow-react-flow-system-blueprint&flow=react-flow-system-blueprint#flow-react-flow-system-blueprint","keywords":"React Flow, System Design, Blueprint, Distributed Systems, Media Pipeline","step":[{"@type":"HowToStep","position":1,"name":"Map edge entry","text":"Show how the domain lookup, resolver, CDN, request metadata, security policy, and API gateway connect before traffic reaches services. A visible ingress path that makes the request journey clear."},{"@type":"HowToStep","position":2,"name":"Show runtime topology","text":"Separate load balancing, frontend servers, backend services, message dispatch, and connection ownership. A runtime zone that explains where live traffic is accepted, routed, and dispatched."},{"@type":"HowToStep","position":3,"name":"Surface coordination","text":"Make distributed IDs, locks, concurrency choices, and metadata tables first-class parts of the diagram. A coordination layer that shows how writes and streaming chunks stay stable."},{"@type":"HowToStep","position":4,"name":"Trace storage and media","text":"Connect primary databases, shards, replicas, cache, object storage, queue, processing workers, and encoded output. A data and media pipeline that can be inspected without leaving the canvas."},{"@type":"HowToStep","position":5,"name":"Fan out downstream","text":"Show downstream consumers such as notification, recommendations, logging, search, analytics, and payment charge. A fan-out zone that makes secondary effects visible instead of hiding them behind one box."}]}]}</script><div aria-label="Studio Admin dashboard" data-studio-shadow-host="" style="display:block;min-height:100vh"></div></main><!--$--><!--/$--><footer class="app-footer"><div class="app-footer-inner"><div class="footer-meta"><p class="footer-name">Nguyen Le Phong</p><p class="footer-tag">シニアソフトウェアエンジニア · テックリード</p></div><div class="footer-center"><ul class="f ",\"keywords\":\"Design, MCP, Codex, Claude, Gemini, Antigravity\"},{\"@type\":\"TechArticle\",\"headline\":\"Computer setup\",\"description\":\"This note is for the non-terminal part of a new engineering machine: folders, browsers, fonts, login flows, and basic safety rules.\",\"url\":\"https://nguyenlephong.github.io/ja/studio#computer-baseline\",\"dateModified\":\"2026-06-20\",\"keywords\":\"Computer setup, macOS, Browser, Security\"},{\"@type\":\"TechArticle\",\"headline\":\"Terminal setup\",\"description\":\"This note keeps the command-line setup close to the actual work: Git, GitHub CLI, Node/Bun, Java/PlantUML, deployment commands, and AI CLI install commands.\",\"url\":\"https://nguyenlephong.github.io/ja/studio#terminal-baseline\",\"dateModified\":\"2026-06-20\",\"keywords\":\"Terminal setup, Git, Node, Bun, PlantUML\"},{\"@type\":\"TechArticle\",\"headline\":\"Multi-agent AI\",\"description\":\"Future note for patterns where multiple agents help plan, code, review, test, or research without turning the workflow into noise.\",\"url\":\"https://nguyenlephong.github.io/ja/studio#multi-agent-ai\",\"dateModified\":\"2026-06-20\",\"keywords\":\"AI learning, Multi-agent, Workflow\"},{\"@type\":\"TechArticle\",\"headline\":\"OpenHands\",\"description\":\"A placeholder note for OpenHands. The useful future version should include install commands, project fit, and where it overlaps with Codex or Claude.\",\"url\":\"https://nguyenlephong.github.io/ja/studio#openhands\",\"dateModified\":\"2026-06-20\",\"keywords\":\"AI learning, OpenHands\"},{\"@type\":\"TechArticle\",\"headline\":\"CrewAI\",\"description\":\"A placeholder note for CrewAI. The future note should focus on when a crew abstraction helps more than a plain script or a single agent.\",\"url\":\"https://nguyenlephong.github.io/ja/studio#crewai\",\"dateModified\":\"2026-06-20\",\"keywords\":\"AI learning, CrewAI, Agents\"},{\"@type\":\"HowTo\",\"name\":\"System Design Interview Flow for Senior Software Engineers\",\"description\":\"A practical system design flow for framing requirements, choosing boundaries, modeling data, handling scale, and explaining trade-offs clearly.\",\"url\":\"https://nguyenlephong.github.io/ja/studio?route=flow-system-design\u0026flow=system-design#flow-system-design\",\"keywords\":\"System Design, Architecture, Trade-offs, Interview\",\"step\":[{\"@type\":\"HowToStep\",\"position\":1,\"name\":\"Frame the problem\",\"text\":\"Restate users, jobs, constraints, and non-goals before naming any technology. A short problem frame and a list of assumptions to confirm.\"},{\"@type\":\"HowToStep\",\"position\":2,\"name\":\"Shape the interfaces\",\"text\":\"Sketch APIs, events, user actions, and admin actions around the real workflow. API/event contract notes with the first boundary decisions.\"},{\"@type\":\"HowToStep\",\"position\":3,\"name\":\"Model the data\",\"text\":\"Choose ownership, consistency rules, indexes, retention, and migration direction. Data model sketch plus consistency and migration notes.\"},{\"@type\":\"HowToStep\",\"position\":4,\"name\":\"Design the runtime\",\"text\":\"Place services, queues, cache, workers, and gateways only where they solve a named pressure. Runtime architecture with the reason behind each moving part.\"},{\"@type\":\"HowToStep\",\"position\":5,\"name\":\"Stress the failure modes\",\"text\":\"Walk through slow dependencies, duplicate requests, partial writes, bad deploys, and stale reads. Failure-mode table with mitigation and monitoring hooks.\"},{\"@type\":\"HowToStep\",\"position\":6,\"name\":\"Explain the evolution path\",\"text\":\"Name the first practical version, the breaking points, and the next design when traffic or team size changes. Versioned roadmap: v1, scale trigger, and rejected alternatives.\"}]},{\"@type\":\"HowTo\",\"name\":\"Architecture Decision Flow with RFC and ADR Thinking\",\"description\":\"A practical architecture decision flow for comparing options, scoring trade-offs, documenting risks, and aligning teams before implementation.\",\"url\":\"https://nguyenlephong.github.io/ja/studio?route=flow-architecture-decision\u0026flow=architecture-decision#flow-architecture-decision\",\"keywords\":\"RFC, ADR, Architecture Review, Decision Matrix\",\"step\":[{\"@type\":\"HowToStep\",\"position\":1,\"name\":\"Name the decision\",\"text\":\"Write the decision in one sentence and make the scope small enough to approve. Decision statement with scope and non-goals.\"},{\"@type\":\"HowToStep\",\"position\":2,\"name\":\"Extract invariants\",\"text\":\"List what must remain true for users, money, permissions, data, audit, and support. Invariant list that every option must satisfy.\"},{\"@type\":\"HowToStep\",\"position\":3,\"name\":\"Compare real options\",\"text\":\"Evaluate two or three practical options, not a perfect design against a strawman. Option table with honest trade-offs.\"},{\"@type\":\"HowToStep\",\"position\":4,\"name\":\"Set risk gates\",\"text\":\"Define validation, telemetry, rollout, and rollback before implementation starts. Decision gates and launch conditions.\"},{\"@type\":\"HowToStep\",\"position\":5,\"name\":\"Write the decision\",\"text\":\"Keep the final note short enough to read during review, but complete enough to survive handoff. ADR/RFC entry ready for review.\"}]},{\"@type\":\"HowTo\",\"name\":\"Production Incident Response Flow for Engineering Teams\",\"description\":\"A production incident flow for triage, blast-radius control, rollback, communication, root cause analysis, and follow-up tracking.\",\"url\":\"https://nguyenlephong.github.io/ja/studio?route=flow-incident-response\u0026flow=incident-response#flow-incident-response\",\"keywords\":\"Incident, SRE, Rollback, Postmortem\",\"step\":[{\"@type\":\"HowToStep\",\"position\":1,\"name\":\"Confirm the signal\",\"text\":\"Separate a real user-impacting incident from a noisy metric or isolated dependency blip. Incident status, severity, and initial owner.\"},{\"@type\":\"HowToStep\",\"position\":2,\"name\":\"Contain blast radius\",\"text\":\"Protect users first with flags, rate limits, rollback, traffic shift, or temporary disablement. Mitigation action with expected user impact.\"},{\"@type\":\"HowToStep\",\"position\":3,\"name\":\"Coordinate the room\",\"text\":\"Assign incident lead, comms, investigation, and verification so the team does not duplicate effort. Shared incident timeline and communication cadence.\"},{\"@type\":\"HowToStep\",\"position\":4,\"name\":\"Verify recovery\",\"text\":\"Do not close the incident just because one graph improves; check the user path and downstream queues. Recovery confirmation and watch window.\"},{\"@type\":\"HowToStep\",\"position\":5,\"name\":\"Write the follow-up\",\"text\":\"Turn the incident into prevention work without blaming the person who touched the deploy. Postmortem, action items, owners, and due dates.\"}]},{\"@type\":\"HowTo\",\"name\":\"Release Readiness Flow for Safe Software Rollouts\",\"description\":\"A release readiness flow for validating tests, analytics, migration safety, observability, communication, rollout gates, and rollback plans.\",\"url\":\"https://nguyenlephong.github.io/ja/studio?route=flow-release-readiness\u0026flow=release-readiness#flow-release-readiness\",\"keywords\":\"Release, Rollout, QA, Observability\",\"step\":[{\"@type\":\"HowToStep\",\"position\":1,\"name\":\"Confirm scope\",\"text\":\"Match the release to the ticket, acceptance criteria, non-goals, and user-facing behavior. Release scope and explicit non-goals.\"},{\"@type\":\"HowToStep\",\"position\":2,\"name\":\"Verify behavior\",\"text\":\"Run the checks that match the risk: unit, integration, E2E, accessibility, typecheck, and manual smoke. Verification note with remaining risk.\"},{\"@type\":\"HowToStep\",\"position\":3,\"name\":\"Check data and migrations\",\"text\":\"Review schema changes, backfills, indexes, caches, analytics events, and SEO paths. Data and tracking readiness checklist.\"},{\"@type\":\"HowToStep\",\"position\":4,\"name\":\"Prepare observability\",\"text\":\"Make sure the release can be watched after deploy with actionable signals, not vanity graphs. Watch plan and escalation path.\"},{\"@type\":\"HowToStep\",\"position\":5,\"name\":\"Make the rollout decision\",\"text\":\"Choose gradual rollout, immediate release, hold, or rollback based on evidence. Go/hold decision with rollback trigger.\"}]},{\"@type\":\"HowTo\",\"name\":\"AI-Assisted Software Delivery Flow with Human Review\",\"description\":\"An AI-assisted delivery flow for scoping tasks, packaging context, applying changes, verifying behavior, and handing off review-ready work.\",\"url\":\"https://nguyenlephong.github.io/ja/studio?route=flow-ai-delivery\u0026flow=ai-delivery#flow-ai-delivery\",\"keywords\":\"AI Delivery, Agents, Code Review, Verification\",\"step\":[{\"@type\":\"HowToStep\",\"position\":1,\"name\":\"Scope the task\",\"text\":\"Translate the request into acceptance criteria, affected surfaces, non-goals, and privacy boundaries. Task brief with clear boundaries.\"},{\"@type\":\"HowToStep\",\"position\":2,\"name\":\"Package context\",\"text\":\"Give the agent the files, examples, conventions, tests, and warnings that matter. Context pack and implementation hints.\"},{\"@type\":\"HowToStep\",\"position\":3,\"name\":\"Execute in small slices\",\"text\":\"Keep edits narrow, use existing abstractions, and verify each risky boundary before moving on. Focused implementation diff.\"},{\"@type\":\"HowToStep\",\"position\":4,\"name\":\"Verify and review\",\"text\":\"Run tests, inspect the diff, check copy quality, analytics wiring, and security/privacy implications. Verification summary and review notes.\"},{\"@type\":\"HowToStep\",\"position\":5,\"name\":\"Handoff cleanly\",\"text\":\"Prepare commit, PR, release notes, or deployment only when the human request allows it. Commit/PR/deploy-ready handoff.\"}]},{\"@type\":\"HowTo\",\"name\":\"Engineering Portfolio Story Flow for CV and Interview Proof\",\"description\":\"A portfolio story flow for turning engineering work into clear context, actions, trade-offs, impact, evidence, and next-step learning.\",\"url\":\"https://nguyenlephong.github.io/ja/studio?route=flow-portfolio-story\u0026flow=portfolio-story#flow-portfolio-story\",\"keywords\":\"CV, Portfolio, Writing, Career\",\"step\":[{\"@type\":\"HowToStep\",\"position\":1,\"name\":\"Capture context\",\"text\":\"Name the team situation, user pain, constraints, and why the work mattered at that moment. Context paragraph that feels specific, not inflated.\"},{\"@type\":\"HowToStep\",\"position\":2,\"name\":\"Show the actions\",\"text\":\"Describe what you changed, decided, coordinated, or simplified in plain engineering language. Action list with technical and collaboration detail.\"},{\"@type\":\"HowToStep\",\"position\":3,\"name\":\"Name the trade-offs\",\"text\":\"Explain the constraint that made the work interesting: time, reliability, UX, cost, privacy, or team capacity. Trade-off note that shows judgment.\"},{\"@type\":\"HowToStep\",\"position\":4,\"name\":\"Prove the impact\",\"text\":\"Use numbers when available, but also capture reduced risk, cleaner handoff, better reliability, or faster support. Impact statement with evidence and caveat.\"},{\"@type\":\"HowToStep\",\"position\":5,\"name\":\"Shape the story\",\"text\":\"Turn the raw material into the right format for CV, interview, blog, or portfolio page. CV bullet, STAR answer, blog outline, or case-study draft.\"}]},{\"@type\":\"HowTo\",\"name\":\"React Flow Example for Software Diagrams\",\"description\":\"A React Flow studio demo with built-in node styles, custom architecture shapes, grouping, layout, validation, whiteboard annotation, edge types, labels, markers, minimap, controls, and background.\",\"url\":\"https://nguyenlephong.github.io/ja/studio?route=flow-react-flow-architecture-demo\u0026flow=react-flow-architecture-demo#flow-react-flow-architecture-demo\",\"keywords\":\"React Flow, XYFlow, Architecture Diagram, Node Shapes, Edge Types\",\"step\":[{\"@type\":\"HowToStep\",\"position\":1,\"name\":\"Show node primitives\",\"text\":\"Render input, default, output, and group-style nodes before adding custom architecture vocabulary. A baseline canvas that shows the primitives React Flow starts from.\"},{\"@type\":\"HowToStep\",\"position\":2,\"name\":\"Add architecture shapes\",\"text\":\"Use custom nodes for API gateways, services, workers, databases, cache, queues, topics, external systems, decisions, risks, and notes. A reusable shape catalog for system diagrams.\"},{\"@type\":\"HowToStep\",\"position\":3,\"name\":\"Compare edge types\",\"text\":\"Show default, straight, step, smoothstep, and simplebezier edges with labels, arrows, and animated async paths. An edge language that makes architecture diagrams easier to read.\"},{\"@type\":\"HowToStep\",\"position\":4,\"name\":\"Use canvas controls\",\"text\":\"Keep Background, Controls, MiniMap, fitView, zoom, and pan available so large architecture maps remain inspectable. A diagram surface that works for both overview and inspection.\"},{\"@type\":\"HowToStep\",\"position\":5,\"name\":\"Model system architecture\",\"text\":\"Place client, edge, domain, data, external, and operations zones in one architecture story. A checkout-style reference architecture that demonstrates the full shape set.\"},{\"@type\":\"HowToStep\",\"position\":6,\"name\":\"Turn demo into a template\",\"text\":\"Use the demo as a starting point for architecture review, RFC, ADR, onboarding, or incident explanation. A React Flow architecture template ready to adapt.\"}]},{\"@type\":\"HowTo\",\"name\":\"React Flow System Design Blueprint Example\",\"description\":\"A large React Flow system design blueprint with grouped architecture zones, custom nodes, labeled edges, animated async paths, minimap, controls, and focused diagram views.\",\"url\":\"https://nguyenlephong.github.io/ja/studio?route=flow-react-flow-system-blueprint\u0026flow=react-flow-system-blueprint#flow-react-flow-system-blueprint\",\"keywords\":\"React Flow, System Design, Blueprint, Distributed Systems, Media Pipeline\",\"step\":[{\"@type\":\"HowToStep\",\"position\":1,\"name\":\"Map edge entry\",\"text\":\"Show how the domain lookup, resolver, CDN, request metadata, security policy, and API gateway connect before traffic reaches services. A visible ingress path that makes the request journey clear.\"},{\"@type\":\"HowToStep\",\"position\":2,\"name\":\"Show runtime topology\",\"text\":\"Separate load balancing, frontend servers, backend services, message dispatch, and connection ownership. A runtime zone that explains where live traffic is accepted, routed, and dispatched.\"},{\"@type\":\"HowToStep\",\"position\":3,\"name\":\"Surface coordination\",\"text\":\"Make distributed IDs, locks, concurrency choices, and metadata tables first-class parts of the diagram. A coordination layer that shows how writes and streaming chunks stay stable.\"},{\"@type\":\"HowToStep\",\"position\":4,\"name\":\"Trace storage and media\",\"text\":\"Connect primary databases, shards, replicas, cache, object storage, queue, processing workers, and encoded output. A data and media pipeline that can be inspected without leaving the canvas.\"},{\"@type\":\"HowToStep\",\"position\":5,\"name\":\"Fan out downstream\",\"text\":\"Show downstream consumers such as notification, recommendations, logging, search, analytics, and payment charge. A fan-out zone that makes secondary effects visible instead of hiding them behind one box.\"}]}]}"])</script><script>self.__next_f.push([1,"5:[\"$\",\"main\",null,{\"className\":\"studio-route-shell\",\"children\":[[\"$\",\"style\",null,{\"dangerouslySetInnerHTML\":{\"__html\":\"$e\"}}],[\"$\",\"script\",null,{\"type\":\"application/ld+json\",\"dangerouslySetInnerHTML\":{\"__html\":\"$f\"}}],\"$L10\",\"$L11\"]}]\n"])</script><script>self.__next_f.push([1,"12:I[48677,[\"/_next/static/chunks/3eb5526bf0072 sume\":\"履歴書\",\"font\":{\"label\":\"本文フォント\",\"sans\":\"サンセリフ\",\"serif\":\"セリフ\"},\"background\":{\"label\":\"読書背景\",\"plain\":\"標準\",\"parchment\":\"古紙\",\"linen\":\"リネン\",\"sepia\":\"セピア\",\"sage\":\"セージ\",\"mist\":\"ミスト\",\"night\":\"ナイト\"}},\"Footer\":{\"tag\":\"シニアソフトウェアエンジニア · テックリード\",\"copy\":\"© {year} Nguyen Le Phong.\",\"language\":\"言語\"},\"Hero\":{\"eyebrow\":\"シニア / リードのポジションを募集中\",\"role\":\"シニアソフトウェアエンジニア · テックリード\",\"roleSub\":\"フルスタック · プラットフォームエンジニアリング · デリバリーリード\",\"bio\":\"フロントエンドアプリ、バックエンドサービス、CI/CD パイプライン、リリースワークフロー、本番インフラまでエンドツーエンドでシステムを設計・運用しています。現在は 11 名のチームを率い、マルチテナントプラットフォーム、セキュアな金融連携、マイクロフロントエンドアーキテクチャを構築しています。\",\"location\":\"ベトナム・ホーチミン市\",\"downloadResume\":\"履歴書ダウンロード\",\"getInTouch\":\"お問い合わせ\",\"careerHighlights\":\"キャリアハイライト\",\"socialProfiles\":\"ソーシャルプロフィール\",\"proof\":{\"scale\":\"Zalo とプラットフォーム製品で 80M+ ユーザーに到達\",\"team\":\"開発と QC を含む 11 名のデリバリーチームをリード\",\"platform\":\"30+ テナント向けの安全な連携付き rollout platform\"},\"stats\":{\"yearsShipping\":\"出荷年数\",\"yearsShippingCaption\":\"毎日プロダクションコードを\",\"hoursCoding\":\"コーディング時間\",\"hoursCodingCaption\":\"2021 年以降 WakaTime で計測\",\"usersTouched\":\"関わったユーザー数\",\"usersTouchedCaption\":\"Zalo · CDP · 金融規模\",\"engineersLed\":\"率いたエンジニア\",\"engineersLedCaption\":\"開発 · QC · クロスファンクショナル\",\"tenantsPowered\":\"稼働中のテナント\",\"tenantsPoweredCaption\":\"マルチテナント・フィーチャーフラグ\",\"domainsDelivered\":\"対応ドメイン\",\"domainsDeliveredCaption\":\"フィンテック · CDP · 不動産 · 教育\",\"projectsLaunched\":\"ローンチ済みプロジェクト\",\"projectsLaunchedCaption\":\"SDK · プラットフォーム · モバイル\",\"testCasesAuthored\":\"作成したテストケース\",\"testCasesAuthoredCaption\":\"BDD · E2E · 回帰防止\"}},\"Sections\":{\"aboutEyebrow\":\"プロフィール\",\"aboutTitle\":\"私自身と仕事の進め方について\",\"experienceEyebrow\":\"キャリア\",\"experienceTitle\":\"これまでの出荷先\",\"projectsEyebrow\":\"ワーク\",\"projectsTitle\":\"主要プロジェクト\"},\"Summary\":{\"intro1\":\"情報技術学士(ソフトウェア工学副専攻、\u003cb\u003eGPA 3.36\u003c/b\u003e)を取得し、約 \u003cb\u003e8 年間\u003c/b\u003eのフルスタックソフトウェア開発経験を持ち、そのうち \u003cb\u003e3 年以上\u003c/b\u003eは技術リード、アーキテクチャ意思決定、チーム横断のデリバリー調整に従事しています。\",\"intro2\":\"フロントエンドアプリやバックエンドサービスから CI/CD パイプライン、リリースワークフロー、本番インフラまで、エンドツーエンドでシステムを設計・構築・運用してきました。自動化、運用の明確化、信頼性のあるデリバリーを重視しています。\",\"intro3\":\"\u003ci\u003e近年フォーカスしているハードスキルは以下のとおりです:\u003c/i\u003e\",\"visionEyebrow\":\"私の働き方\",\"hardSkillsEyebrow\":\"ハードスキル\",\"pillars\":{\"endToEnd\":{\"title\":\"エンドツーエンドエンジニア\",\"body\":\"フロントエンド、バックエンド、CI/CD、リリース、本番インフラまで全ライフサイクルを 1 人で担当。\",\"chip\":\"FE · BE · インフラ\"},\"multiTenant\":{\"title\":\"マルチテナント基盤\",\"body\":\"フィーチャーフラグ、RBAC、パーセンテージ/セグメントロールアウト、JSON 設定値、ステートレス実行時評価。\",\"chip\":\"30+ テナント稼働中\"},\"leadership\":{\"title\":\"デリバリーリード\",\"body\":\"11 名以上のエンジニアを率いる — 採用、組織設計、RFC、Runbook、ロールアウト手順、1:1 コーチング。\",\"chip\":\"11 名チーム\"},\"fintech\":{\"title\":\"セキュアな金融連携\",\"body\":\"RSA-4096 ハンドシェイク、AES-256 ペイロード、mTLS、証明書ピンニング、冪等契約、リトライキュー。\",\"chip\":\"Gtel · Napas\"},\"mfe\":{\"title\":\"マイクロフロントエンドと SDK\",\"body\":\"Angular ホスト + React モジュールで独立デプロイ。JS SDK は \u003c200KB、\u003c150ms。\",\"chip\":\"MFE · \u003c150ms\"},\"ai\":{\"title\":\"AI ファーストなエンジニアリング\",\"body\":\"コードレビュー、デプロイ支援、サービスクォータ、API ヘルス、リリース分析向けの AI エージェントを構築。\",\"chip\":\"本番稼働中\"}},\"skills\":{\"backend\":\"\u003cb\u003eバックエンド\u003c/b\u003e:\u003cb\u003eNode.js\u003c/b\u003e、\u003cb\u003eJava (Spring)\u003c/b\u003e に深い実務経験。REST/GraphQL API を明確な契約、認証・暗号化機構、後方互換性、エンタープライズおよびサードパーティ連携の堅牢性を持って設計。\",\"frontend\":\"\u003cb\u003eフロントエンド\u003c/b\u003e:\u003cb\u003eReact\u003c/b\u003e(TypeScript、Next.js)、\u003cb\u003eReact Native\u003c/b\u003e、Angular ベースのマイクロフロントエンドホストを使った複雑なクライアントアプリの構築・保守経験。パフォーマンス最適化、状態管理、スケール可能な UI 設計を実践。\",\"databases\":\"\u003cb\u003eデータベース\u003c/b\u003e:\u003cb\u003eMySQL\u003c/b\u003e に深い実務経験。スキーマ/データモデル設計、インデックス戦略、クエリ最適化、トランザクション境界、マイグレーション計画、分散・高スループット環境での整合性のトレードオフに精通。\",\"infra\":\"\u003cb\u003eインフラ \u0026 プラットフォームエンジニアリング\u003c/b\u003e:\u003cb\u003eDocker\u003c/b\u003e と \u003cb\u003eKubernetes\u003c/b\u003e を複数環境で実運用。\u003cb\u003eAKS\u003c/b\u003e、\u003cb\u003eEKS\u003c/b\u003e、\u003cb\u003eFKE\u003c/b\u003e、\u003cb\u003eK3S\u003c/b\u003e のマネージドクラスタ、\u003cb\u003eArgoCD\u003c/b\u003e による GitOps デプロイ、CI/CD パイプライン、環境設定、ドメイン/SSL 管理を経験。\",\"architecture\":\"\u003cb\u003eアーキテクチャ \u0026 デリバリー\u003c/b\u003e:マイクロフロントエンドおよびマルチテナントアーキテクチャ、フィーチャーフラグ駆動のロールアウト、プログレッシブデリバリー、可観測性を活用し、安全なリリースと本番診断を支援。\",\"testing\":\"\u003cb\u003eテスト\u003c/b\u003e:Jest、Cucumber、Puppeteer、Testing Library を実務で活用し、回帰の安全性、リリースの信頼性、本番準備状況を担保。\",\"libraries\":\"\u003cb\u003eライブラリ\u003c/b\u003e:\u003cb\u003eFirebase\u003c/b\u003e、Strapi、Directus、React Flow、Webpack、\u003cb\u003eRedux\u003c/b\u003e、React Query、G2plot に習熟。\",\"other\":\"\u003cb\u003eその他\u003c/b\u003e:\u003cb\u003eマイクロフロントエンド\u003c/b\u003eアーキテクチャ、レスポンシブデザイン、クロスブラウザ対応、\u003cb\u003eSEO\u003c/b\u003e、GraphQL、Electron に精通。\"}},\"Experience\":{\"labels\":{\"location\":\"勤務地\",\"duration\":\"期間\",\"keyContributions\":\"主な貢献\",\"keyTechnologies\":\"主な技術\"},\"ndsvn\":{\"summary\":\"CTO 交代後にプロダクトデリバリーと技術方針を引き受け、アーキテクチャ決定、ロールアウトシステム、エンタープライズ連携、チーム横断の調整を主導。8 名の開発者(うち 4 名がシニア)と 3 名の QC エンジニアからなるデリバリーチームを管理。\",\"contributions\":[\".NET Core 製のマルチテナント・フィーチャーフラグシステム \u003cb\u003e(30+ テナント、約 40k ユーザー)\u003c/b\u003e を設計。優先度ルールエンジン、パーセンテージロールアウト(テナント/セグメント/環境)、JSON 設定値、ステートレス実行時評価を備え、モバイル/Web アプリを駆動し、高トラフィックテナントでの制御されたプログレッシブリリースを実現。\",\"\u003cb\u003eGtel と Napas\u003c/b\u003e とのセキュア連携を構築:RSA-4096 ハンドシェイク、AES-256 ペイロード暗号化、\u003cb\u003emTLS\u003c/b\u003e 相互認証、証明書ピンニング、リトライキュー、冪等 API 契約、不安定なサードパーティ向けの ACK 駆動モニタリング。\",\"\u003cb\u003eマイクロフロントエンド\u003c/b\u003eアーキテクチャ(Angular ホスト + React モジュール)を導入し、独立したデプロイサイクルと機能分離を実現 — チーム間の回帰範囲とデプロイ結合を削減。\",\"可観測性スタック(PostHog + メトリクスパイプライン + ワークフロー)を導入し、ロールアウト影響、機能採用、異常検知、回帰追跡を可能に — リリースサイクル全体でデバッグ/分析時間を大幅に削減。\",\"引き継いだインフラのオーナーシップを担い、組織を止めない — 本番障害、パイプライン失敗、クラスタの癖、連携の不安定さを静かに吸収し、プロダクトとチームを停滞させない。ArgoCD、CI/CD、ドメイン/SSL、\u003cb\u003eAKS/FKE/K3S/EKS\u003c/b\u003e クラスタを\u003cb\u003e診断可能、復旧可能、安定したシステム\u003c/b\u003eへと整備。\",\"コードレビュー、デプロイ支援、サービスクォータ検証、API ヘルス監視、リリース分析を支援する \u003cb\u003eAI エージェント\u003c/b\u003eを構築 — 意思決定とデリバリーのループを短縮。\",\"連携シミュレーションや sandbox/demo モジュールを開発し、不安定なパートナー対応と契約前検証を実現。\",\"リーダーシップ移行後に\u003cb\u003eエンジニアリング組織を再構築\u003c/b\u003e:組織図、能力マトリクス、業務ルーティング、オーナーシップ境界を定義 — 自律性を解放し、技術意思決定のリードタイムを短縮。\",\"統一されたエンジニアリングプレイブックを策定:ブランチ戦略、コミット規約、リリースタグ付け、ロールアウト基準、API/連携ルール、技術仕様リポジトリ(RFC、Runbook、トラブルシューティングガイド)。\",\"採用と育成のループを主導:構造化面接(QC/Fullstack)、オンボーディング、1:1 コーチング、評価サイクル、チーム間の対立解消で、協調的かつ成果志向のデリバリーを維持。\",\"ドキュメント優先文化とプロセスガードレール(チェックリスト、引き継ぎルール、ロールバック準備)でデリバリー品質を維持し、スケール期にも予測可能なリリース頻度を実現。\"]},\"zalo\":{\"summary1\":\"クロスプラットフォーム \u003cb\u003eZalo PC\u003c/b\u003e(Web、macOS、Windows)のコア開発者として \u003cb\u003e15M+ MAU\u003c/b\u003e にサービス提供。ダークモード、ダイナミックテーマ、ユーザー行動トラッキングなど主要機能を提供。\u003cb\u003e50+ 開発者\u003c/b\u003e向けにプロモーションフローとスケーラブルな\u003cb\u003eデザインシステム\u003c/b\u003eを主導。堅牢で効率的なソリューションでパフォーマンスを最適化し、保守性を向上、事業成長に貢献。\",\"summary2\":\"\u003cb\u003eZalo Android\u003c/b\u003e モバイルアプリを積極的に保守・改善し、約 \u003cb\u003e8000 万ユーザー\u003c/b\u003e向けに重要機能の\u003cb\u003e安定性\u003c/b\u003eと\u003cb\u003eパフォーマンス\u003c/b\u003eを確保。\",\"contributions\":[\"ダークモード、ダウンロードモジュール、Kiki Bot、ログトラッキングなど \u003cb\u003e10 機能以上\u003c/b\u003eを提供し、UX とエンゲージメントを向上。\",\"トラッキングとモニタリングシステムを統合した\u003cb\u003eプロモーションフロー\u003c/b\u003eを開発し、\u003cb\u003e15M+ MAU\u003c/b\u003e での活性化成功を牽引。\",\"Storybook を用いてスケーラブルな\u003cb\u003eデザインシステム\u003c/b\u003eの開発をリードし、\u003cb\u003e50+ 開発者\u003c/b\u003e向けに UI 一貫性と効率を確保。\",\"\u003cb\u003e50+ クライアントユーザー\u003c/b\u003eを積極的にサポートし、\u003cb\u003e献身\u003c/b\u003eと\u003cb\u003e効果的な問題解決\u003c/b\u003eで迅速に問題を解消し、強いポジティブな評価を獲得。\",\"\u003cb\u003eZalo Android\u003c/b\u003e アプリで \u003cb\u003e3 機能以上\u003c/b\u003eを保守・改善し、約 \u003cb\u003e8000 万ユーザー\u003c/b\u003e向けの\u003cb\u003e安定性\u003c/b\u003e、\u003cb\u003eパフォーマンス\u003c/b\u003e、シームレスな UX に注力。\"]},\"primedata\":{\"summary\":\"同社は CDxP と呼ばれる製品を構築。簡潔に言えば、顧客プロファイルをホスト・処理するためのカスタムメイドデータプラットフォームで、異なるサービスやシステムから来る異種スキーマと形式の顧客データを識別し統一する点が肝となるソリューション。\",\"contributions\":[\"フロントエンドチームを率い、CDxP アプリ、Magento と WordPress のデモ、JS SDK、モバイル SDK など \u003cb\u003e10 件以上のプロジェクト\u003c/b\u003eを提供。\",\"\u003cb\u003e4 名のチーム\u003c/b\u003eを管理し、複数の主要パートナーを満足させる製品ロードマップに合わせ、UI/UX を強化、360 プロファイルやキャンペーンビルダーなどの高度な機能を実装。\",\"フル機能の軽量 JS SDK(\u003cb\u003e\u003c200kb、\u003c150ms\u003c/b\u003e ロード時間)を開発し、プロジェクト横断でのシームレスな連携を実現。\",\"迅速な\u003cb\u003e問題解決\u003c/b\u003eを発揮し、クライアントと投資家を魅了するための機能デモを素早く完了。\"]},\"splus\":{\"summary\":\"アウトソーシング企業。大半のプロジェクトは\u003cb\u003eモバイルおよび Web アプリ\u003c/b\u003eを中心に展開。\",\"contributions\":[\"\u003cb\u003eエンドツーエンドのソフトウェア生産プロセス\u003c/b\u003eに精通し、\u003cb\u003e小規模チームを率い\u003c/b\u003e、要件収集からプロジェクトセキュリティまでの各フェーズを習得し、将来のリーダーシップの基盤を築いた。\",\"\u003cb\u003e教育、F\u0026B、銀行\u003c/b\u003e、\u003cb\u003eEC\u003c/b\u003e など多様な領域の \u003cb\u003e8 件以上\u003c/b\u003eのプロジェクトに参画し、Web とモバイル双方の開発に対する貴重な洞察を獲得。\",\"プロジェクト傭兵として Savyu や Bank Tool などの重要プロジェクトを獲得し、\u003cb\u003e$20,000\u003c/b\u003e 以上の収益を生み出し、貢献により\u003cb\u003eBest Rookie of the Year\u003c/b\u003e を受賞。\"]},\"propman\":{\"summary\":\"\u003cb\u003e不動産領域\u003c/b\u003eのスタートアップ。創業エンジニアの一人。\",\"contributions\":[\"フロントエンド開発者として主要 Web アプリ開発に参画。基本的な Web 開発スキル、特に \u003cb\u003eReact JS\u003c/b\u003e と関連技術に習熟。レスポンシブデザインのプロジェクトでも協業し、ユーザー体験の向上を最優先。\"]}},\"Projects\":{\"sat\":{\"accomplishments\":[\"UI/UX デザイン、プロダクトエンジニアリング、ユーザー行動分析にわたる製品開発を統括し、2 か月間で \u003cb\u003e10,000 件\u003c/b\u003eを超える訪問と \u003cb\u003e3,000 件\u003c/b\u003eのサインアップを獲得。\",\"\u003cb\u003eparasite SEO\u003c/b\u003e を含む戦略的 SEO 施策により Google 検索順位を向上。これによりパフォーマンスを大幅に強化し、業界内での製品ポジショニングを効果的に実現。\",\"\u003cb\u003e1 CPU\u003c/b\u003e および \u003cb\u003e256 MiB\u003c/b\u003e のメモリ上限を持つ単一の Cloud Run インスタンスでフロントエンドアプリ開発を行い、効率性とリソース最適化を実現。\",\"\u003cb\u003eモバイルファースト\u003c/b\u003eのアプローチでモバイルアプリ開発を主導し、\u003cb\u003e2 日以内\u003c/b\u003eにアプリストアへ迅速にデプロイ。さらにすべてのデバイスで \u003cb\u003ePWA\u003c/b\u003e インストールをシームレスに実現し、アクセシビリティと UX を向上。\",\"\u003cb\u003eGoogle Ads\u003c/b\u003e 連携と \u003cb\u003eStripe\u003c/b\u003e 決済フローを含む\u003cb\u003eマネタイズ機能\u003c/b\u003eを開発し、収益創出を強化。\"]},\"cdp\":{\"accomplishments\":[\"CDxP プロジェクトのアーキテクチャと実装を主導し、\u003cb\u003eUI/UX\u003c/b\u003e 機能に注力することで全体的な UX とエンゲージメントを向上。\",\"ネストルータを構成し、\u003cb\u003eスケーラブル\u003c/b\u003eなプロジェクト構造を維持。ES6、Typescript、データ型への深い知識を発揮し、\u003cb\u003eコードの保守性を向上\u003c/b\u003eさせ、コード関連の問題を削減。\",\"\u003cb\u003eエラーや改善点\u003c/b\u003eを効果的にトラッキングし、バグ修正を支援。プロジェクトの\u003cb\u003e安定性\u003c/b\u003eを確保し、システム信頼性を向上、ダウンタイムを削減。\",\"アダプティブなクライアント構成でのコンポーネントアクセス認可を検証する \u003cb\u003eRBAC\u003c/b\u003e フックを実装。さらにモジュラー設計により、複数プロジェクト間で共有可能な \u003cb\u003e20 以上の再利用ユーティリティ\u003c/b\u003eを構築。\",\"プロファイル、キャンペーン、分析など \u003cb\u003e10 以上の高度な機能\u003c/b\u003eを開発。\",\"\u003cb\u003e100 以上のシナリオ\u003c/b\u003eと \u003cb\u003e1000 以上のテストケース\u003c/b\u003eで CDP コア機能をカバーする堅牢なテストフローを確立。\",\"BDD、ユニットテスト、\u003cb\u003eE2E テスト\u003c/b\u003eなどのテスト手法に精通し、テストカバレッジを向上、ソフトウェアバグを \u003cb\u003e30%\u003c/b\u003e 削減。\",\"実行時切り替え用の\u003cb\u003eフィーチャーフラグ\u003c/b\u003eを開発し、A/B テストと顧客セグメント別の機能グルーピングを実現。機能配信を最適化し、採用率を向上。\",\"コンポーネントを明確かつ保守しやすい形で\u003cb\u003e文書化\u003c/b\u003eし、コードの可読性を向上、保守時間を短縮。\"]},\"sdk\":{\"accomplishments\":[\"\u003cb\u003evanilla JS\u003c/b\u003e を使い \u003cb\u003e5 以上のモジュール\u003c/b\u003eを成功裏に開発し、\u003cb\u003e10 以上の高度な機能\u003c/b\u003eを組み込み。\u003cb\u003e\u003c200kb のバンドルサイズと \u003c150ms\u003c/b\u003e のロード時間を達成(バンドルへの全最適化前の計測)。\",\"バックグラウンドのマルチタスクのために \u003cb\u003eWeb Worker と Service Worker\u003c/b\u003e を活用し、複雑な機能を効果的に管理。複数タブ同時使用などの\u003cb\u003eエッジケース\u003c/b\u003eに対応。\",\"さらに \u003cb\u003eマイクロフロントエンド\u003c/b\u003eアーキテクチャで\u003cb\u003eパーソナライズドレコメンド機能\u003c/b\u003eを設計・実装。ユーザーが好みそうな商品を表示するカルーセルブロックにより、UX とエンゲージメントを向上。\",\"構築した高度機能には Web ポップアップ、Web プッシュ通知、\u003cb\u003eWeb コンポーネント埋め込み\u003c/b\u003e、WebSocket 連携、複数タブ間の煩わしいポップアップ管理を含む。\",\"さらに \u003cb\u003eJS Closure\u003c/b\u003e を活用してモジュール構造を整理し、シームレスな機能エクスポートや\u003cb\u003eデータカプセル化\u003c/b\u003eを実現。グローバルスコープでの\u003cb\u003e競合を回避\u003c/b\u003e。\"]},\"vac\":{\"accomplishments\":[\"Vietnam Australia Center で \u003cb\u003eFront-end Project\u003c/b\u003e 講座を\u003cb\u003e教える\u003c/b\u003e役割を担当。\",\"\u003cb\u003e魅力的な講義\u003c/b\u003eを設計・実施し、学生に対しフロントエンド開発プロジェクトの実践指導を提供。\",\"\u003cb\u003e協調的な\u003c/b\u003e学習環境を育み、\u003cb\u003e12 名の学生\u003c/b\u003eに\u003cb\u003eチームワーク\u003c/b\u003eを促し、業界のベストプラクティスとカリキュラムを整合。\",\"個別の\u003cb\u003eフィードバック\u003c/b\u003eと\u003cb\u003eメンタリング\u003c/b\u003eを提供し、学生が\u003cb\u003e課題を克服\u003c/b\u003eし、教材の全体理解を確実にできるよう支援。\"]},\"mona\":{\"accomplishments\":[\"\u003cb\u003eReact Native\u003c/b\u003e と Realm DB を用いた包括的なモバイルアプリ Mona House を開発し、効率的な住居管理を実現。\",\"\u003cb\u003e再利用可能なコンポーネント\u003c/b\u003e、滑らかなアニメーション、ネイティブモジュールとのシームレスな連携を重視したクロスプラットフォームアプリ開発に特化。\",\"高度なデバッグツールとパフォーマンスプロファイリングで複雑な問題を迅速に特定・解決する強い\u003cb\u003e問題解決\u003c/b\u003eと\u003cb\u003eトラブルシュート\u003c/b\u003e能力を発揮。\",\"新しい技術への\u003cb\u003e適応力\u003c/b\u003eと\u003cb\u003e素早い学習曲線\u003c/b\u003eを示し、新フレームワーク、プログラミング言語、ツールの実装をシームレスに行い、プロジェクトを完了。\"]},\"mobivi\":{\"accomplishments\":[\"Mobivi で \u003cb\u003e20 個以上の Excel ファイル\u003c/b\u003e(各 \u003cb\u003e20,000 件以上のレコード\u003c/b\u003e)を取り込み・処理する\u003cb\u003eフルスタック Web アプリ\u003c/b\u003eを開発。\",\"ユーザーからの累積的に計算される取引データを効率的に処理し、\u003cb\u003e正確で信頼性のあるレポート\u003c/b\u003eを保証するよう設計。\"]},\"savyu\":{\"accomplishments\":[\"Synova で\u003cb\u003e2 つのモバイル\u003c/b\u003eアプリ開発で重要な役割を果たした — 1 つは加盟店向け、もう 1 つは消費者向け。\",\"管理者がユーザーデータを効率的に管理できる\u003cb\u003eWeb アプリ\u003c/b\u003eの作成に貢献。\",\"\u003cb\u003eモバイルアプリ開発\u003c/b\u003eに精通し、クロスファンクショナルチームと協力して\u003cb\u003e直感的\u003c/b\u003eかつ\u003cb\u003e高性能\u003c/b\u003eなアプリを成功裏に提供。\"]}},\"CTA\":{\"eyebrow\":\"一緒に作りませんか\",\"title\":\"出荷する価値のある難題、ありますか?\",\"body\":\"プロダクトが急速にスケールし、チームに明瞭さが求められ、インフラが負荷下で安定すべき場面で最も役立てます。お気軽にご連絡を — すべてのメッセージに目を通します。\",\"emailMe\":\"メールを送る\",\"resumePdf\":\"履歴書 (PDF)\",\"linkedin\":\"LinkedIn\"},\"SEO\":{\"home\":{\"title\":\"Nguyen Le Phong — シニアソフトウェアエンジニア \u0026 テックリード\",\"description\":\"8 年以上の経験を持つシニアソフトウェアエンジニア兼 Head of Tech。プロダクト構築、デリバリーリード、マイクロフロントエンド、Kubernetes、ロールアウトシステムのアーキテクチャ設計を担当。情報技術学士 — Very Good(GPA 3.36)。\"}},\"Offline\":{\"banner\":{\"syncing\":\"この言語のoffline読書を準備しています…\",\"ready\":\"この言語のoffline読書の準備ができました。\",\"partial\":\"offline読書の保存はまだ一部だけです。もう少しだけonlineのままにしてください。\",\"offlineReady\":\"現 ったか、そして正式な仕事以外でどう継続力を育てているか。\"},\"categoryNotes\":{\"all\":\"学習からdeliveryまでの流れをまとめて見る。\",\"certificates\":\"仕事をより確かなものにするための意図的な学習。\",\"awards\":\"主体性、安定感、責任感への評価。\",\"projects\":\"作り、届け、教え、試したものの記録。\",\"activities\":\"エネルギー、規律、長く続ける習慣が見える日常の瞬間。\"},\"categoryIntros\":{\"certificates\":{\"body\":\"このセクションは、システム理解、compliance、security、プロダクト品質をより丁寧に扱うために土台を強くしてきた跡です。\",\"signal\":\"継続して学ぶことで、仕事は少しずつ丁寧で確かなものになります。\"},\"awards\":{\"body\":\"これらの評価はゴールではありません。早く立ち上がり、責任を持ち、長い挑戦を進めた時期の小さな節目です。\",\"signal\":\"実際のチーム環境では、安定した姿勢と信頼性がよく見えます。\"},\"projects\":{\"body\":\"プロダクト、デモ、課題の一部です。大切なのはスクリーンショットだけでなく、アイデアを動くもの、説明できるもの、改善できるものにする過程です。\",\"signal\":\"アイデアは、動かせて、説明できて、改善し続けられる形になった時により意味を持ちます。\"},\"activities\":{\"body\":\"すべてのキャリアシグナルがticketやreleaseの中にあるわけではありません。日々のリズムや習慣が、持続的に働くエネルギーを支えます。\",\"signal\":\"個人の規律は、チームと長く安定して進む力を支えてくれます。\"}},\"captions\":{\"veryGood\":\"Very Goodで卒業 - 早い段階から丁寧に作った学習の土台。\",\"scoreboard\":\"学習結果 - 継続の小さな跡。\",\"testerCertificate\":\"Tester certificate - 検証の視点で品質を見る練習。\",\"compliance\":\"Compliance Refresh Training - 安全で手順を意識したプロダクト作り。\",\"cybersecurity\":\"Cybersecurity Refresh Training - deliveryの中でsecurity思考を強める。\",\"bestRookie\":\"Best Rookie of the Year - 早く立ち上がり、丁寧に取り組んだことへの評価。\",\"splus\":\"Splus Certificate - チーム環境での小さな節目。\",\"primeAward\":\"Award at PrimeData - deliveryにおけるownershipと主体性の結果。\",\"upraceMedals\":\"UpRace medals - 仕事の外でも長期的なリズムを鍛える。\",\"uprace323\":\"UpRace 323km - 小さな距離の積み重ねが記憶に残る結果になる。\",\"penangHill\":\"Penang Hill 11km - 一歩ずつ進んで頂上に届く。\",\"deskWorking\":\"普通の作業スペース - 規律が毎日繰り返される場所。\",\"chessProject\":\"Chess games project - ロジック、UI、遊び心から作った体験。\",\"watProject\":\"WAT project - チーム環境でのプロダクト作業の記録。\",\"essay\":\"エッセイと共有 - アイデアを明確に伝える練習。\",\"teamEssay\":\"チームでの一場面 - アイデアは一緒に実装されてこそ価値を持つ。\",\"drone\":\"Drone applications - アイデアを動くモデルにするまでの探索。\"},\"featured\":\"注目のシグナル\",\"supporting\":\"補足シグナル\",\"openProof\":\"シグナルを開く\",\"verified\":\"検証済みソース\",\"original\":\"フル画像\",\"categories\":{\"certificates\":\"証明書\",\"awards\":\"受賞\",\"p clearSearch\":\"検索をクリア\",\"filtersLabel\":\"トピックで絞り込む\",\"allCategories\":\"すべて\",\"popularTags\":\"人気のタグ\",\"clear\":\"フィルターをクリア\",\"results\":\"{count, plural, =0 {記事がありません} other {# 件の記事}}\",\"noResults\":\"検索に一致する記事がありません。\",\"pagination\":{\"label\":\"ブログのページ\",\"prev\":\"前へ\",\"next\":\"次へ\",\"goToPage\":\"{page} ページ目へ\"}},\"eyebrow\":\"記事\",\"title\":\"ブログ\",\"intro\":\"ソフトウェアアーキテクチャとソースコードの構造についての詳しい解説。初心者にも分かりやすく、それでいて大規模に開発するチームにも役立つように書いています。図解と実例つき、曖昧な説明はしません。\",\"categoriesHeading\":\"トピックで探す\",\"latestHeading\":\"最新の記事\",\"empty\":\"まだ記事がありません——最初の記事をまもなく公開します。\",\"backToBlog\":\"ブログに戻る\",\"backToCategory\":\"{category}に戻る\",\"readingTime\":\"{minutes} 分で読めます\",\"articleCount\":\"{count, plural, other {# 件の記事}}\",\"writtenBy\":\"著者：{author}\",\"onThisPage\":\"目次\",\"readerTools\":{\"label\":\"読書ツール\",\"scrollTop\":\"先頭へ移動\",\"scrollBottom\":\"末尾へ移動\",\"font\":\"読書フォントを変更\",\"background\":\"読書背景を変更\",\"language\":\"言語を変更\"},\"partOf\":\"全 {total} 回中第 {part} 回\",\"nextUp\":\"次の記事\",\"previously\":\"前の記事\",\"relatedHeading\":\"関連する読みもの\",\"relatedIntro\":\"同じ流れをもう少し深く追える、近いテーマの記事です。\",\"faqHeading\":\"よくある質問\",\"seriesNames\":{\"foundations\":\"ソフトウェアアーキテクチャの基礎\",\"ways-of-working\":\"働き方とチームづくり\",\"ai-in-practice\":\"実務で使うAI\",\"kind-engineering\":\"やさしく効果的なエンジニアリング\"},\"engagement\":{\"reactionsPrompt\":\"記事はいかがでしたか？\",\"views\":\"ビュー\",\"share\":\"シェア\",\"copyLink\":\"リンクをコピー\",\"copied\":\"コピーしました！\",\"reactions\":{\"like\":\"いいね\",\"love\":\"大好き\",\"insightful\":\"なるほど\",\"clap\":\"祝福\"},\"close\":\"閉じる\"}}},\"About\":{\"hero\":{\"eyebrow\":\"Engineering profile\",\"title\":\"I build product systems that can be shipped, observed, and recovered.\",\"lead\":\"My work now sits between \u003cstrong\u003eproduct engineering\u003c/strong\u003e and \u003cstrong\u003eplatform reliability\u003c/strong\u003e: front-end surfaces, backend services, secure integrations, rollout systems, Kubernetes infrastructure, and the operating model that lets a team release with less guesswork.\",\"metricsLabel\":\"Current engineering signals\",\"metrics\":[{\"value\":\"8+\",\"label\":\"years shipping production software\"},{\"value\":\"11\",\"label\":\"people in the delivery team I lead\"},{\"value\":\"30+\",\"label\":\"tenants served by rollout systems\"},{\"value\":\"~40k\",\"label\":\"users behind the feature-flag platform\"}]},\"systems\":{\"eyebrow\":\"Current focus\",\"title\":\"The layer I operate in now\",\"intro\":\"I still care about polished user interfaces, but my current value is broader: connecting product decisions with backend contracts, infrastructure paths, release control, and production diagnosis.\",\"items\":[{\"title\":\"Backend services \u0026 secure integration\",\"body\":\"I work with \u003cstrong\u003e.NET Core\u003c/strong\u003e, \u003cstrong\u003eNode.js\u003c/strong\u003e, and \u003cstrong\u003eJava Spring\u003c/strong\u003e services, focusing on REST/GraphQL contracts, auth, encryption, backward compatibility, retry behavior, idempotency, and partner-system instability.\",\"tags\":[\".NET Core\",\"Node.js\",\"Java Spring\",\"REST/GraphQL\",\"mTLS\"]},{\"title\":\"Platform, infra \u0026 traffic path\",\"body\":\"I have been involved in the production path around \u003cstrong\u003eDocker\u003c/strong\u003e, \u003cstrong\u003eKubernetes\u003c/strong\u003e, \u003cstrong\u003eAKS/FKE/K3S/EKS\u003c/strong\u003e, \u003cstrong\u003eArgoCD\u003c/strong\u003e, CI/CD, domains/SSL, ingress and load-balancer routing, and recovery work when the system is already under pressure.\",\"tags\":[\"Kubernetes\",\"ArgoCD\",\"CI/CD\",\"Ingress\",\"Load balancer\"]},{\"title\":\"Progressive delivery\",\"body\":\"I engineered a \u003cstrong\u003emulti-tenant feature-flag platform\u003c/strong\u003e with priority rules, tenant/segment/env rollout, JSON-config values, and stateless runtime evaluation so releases can move gradually instead of all at once.\",\"tags\":[\"Feature flags\",\"30+ tenants\",\"Rollout rules\",\"Runtime config\"]},{\"title\":\"Observability \u0026 operating clarity\",\"body\":\"I build the feedback loops around releases: PostHog, metrics pipelines, API health checks, anomaly review, rollback readiness, RFCs, runbooks, and release criteria that make incidents easier to understand.\",\"tags\":[\"PostHog\",\"Metrics\",\"Runbooks\",\"Rollback\",\"Release review\"]}]},\"stack\":{\"eyebrow\":\"Technical depth\",\"title\":\"The engineering details I pay attention to\",\"intro\":\"The systems I prefer are not only feature-complete. They have clear contracts, known failure modes, and enough operational signs for the team to find the problem before users feel it.\",\"groups\":[{\"title\":\"Backend techniques\",\"items\":[\"\u003cstrong\u003eBackward-compatible API contracts\u003c/strong\u003e for mobile, web, and enterprise clients.\",\"\u003cstrong\u003eRSA-4096 handshake, AES-256 payload encryption, mTLS, certificate pinning\u003c/strong\u003e, and ACK-driven monitoring for financial integrations.\",\"\u003cstrong\u003eRetry queues and idempotent APIs\u003c/strong\u003e for partners that are slow, unstable, or asynchronous.\",\"\u003cstrong\u003eStateless runtime evaluation\u003c/strong\u003e for rollout rules, JSON config, tenant and segment targeting.\"]},{\"title\":\"Infrastructure techniques\",\"items\":[\"\u003cstrong\u003eKubernetes cluster operations\u003c/strong\u003e across AKS, FKE, K3S, and EKS environments.\",\"\u003cstrong\u003eIngress, load balancer, domain and SSL paths\u003c/strong\u003e treated as part of the product delivery flow, not as a black box.\",\"\u003cstrong\u003eArgoCD and CI/CD pipelines\u003c/strong\u003e for repeatable releases, environment control, and recovery.\",\"\u003cstrong\u003eProduction diagnosis\u003c/strong\u003e through logs, metrics, health checks, and documented recovery steps.\"]},{\"title\":\"Release architecture\",\"items\":[\"\u003cstrong\u003eMicro-Frontend composition\u003c/strong\u003e with Angular host and React modules to reduce deployment coupling.\",\"\u003cstrong\u003eFeature-flag rollout\u003c/strong\u003e by tenant, segment, environment, and percentage.\",\"\u003cstrong\u003eObservability workflows\u003c/strong\u003e for feature adoption, regression tracing, and anomaly review.\",\"\u003cstrong\u003eRollback criteria and release checklists\u003c/strong\u003e so delivery stays deliberate under pressure.\"]},{\"title\":\"Team systems\",\"items\":[\"\u003cstrong\u003eOwnership boundaries\u003c/strong\u003e, org chart, competency matrix, and workload routing after leadership transition.\",\"\u003cstrong\u003eRFCs, runbooks, technical specs\u003c/strong\u003e, and troubleshooting guides that reduce hidden knowledge.\",\"\u003cstrong\u003eHiring, onboarding, 1:1 coaching\u003c/strong\u003e, and review loops for developers and QC engineers.\",\"\u003cstrong\u003eBranch strategy, commit convention, release tagging\u003c/strong\u003e, and integration rules that keep delivery predictable.\"]}]},\"principles\":{\"eyebrow\":\"How I work\",\"title\":\"Principles I bring into production systems\",\"intro\":\"These are practical habits, not slogans. They come from seeing systems fail in ordinary ways and learning how to make the next release easier to reason about.\",\"items\":[{\"title\":\"Trace before rewriting\",\"body\":\"When a system behaves strangely, I first look for the path: request flow, data contract, logs, metrics, release history, and infrastructure changes.\"},{\"title\":\"Contracts before code volume\",\"body\":\"A good backend service is easier to operate when its API, retries, idempotency, security boundary, and compatibility rules are clear.\"},{\"title\":\"Rollout before big-bang release\",\"body\":\"Feature flags, tenant targeting, staged deployment, and rollback criteria keep product movement steady without making every release a gamble.\"},{\"title\":\"Documentation should reduce interruption\",\"body\":\"Specs, runbooks, and checklists are useful when they let another eng
