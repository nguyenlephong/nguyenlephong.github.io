name: Frontend CI

on:
  pull_request:
  push:
    branches: [dev]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Type-check · Strict lint · Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

  firestore-rules:
    name: Firestore security rules
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Test Firestore security rules in the emulator
        run: npm run test:firestore-rules

  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Check SonarQube secrets
        id: sonar-config
        env:
          SONAR_ENABLED: ${{ secrets.SONAR_TOKEN != '' }}
        run: |
          if [ "$SONAR_ENABLED" = "true" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.sonar-config.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        if: steps.sonar-config.outputs.enabled == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.sonar-config.outputs.enabled == 'true'
        run: npm ci

      - name: SonarQube scan
        if: steps.sonar-config.outputs.enabled == 'true'
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          args: >
            -Dsonar.qualitygate.wait=true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube skipped
        if: steps.sonar-config.outputs.enabled != 'true'
        run: echo "SonarQube scan skipped because SONAR_TOKEN is not configured."

  build:
    name: Smoke build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Skip OG-image generation for speed; this still runs the full
      # `next build` and fails on any compile / type / lint error.
      - name: Build (static export, OG skipped)
        run: npm run build:fast

      - name: Verify architecture and SEO budgets
        run: npm run verify:artifact

      - name: Verify crawlable content pagination
        run: npm run verify:pagination

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Verify offline browser behavior
        run: npm run verify:offline
