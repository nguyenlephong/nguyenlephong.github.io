name: Deploy static site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: pages-${{ github.repository }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and verify static artifact
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache generated OpenGraph images
        uses: actions/cache@v5
        with:
          path: public/og-cache
          key: og-images-v2-${{ hashFiles('public/blog-data/**/*.json', 'public/notes-data/**/*.json', 'scripts/generate-static-og.mjs', 'src/app/**/*opengraph*', 'src/app/_og/**') }}
          restore-keys: |
            og-images-v2-

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6
        with:
          static_site_generator: next

      - name: Run source quality gates
        run: npm run check

      - name: Build production static export
        run: npm run build

      - name: Verify architecture and SEO budgets
        run: npm run verify:artifact

      - name: Verify crawlable content pagination
        run: npm run verify:pagination

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Verify offline browser behavior
        run: npm run verify:offline

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./out

  deploy:
    name: Deploy verified artifact
    if: github.ref == 'refs/heads/main' && needs.build.result == 'success'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
