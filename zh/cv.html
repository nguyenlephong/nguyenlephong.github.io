u003e全栈软件开发经验,其中 \u003cb\u003e3+ 年\u003c/b\u003e参与技术领导、架构决策与跨团队交付协调。\",\"intro2\":\"亲手设计、构建并运维端到端系统 — 从前端应用、后端服务到 CI/CD 流水线、发布流程和生产基础设施 — 高度强调自动化、运维清晰度和可靠交付。\",\"intro3\":\"\u003ci\u003e以下是我近几年专注的硬技能:\u003c/i\u003e\",\"visionEyebrow\":\"我的工作方式\",\"hardSkillsEyebrow\":\"硬技能\",\"pillars\":{\"endToEnd\":{\"title\":\"端到端工程师\",\"body\":\"前端、后端、CI/CD、发布与生产基础设施 — 一人贯穿整个生命周期。\",\"chip\":\"FE · BE · 基础设施\"},\"multiTenant\":{\"title\":\"多租户平台\",\"body\":\"特性开关、RBAC、按比例/分群发布、JSON 配置值、无状态运行时评估。\",\"chip\":\"30+ 租户在线\"},\"leadership\":{\"title\":\"交付领导\",\"body\":\"带领 11+ 工程师 — 招聘、组织设计、RFC、Runbook、发布手册、1:1 辅导。\",\"chip\":\"11 人团队\"},\"fintech\":{\"title\":\"安全金融集成\",\"body\":\"RSA-4096 握手、AES-256 负载、mTLS、证书锁定、幂等契约、重试队列。\",\"chip\":\"Gtel · Napas\"},\"mfe\":{\"title\":\"微前端与 SDK\",\"body\":\"Angular 宿主 + React 模块独立部署。JS SDK 小于 200KB,加载小于 150ms。\",\"chip\":\"MFE · \u003c150ms\"},\"ai\":{\"title\":\"AI 优先工程\",\"body\":\"构建 AI 代理用于代码审查、部署辅助、服务配额、API 健康监控与发布分析。\",\"chip\":\"生产环境代理\"}},\"skills\":{\"backend\":\"\u003cb\u003e后端\u003c/b\u003e:\u003cb\u003eNode.js\u003c/b\u003e 与 \u003cb\u003eJava (Spring)\u003c/b\u003e 深度实战经验;设计 REST/GraphQL API,提供清晰契约、身份验证与加密机制、向后兼容性,并为企业级和第三方集成提供韧性。\",\"frontend\":\"\u003cb\u003e前端\u003c/b\u003e:使用 \u003cb\u003eReact\u003c/b\u003e(TypeScript、Next.js)、\u003cb\u003eReact Native\u003c/b\u003e 以及基于 Angular 的微前端宿主构建并维护复杂客户端应用;应用性能优化、状态管理与可扩展的 UI 架构模式。\",\"databases\":\"\u003cb\u003e数据库\u003c/b\u003e:在 \u003cb\u003eMySQL\u003c/b\u003e 上有深厚实战经验,专注于 schema 与数据模型设计、索引策略、查询优化、事务边界、迁移规划以及分布式与高吞吐系统的一致性权衡。\",\"infra\":\"\u003cb\u003e基础设施与平台工程\u003c/b\u003e:在多个环境中实际使用 \u003cb\u003eDocker\u003c/b\u003e 与 \u003cb\u003eKubernetes\u003c/b\u003e;运维托管集群(\u003cb\u003eAKS\u003c/b\u003e、\u003cb\u003eEKS\u003c/b\u003e、\u003cb\u003eFKE\u003c/b\u003e、\u003cb\u003eK3S\u003c/b\u003e)、\u003cb\u003eArgoCD\u003c/b\u003e GitOps 部署、CI/CD 流水线、环境配置以及域名/SSL 管理。\",\"architecture\":\"\u003cb\u003e架构与交付实践\u003c/b\u003e:应用微前端与多租户架构、特性开关驱动的发布、渐进式交付策略以及可观测性实践以支持安全发布和生产诊断。\",\"testing\":\"\u003cb\u003e测试\u003c/b\u003e:实际使用 Jest、Cucumber、Puppeteer 与 Testing Library,确保跨服务和应用的回归安全、发布信心和生产就绪。\",\"libraries\":\"\u003cb\u003e类库\u003c/b\u003e:熟练运用 \u003cb\u003eFirebase\u003c/b\u003e、Strapi、Directus、React Flow、Webpack、\u003cb\u003eRedux\u003c/b\u003e、React Query 与 G2plot。\",\"other\":\"\u003cb\u003e其他\u003c/b\u003e:熟悉 \u003cb\u003e微前端\u003c/b\u003e架构、响应式设计、跨浏览器兼容性、\u003cb\u003eSEO\u003c/b\u003e、GraphQL 与 Electron。\"}},\"Experience\":{\"labels\":{\"location\":\"地点\",\"duration\":\"时长\",\"keyContributions\":\"关键贡献\",\"keyTechnologies\":\"关键技术\"},\"ndsvn\":{\"summary\":\"在 CTO 交接后承担产品交付与技术方向,主导架构决策、发布系统、企业级集成与跨团队协同,管理由 8 名开发(含 4 名 senior)与 3 名 QC 工程师组成的交付团队。\",\"contributions\":[\"设计 .NET Core 多租户特性开关系统 \u003cb\u003e(30+ 租户,~40k 用户)\u003c/b\u003e,具备优先级规则引擎、百分比发布(租户/分群/环境)、JSON 配置值与无状态运行时评估 — 驱动移动/Web 应用,并在高流量租户上实现可控的渐进式生产发布。\",\"与 \u003cb\u003eGtel 和 Napas\u003c/b\u003e 建立安全集成:RSA-4096 握手、AES-256 负载加密、\u003cb\u003emTLS\u003c/b\u003e 双向认证、证书锁定、重试队列、幂等 API 契约和 ACK 驱动的不稳定第三方服务监控。\",\"实现 \u003cb\u003e微前端\u003c/b\u003e 架构(Angular 宿主 + React 模块),实现独立部署周期与特性隔离 — 减少回归面与跨团队的部署耦合。\",\"引入可观测性栈(PostHog + 指标管道 + 工作流)用于发布影响、特性采用、异常检测与回归追踪 — 显著缩短调试/分析时间。\",\"接手继承的基础设施并保持组织运转 — 默默处理生产事故、流水线故障、集群异常与集成不稳定,使产品和团队不停滞;将 ArgoCD、CI/CD、域名/SSL 与 \u003cb\u003eAKS/FKE/K3S/EKS\u003c/b\u003e 集群塑造为\u003cb\u003e可诊断、可恢复、稳定的系统,而不是反复出现的未知问题\u003c/b\u003e。\",\"构建 \u003cb\u003eAI 代理\u003c/b\u003e,支持代码审查、部署助手、服务配额校验、API 健康监控和发布分析;缩短产品团队的决策与交付循环。\",\"开发集成模拟与 sandbox/demo 模块,处理不稳定合作伙伴并确保与第三方生态的合同前安全验证。\",\"在领导层交接后\u003cb\u003e重组工程组织\u003c/b\u003e:定义组织架构、能力矩阵、工作路由与所有权边界 — 释放自主性并缩短技术决策的交付时间。\",\"建立统一的工程手册:分支策略、提交规范、发布打标签、发布标准、API/集成规则与技术规范库(RFC、Runbook、故障排查指南)。\",\"主导招聘与能力增长循环:结构化面试(QC/Fullstack)、入职路径、1:1 辅导、绩效评审与跨团队冲突解决,使交付保持协作与产出导向。\",\"通过文档优先文化和流程护栏(检查表、交接规则、回滚就绪)维持交付质量,在扩张期间保持可预测的发布节奏。\"]},\"zalo\":{\"summary1\":\"跨平台 \u003cb\u003eZalo PC\u003c/b\u003e(Web、macOS、Windows)的核心开发者,服务 \u003cb\u003e15M+ MAU\u003c/b\u003e。交付了暗黑模式、动态主题、用户行为追踪等关键功能。主导开发了促销流程和面向 \u003cb\u003e50+ 开发者\u003c/b\u003e的可扩展\u003cb\u003e设计系统\u003c/b\u003e。通过稳健高效的方案,优化性能、提升可维护性,并推动业务增长。\",\"summary2\":\"积极维护并改进 \u003cb\u003eZalo Android\u003c/b\u003e 移动端,为近 \u003cb\u003e8000 万用户\u003c/b\u003e确保关键功能的\u003cb\u003e稳定性\u003c/b\u003e与\u003cb\u003e性能\u003c/b\u003e。\",\"contributions\":[\"交付了 \u003cb\u003e10+ 个功能\u003c/b\u003e,包括暗黑模式、下载模块、Kiki Bot、日志追踪等,改善 UX 与用户活跃度。\",\"开发了带有集成追踪与监控系统的\u003cb\u003e促销流程\u003c/b\u003e,在 \u003cb\u003e15M+ MAU\u003c/b\u003e 上推动激活成功。\",\"使用 Storybook 主导构建可扩展的\u003cb\u003e设计系统\u003c/b\u003e,为 \u003cb\u003e50+ 开发者\u003c/b\u003e确保 UI 一致性与效率。\",\"主动支持 \u003cb\u003e50+ 客户端用户\u003c/b\u003e,以\u003cb\u003e专注\u003c/b\u003e和\u003cb\u003e有效的问题解决\u003c/b\u003e能力迅速处理问题,获得强烈的正面反馈。\",\"在 \u003cb\u003eZalo Android\u003c/b\u003e 应用中维护并改进了 \u003cb\u003e3+\u003c/b\u003e 个功能,聚焦\u003cb\u003e稳定性\u003c/b\u003e、\u003cb\u003e性能\u003c/b\u003e以及近 \u003cb\u003e8000 万用户\u003c/b\u003e的无缝体验。\"]},\"primedata\":{\"summary\":\"公司构建了所谓的 CDxP 产品。简而言之,这是一个定制化的数据平台,用于托管和处理客户档案(关键解决方案是如何从不同服务和系统的异构 schema 与格式中识别并统一客户数据)。\",\"contributions\":[\"带领前端团队交付 \u003cb\u003e10+ 个项目\u003c/b\u003e,包括 CDxP 应用、Magento 与 WordPress 演示、JS SDK、移动 SDK 等。\",\"管理 \u003cb\u003e4 人团队\u003c/b\u003e,与产品路线图保持一致以满足多个主要合作伙伴,提升 UI/UX 并实现 360 档案与 campaign builder 等高级功能。\",\"开发轻量级 JS SDK,功能完整(\u003cb\u003e\u003c200kb,\u003c150ms\u003c/b\u003e 加载时间),促进跨项目的无缝集成。\",\"展现快速\u003cb\u003e解决问题\u003c/b\u003e的能力,确保迅速完成功能演示以打动客户和投资人。\"]},\"splus\":{\"summary\":\"一家外包公司。多数项目围绕\u003cb\u003e移动端与 Web 应用\u003c/b\u003e。\",\"contributions\":[\"凭借\u003cb\u003e软件端到端生产流程\u003c/b\u003e的专业能力,我\u003cb\u003e带领一支小团队\u003c/b\u003e,精通从需求收集到项目安全的各个阶段,为后续的领导角色奠定基础。\",\"在\u003cb\u003e教育、餐饮、银行\u003c/b\u003e与\u003cb\u003e电商\u003c/b\u003e等领域参与了 \u003cb\u003e8+\u003c/b\u003e 个多元化项目,获得了关于 Web 与移动应用开发的宝贵洞察。\",\"作为项目佣兵,我赢得了 Savyu 与 Bank Tool 等重要项目,创造了超过 \u003cb\u003e$20,000\u003c/b\u003e 的收入,并因卓越贡献被评为\u003cb\u003e年度最佳新人\u003c/b\u003e。\"]},\"propman\":{\"summary\":\"一家\u003cb\u003e房地产领域\u003c/b\u003e创业公司。我是创始工程师之一。\",\"contributions\":[\"作为前端开发者首次参与主要 Web 应用开发。获得了基础的 Web 开发技能,专注 \u003cb\u003eReact JS\u003c/b\u003e 及相关技术。在响应式设计项目上协作,优先提升用户体验。\"]}},\"Projects\":{\"sat\":{\"accomplishments\":[\"统筹从 UI/UX 设计、产品工程到用户行为分析的产品开发,在两个月内取得超过 \u003cb\u003e10,000\u003c/b\u003e 次访问与 \u003cb\u003e3,000\u003c/b\u003e 次注册的全球用户基础。\",\"通过战略性 SEO 举措(包括 \u003cb\u003eparasite SEO\u003c/b\u003e 技术)提升 Google 搜索排名。这些努力带来了显著的性能提升,并使产品在行业中得到有效定位。\",\"通过仅使用一个具有 \u003cb\u003e1 CPU\u003c/b\u003e 与 \u003cb\u003e256 MiB\u003c/b\u003e 内存上限的 Cloud Run 实例,展示前端应用开发中的效率与资源优化。\",\"以\u003cb\u003e移动优先\u003c/b\u003e方式主导开发移动应用,在\u003cb\u003e两天内\u003c/b\u003e快速上架应用商店。同时确保所有设备上的 \u003cb\u003ePWA\u003c/b\u003e 安装无缝,提升可达性与用户体验。\",\"开发\u003cb\u003e变现功能\u003c/b\u003e,包括 \u003cb\u003eGoogle Ads\u003c/b\u003e 集成与 \u003cb\u003eStripe\u003c/b\u003e 支付流程,增强营收能力。\"]},\"cdp\":{\"accomplishments\":[\"主导 CDxP 项目的架构与实现,专注于 \u003cb\u003eUI/UX\u003c/b\u003e 功能,从而提升了整体用户体验与用户参与度。\",\"配置嵌套路由,维持\u003cb\u003e可扩展\u003c/b\u003e的项目结构,展示对 ES6、Typescript 与数据类型的深厚知识,从而\u003cb\u003e提升代码可维护性\u003c/b\u003e并减少代码相关问题。\",\"有效\u003cb\u003e追踪错误\u003c/b\u003e与改进,支持 bug 修复,确保项目的\u003cb\u003e稳定性\u003c/b\u003e,从而提升系统可靠性并减少停机时间。\",\"实现 \u003cb\u003eRBAC\u003c/b\u003e Hook 用于验证自适应客户端配置中组件访问的授权。此外,基于模块化设计,构建了超过 \u003cb\u003e20 个可重用的工具功能\u003c/b\u003e。\",\"构建 \u003cb\u003e10+ 高级功能\u003c/b\u003e,例如档案、活动、分析等。\",\"建立健壮的测试流程,覆盖核心 CDP 功能,包含 \u003cb\u003e100+ 场景\u003c/b\u003e与 \u003cb\u003e1000+ 测试用例\u003c/b\u003e。\",\"掌握领域专业并精通测试方法,包括 BDD、单元测试与 \u003cb\u003eE2E 测试\u003c/b\u003e,提升测试覆盖率,减少软件 bug \u003cb\u003e30%\u003c/b\u003e。\",\"开发用于运行时切换的\u003cb\u003e特性开关\u003c/b\u003e,支持 A/B 测试与基于客户分群的功能分组,优化功能交付并提升采用率。\",\"为清晰与易于维护对组件进行\u003cb\u003e文档化\u003c/b\u003e,提升代码可读性并减少维护时间。\"]},\"sdk\":{\"accomplishments\":[\"使用 \u003cb\u003evanilla JS\u003c/b\u003e 成功开发了超过 \u003cb\u003e5 个模块\u003c/b\u003e,集成超过 \u003cb\u003e10 个高级功能\u003c/b\u003e。实现了 \u003cb\u003e\u003c200kb 的 bundle 大小与 \u003c150ms\u003c/b\u003e 的加载时间(在采用全部 bundle 优化技术之前测得的数据)。\",\"利用 \u003cb\u003eweb worker 与 service worker\u003c/b\u003e 在后台进行多任务处理,有效管理复杂功能并处理\u003cb\u003e多种边界情况\u003c/b\u003e,例如同时多标签使用。\",\"此外,使用\u003cb\u003e微前端\u003c/b\u003e架构设计并实现了\u003cb\u003e个性化推荐功能\u003c/b\u003e,具体是展示用户可能喜欢产品的轮播块,从而提升体验与参与度。\",\"构建的高级功能包括 Web 弹窗、Web 推送通知、\u003cb\u003eWeb 组件嵌入\u003c/b\u003e、WebSocket 集成,以及多标签下烦人弹窗的管理。\",\"进一步利用 \u003cb\u003eJS Closure\u003c/b\u003e 组织模块结构,实现无缝功能导出或\u003cb\u003e数据封装\u003c/b\u003e,从而\u003cb\u003e避免\u003c/b\u003e在全局作用域内的冲突。\"]},\"vac\":{\"accomplishments\":[\"在 Vietnam Australia Center 承担\u003cb\u003e教授\u003c/b\u003e \u003cb\u003eFront-end Project\u003c/b\u003e 课程的责任。\",\"设计并交付\u003cb\u003e引人入胜的讲座\u003c/b\u003e,为学生提供前端开发项目的实践指导。\",\"聚焦营造\u003cb\u003e协作\u003c/b\u003e学习环境,鼓励 \u003cb\u003e12 名学生\u003c/b\u003e\u003cb\u003e团队合作\u003c/b\u003e,并使课程与行业最佳实践对齐。\",\"提供个性化\u003cb\u003e反馈\u003c/b\u003e与\u003cb\u003e指导\u003c/b\u003e,支持学生\u003cb\u003e克服挑战\u003c/b\u003e并确保对课程内容的全面理解。\"]},\"mona\":{\"accomplishments\":[\"使用 \u003cb\u003eReact Native\u003c/b\u003e 与 Realm DB 开发了一款全面的移动应用 Mona House,用于高效的住所管理。\",\"专注于创建跨平台应用,重点是\u003cb\u003e可重用组件\u003c/b\u003e、流畅动画以及与原生模块的无缝集成。\",\"展示出强大的\u003cb\u003e问题解决\u003c/b\u003e与\u003cb\u003e故障排查\u003c/b\u003e能力,通过高级调试工具与性能剖析迅速识别并解决复杂问题。\",\"展示出对新技术的\u003cb\u003e适应性\u003c/b\u003e与\u003cb\u003e快速学习曲线\u003c/b\u003e,使新框架、编程语言或工具的无缝实现成为可能,以确保项目完成。\"]},\"mobivi\":{\"accomplishments\":[\"在 Mobivi 开发了一个\u003cb\u003e全栈 Web 应用\u003c/b\u003e,专注于摄取并处理超过 \u003cb\u003e20 个 Excel 文件\u003c/b\u003e,每个文件包含超过 \u003cb\u003e20,000 条记录\u003c/b\u003e。\",\"应用旨在高效处理用户的渐进式计算事务数据,\u003cb\u003e确保准确可靠的报表\u003c/b\u003e。\"]},\"savyu\":{\"accomplishments\":[\"在 Synova 开发\u003cb\u003e两款移动\u003c/b\u003e应用中发挥关键作用 - 一款面向商户,另一款面向消费者。\",\"参与创建一个\u003cb\u003eWeb 应用\u003c/b\u003e,使管理员能高效管理用户数据。\",\"展示\u003cb\u003e移动应用开发\u003c/b\u003e的精通,与跨职能团队协作,确保成功交付\u003cb\u003e直观\u003c/b\u003e且\u003cb\u003e高性能\u003c/b\u003e的应用。\"]}},\"CTA\":{\"eyebrow\":\"一起做点什么\",\"title\":\"有值得交付的硬核问题吗?\",\"body\":\"我最擅长的是产品快速扩张、团队需要清晰方向、基础设施必须在高负载下稳定运行的场景。请联系我 — 我会阅读每一条消息。\",\"emailMe\":\"发邮件\",\"resumePdf\":\"简历 (PDF)\",\"linkedin\":\"LinkedIn\"},\"SEO\":{\"home\":{\"t
