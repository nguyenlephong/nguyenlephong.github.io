pping\",\"yearsShippingCaption\":\"Production code, day in day out\",\"hoursCoding\":\"Hours coding\",\"hoursCodingCaption\":\"Tracked via WakaTime since 2021\",\"usersTouched\":\"Users touched\",\"usersTouchedCaption\":\"Zalo · CDP · fintech scale\",\"engineersLed\":\"Engineers led\",\"engineersLedCaption\":\"Devs · QC · cross-functional\",\"tenantsPowered\":\"Tenants powered\",\"tenantsPoweredCaption\":\"Multi-tenant feature flags\",\"domainsDelivered\":\"Domains delivered\",\"domainsDeliveredCaption\":\"Fintech · CDP · realestate · edu\",\"projectsLaunched\":\"Projects launched\",\"projectsLaunchedCaption\":\"SDKs · platforms · mobile apps\",\"testCasesAuthored\":\"Test cases authored\",\"testCasesAuthoredCaption\":\"BDD · E2E · regression safety\"}},\"Sections\":{\"aboutEyebrow\":\"Profile\",\"aboutTitle\":\"A quick look at who I am and how I work\",\"experienceEyebrow\":\"Career\",\"experienceTitle\":\"Where I've shipped\",\"projectsEyebrow\":\"Work\",\"projectsTitle\":\"Selected projects\"},\"Summary\":{\"intro1\":\"Possessing a Bachelor's degree in Information Technology (minor in Software Engineering, \u003cb\u003eGPA 3.36\u003c/b\u003e) with nearly \u003cb\u003e8 years of experience\u003c/b\u003e in full-stack software development, including \u003cb\u003e3+ years\u003c/b\u003e contributing to technical leadership, architectural decision-making, and delivery coordination across teams.\",\"intro2\":\"Hands-on experience in designing, building, and operating end-to-end systems—from front-end applications and backend services to CI/CD pipelines, release workflows, and production infrastructure—with a strong emphasis on automation, operational clarity, and reliable delivery.\",\"intro3\":\"\u003ci\u003eHere are my recent focused hard skills over the past few years:\u003c/i\u003e\",\"visionEyebrow\":\"How I work\",\"hardSkillsEyebrow\":\"Hard skills\",\"pillars\":{\"endToEnd\":{\"title\":\"End-to-end engineer\",\"body\":\"Front-end, backend, CI/CD, release, and production infra — one owner across the full lifecycle.\",\"chip\":\"FE · BE · Infra\"},\"multiTenant\":{\"title\":\"Multi-tenant platforms\",\"body\":\"Feature flags, RBAC, percentage/segment rollouts, JSON-config values, stateless runtime evaluation.\",\"chip\":\"30+ tenants live\"},\"leadership\":{\"title\":\"Delivery leadership\",\"body\":\"Lead 11+ engineers — hiring, org design, RFCs, runbooks, rollout playbooks, 1:1 coaching.\",\"chip\":\"Team of 11\"},\"fintech\":{\"title\":\"Secure fintech integrations\",\"body\":\"RSA-4096 handshake, AES-256 payload, mTLS, certificate pinning, idempotent contracts, retry queues.\",\"chip\":\"Gtel · Napas\"},\"mfe\":{\"title\":\"Micro-frontend \u0026 SDKs\",\"body\":\"Angular host + React modules for independent deploys. JS SDK shipped \u003c200KB, \u003c150ms load.\",\"chip\":\"MFE · \u003c150ms\"},\"ai\":{\"title\":\"AI-first engineering\",\"body\":\"Built AI agents for code review, deploy assistance, service quotas, API health, and release analysis.\",\"chip\":\"Agents in prod\"}},\"skills\":{\"backend\":\"\u003cb\u003eBack-end\u003c/b\u003e: Strong hands-on experience with \u003cb\u003eNode.js\u003c/b\u003e, \u003cb\u003eJava (Spring)\u003c/b\u003e; designing REST/GraphQL APIs with clear contracts, authentication and encryption mechanisms, backward compatibility, and resilience for enterprise and third-party integrations.\",\"frontend\":\"\u003cb\u003eFront-end\u003c/b\u003e: Solid experience building and maintaining complex client applications using \u003cb\u003eReact\u003c/b\u003e (TypeScript, Next.js), \u003cb\u003eReact Native\u003c/b\u003e, and Angular-based Micro-Frontend hosts; applying performance optimization, state management, and scalable UI architecture patterns.\",\"databases\":\"\u003cb\u003eDatabases\u003c/b\u003e: Deep practical experience with \u003cb\u003eMySQL\u003c/b\u003e, focusing on schema and data-model design, indexing strategies, query optimization, transaction boundaries, migration planning, and consistency trade-offs in distributed and high-throughput systems.\",\"infra\":\"\u003cb\u003eInfrastructure \u0026 Platform Engineering\u003c/b\u003e: Hands-on with \u003cb\u003eDocker\u003c/b\u003e and \u003cb\u003eKubernetes\u003c/b\u003e across multiple environments; experience operating managed clusters (\u003cb\u003eAKS\u003c/b\u003e, \u003cb\u003eEKS\u003c/b\u003e, \u003cb\u003eFKE\u003c/b\u003e, \u003cb\u003eK3S\u003c/b\u003e), GitOps-based deployments with \u003cb\u003eArgoCD\u003c/b\u003e, CI/CD pipelines, environment configuration, and domain/SSL management.\",\"architecture\":\"\u003cb\u003eArchitecture \u0026 Delivery Practices\u003c/b\u003e: Experience applying Micro-Frontend and multi-tenant architectures, feature-flag-driven rollouts, progressive delivery strategies, and observability practices to support safe releases and production diagnostics.\",\"testing\":\"\u003cb\u003eTesting\u003c/b\u003e: Practical use of Jest, Cucumber, Puppeteer, and Testing Library to ensure regression safety, release confidence, and production readiness across services and applications.\",\"libraries\":\"\u003cb\u003eLibraries\u003c/b\u003e: Seasoned in \u003cb\u003eFirebase\u003c/b\u003e, Strapi, Directus, React Flow, Webpack, \u003cb\u003eRedux\u003c/b\u003e, React Query, and G2plot.\",\"other\":\"\u003cb\u003eOther\u003c/b\u003e: In addition, familiar with \u003cb\u003eMicro-frontend\u003c/b\u003e architecture, Proficiency in Responsive Design, Cross-Browser Compatibility, \u003cb\u003eSEO\u003c/b\u003e, GraphQL, and Electron.\"}},\"Experience\":{\"labels\":{\"location\":\"Location\",\"duration\":\"Duration\",\"keyContributions\":\"Key contributions\",\"keyTechnologies\":\"Key technologies\"},\"ndsvn\":{\"summary\":\"Owned product delivery and technical direction post-CTO transition, leading architecture decisions, rollout systems, enterprise-grade integrations, and cross-team alignment while managing a delivery team of 8 developers (including 4 seniors) and 3 QC engineers.\",\"contributions\":[\"Engineered a .NET Core multi-tenant feature flag system \u003cb\u003e(30+ tenants, ~40k users)\u003c/b\u003e with a priority rule engine, percentage rollout (tenant/segment/env), JSON-config values, and stateless runtime evaluation—powering mobile/web apps and enabling controlled, progressive production releases across high-traffic tenants.\",\"Built secure integrations with \u003cb\u003eGtel \u0026 Napas\u003c/b\u003e: RSA-4096 handshake, AES-256 payload encryption, \u003cb\u003emTLS\u003c/b\u003e mutual authentication, certificate pinning, retry queues, idempotent API contracts, and ACK-driven monitoring for unstable third-party services.\",\"Implemented \u003cb\u003eMicro-Frontend\u003c/b\u003e architecture (Angular host + React modules) enabling independent deploy cycles and feature isolation—reducing regression surface and deployment coupling across teams.\",\"Introduced observability stack (PostHog + metrics pipeline + workflow) for rollout impact, feature adoption, anomaly detection, and regression tracing—cut debugging/analysis time significantly across release cycles.\",\"Assumed ownership of inherited infrastructure and kept the organization moving—quietly absorbing production fires, pipeline failures, cluster quirks, and integration instability so the product and teams never stalled; shaping ArgoCD, CI/CD, domains/SSL, and \u003cb\u003eAKS/FKE/K3S/EKS\u003c/b\u003e clusters into systems that are \u003cb\u003ediagnosable, recoverable, and stable instead of recurring unknowns\u003c/b\u003e.\",\"Built \u003cb\u003eAI agents\u003c/b\u003e supporting code review, deployment assistant, service-quota validation, API health monitoring, and release analysis; shortened decision \u0026 delivery loops across product teams.\",\"Developed integration simulations and sandbox/demo modules to handle unstable partners and secure pre-contract validation with third-party ecosystems.\",\"\u003cb\u003eRe-structured engineering organization\u003c/b\u003e after leadership transition: defined org chart, competency matrix, workload routing, and ownership boundaries—unlocking autonomy and reducing lead-time on technical decisions.\",\"Established a unified engineering playbook: branch strategy, commit convention, release tagging, rollout criteria, API/integration rules, and technical spec repository (RFCs, runbooks, troubleshooting guides).\",\"Led hiring and capability growth loops: structured interviews (QC/Fullstack), onboarding path, 1:1 coaching, performance review cycles, and cross-team conflict resolution to keep delivery collaborative and output-focused.\",\"Maintained delivery quality through documentation-first culture and process guardrails (checklists, handover rules, rollback readiness), ensuring predictable release cadences during scaling.\"]},\"zalo\":{\"summary1\":\"Core developer for the cross-platform \u003cb\u003eZalo PC\u003c/b\u003e (Web, macOS, Windows), serving \u003cb\u003e15M+ MAU\u003c/b\u003e. Delivered key features such as dark mode, dynamic theming, and user behavior tracking. Spearheaded the development of a promotion flow and a scalable \u003cb\u003edesign system\u003c/b\u003e for \u003cb\u003e50+ developers\u003c/b\u003e. Optimized performance, enhanced maintainability, and contributed to business growth through robust and efficient solutions.\",\"summary2\":\"Actively maintained and improved \u003cb\u003eZalo's Android\u003c/b\u003e mobile app, ensuring the \u003cb\u003estability\u003c/b\u003e and \u003cb\u003eperformance\u003c/b\u003e of critical features for nearly \u003cb\u003e80 million users\u003c/b\u003e.\",\"contributions\":[\"Delivered over \u003cb\u003e10 features\u003c/b\u003e, including dark mode, a download module, kiki bot, log tracking, and more, improving UX and engagement.\",\"Developed a \u003cb\u003epromotion flow\u003c/b\u003e with integrated tracking and monitoring systems, driving activation success across \u003cb\u003e15M+ MAU\u003c/b\u003e.\",\"Led the development of a scalable \u003cb\u003edesign system\u003c/b\u003e using Storybook, ensuring UI consistency and efficiency for \u003cb\u003e50+ developers\u003c/b\u003e.\",\"Proactively supported \u003cb\u003e50+ client users\u003c/b\u003e, swiftly resolving issues with \u003cb\u003ededication\u003c/b\u003e and \u003cb\u003eeffective problem-solving\u003c/b\u003e, earning strong positive feedback.\",\"Maintained and improved \u003cb\u003e3+\u003c/b\u003e features in \u003cb\u003eZalo's Android\u003c/b\u003e app, focusing on \u003cb\u003estability\u003c/b\u003e, \u003cb\u003eperformance\u003c/b\u003e, and seamless user experience for nearly \u003cb\u003e80 million users\u003c/b\u003e.\"]},\"primedata\":{\"summary\":\"The company builds a so-called CDxP product. In brief, it is a data platform that tailor-made to host and process customer profiles (the keystone solution is how would you able to identify and unify your customers data from heterogeneous schemas and formats from diverged services and systems).\",\"contributions\":[\"Led Front-end team, delivering \u003cb\u003e10+ projects\u003c/b\u003e including CDxP app, Magento \u0026 WordPress demos, JS SDKs, mobile SDKs, and more.\",\"Managed team of \u003cb\u003e4 members\u003c/b\u003e, aligning with product roadmap to satisfy multiple major partners, enhancing UI/UX and implementing advanced features like 360 profiles and campaign builders.\",\"Developed lightweight JS SDK with full functionalities (\u003cb\u003e\u003c200kb, \u003c150ms\u003c/b\u003e load time), facilitating seamless integration across projects.\",\"Demonstrated rapid \u003cb\u003eproblem-solving\u003c/b\u003e, ensuring swift feature demonstrations to impress clients and investors.\"]},\"splus\":{\"summary\":\"An out-sourcing company. Most projects revolve around \u003cb\u003emobile and web apps\u003c/b\u003e.\",\"contributions\":[\"With expertise in the \u003cb\u003eend-to-end software production process\u003c/b\u003e, I \u003cb\u003eled a small team\u003c/b\u003e, mastering the phases from requirements gathering to project security, laying the groundwork for future leadership roles.\",\"Engaging in \u003cb\u003e8+\u003c/b\u003e diverse projects across \u003cb\u003eeducation, food and drink, banking,\u003c/b\u003e and \u003cb\u003ee-commerce\u003c/b\u003e domains, I gained invaluable insights into both web and mobile application development.\",\"As a project mercenary, I secured significant projects like Savyu and Bank Tool, generating over \u003cb\u003e$20,000\u003c/b\u003e in revenue and earning recognition as the \u003cb\u003eBest Rookie of the Year\u003c/b\u003e for my impactful contributions.\"]},\"propman\":{\"summary\":\"A \u003cb\u003ereal estate-domain\u003c/b\u003e startup. I was one of the founding engineers.\",\"contributions\":[\"Initiated involvement in primary web app development as a Front-end Developer. Obtained foundational web development skills, with a specialization in \u003cb\u003eReact JS\u003c/b\u003e and related technologies. Collaborated on responsive design projects, prioritizing enhancements for user experience.\"]}},\"Projects\":{\"sat\":{\"accomplishments\":[\"Orchestrated product development spanning UI/UX design, product engineering, and user behavior analysis, resulting in a global user base exceeding \u003cb\u003e10,000\u003c/b\u003e visits and \u003cb\u003e3,000\u003c/b\u003e signups within two months.\",\"Elevated Google search rankings through strategic SEO initiatives, including proficiency in \u003cb\u003eparasite SEO\u003c/b\u003e techniques. These efforts led to significant performance enhancements and effective positioning of the product in alignment with industry peers.\",\"Demonstrated efficiency and resource optimization in front-end application development by leveraging a single Cloud Run instance with \u003cb\u003e1 CPU\u003c/b\u003e and a memory limit of \u003cb\u003e256 MiB\u003c/b\u003e.\",\"Spearheaded the development of a mobile app with a \u003cb\u003emobile-first\u003c/b\u003e approach, enabling rapid deployment to app stores within \u003cb\u003etwo days\u003c/b\u003e. Additionally, ensured seamless \u003cb\u003ePWA\u003c/b\u003e installation across all devices, enhancing accessibility and user experience.\",\"Developed \u003cb\u003emonetization features\u003c/b\u003e, including the integration of \u003cb\u003eGoogle Ads\u003c/b\u003e and the implementation of the \u003cb\u003eStripe\u003c/b\u003e payment flow, to enhance revenue generation.\"]},\"cdp\":{\"accomplishments\":[\"Led the architecture and implementation of the CDxP project, focusing on \u003cb\u003eUI/UX\u003c/b\u003e features, which enhanced the overall user experience and increased user engagement.\",\"Configured nested routers, maintained a \u003cb\u003escalable\u003c/b\u003e project structure and demonstrated strong knowledge of ES6, Typescript, and data types, which \u003cb\u003eimproved code maintainability\u003c/b\u003e and reduced code-related issues.\",\"Effectively \u003cb\u003etracked errors\u003c/b\u003e, and enhancements, and provided support for bug fixes, ensuring the project's \u003cb\u003estability\u003c/b\u003e, which improved system reliability and reduced system downtime.\",\"Implemented \u003cb\u003eRBAC\u003c/b\u003e hooks to verify authorization for accessing components in adaptive client configurations. Additionally, I have built over \u003cb\u003e20 reusable utility features\u003c/b\u003e that can be shared across different projects thanks to their modular design.\",\"Engineered \u003cb\u003e10+ advanced features\u003c/b\u003e such as profiles, campaigns, analytics, and more.\",\"Established robust testing flow, covering core CDP features with \u003cb\u003e100+ scenarios\u003c/b\u003e and \u003cb\u003e1000+ test cases\u003c/b\u003e.\",\"Acquired domain expertise and excelled in testing methodologies, including BDD, unit testing, and \u003cb\u003eE2E testing\u003c/b\u003e, which improved test coverage and reduced software bugs by \u003cb\u003e30%\u003c/b\u003e.\",\"Developed a \u003cb\u003efeature flag\u003c/b\u003e for runtime toggling, enabling A/B testing and feature grouping based on customer segments, which optimized feature delivery and increased feature adoption.\",\"\u003cb\u003eDocumented\u003c/b\u003e components for clarity and ease of maintenance, which improved code readability and reduced maintenance time.\"]},\"sdk\":{\"accomplishments\":[\"Successfully developed over \u003cb\u003e5 modules\u003c/b\u003e, incorporating more than \u003cb\u003e10 advanced features\u003c/b\u003e using \u003cb\u003evanilla JS\u003c/b\u003e. Achieved an impressive bundle size of \u003cb\u003e\u003c200kb and a load time of \u003c150ms\u003c/b\u003e (metrics measured prior to employing all optimization techniques for the bundle).\",\"Utilized \u003cb\u003eweb workers and service workers\u003c/b\u003e to facilitate multitasking in the background, effectively managing complex functionalities and handling \u003cb\u003emultiple edge cases\u003c/b\u003e, such as simultaneous multi-tab usage.\",\"Additionally, designed and implemented a \u003cb\u003epersonalized recommendation feature\u003c/b\u003e using a \u003cb\u003emicro-frontend\u003c/b\u003e architecture, specifically a carousel block showcasing products users may love, thereby enhancing user experience and engagement.\",\"Among the various advanced features built are web pop-ups, web push notifications, \u003cb\u003eweb component embedding\u003c/b\u003e, WebSocket integration, and management of annoying pop-ups across multiple tabs.\",\"Furthermore, leveraged \u003cb\u003eJS Closure\u003c/b\u003e to organize module structures, enabling seamless feature export or \u003cb\u003edata encapsulation\u003c/b\u003e, thereby \u003cb\u003eavoid conflicts\u003c/b\u003e within the global scope.\"]},\"vac\":{\"accomplishments\":[\"Took on the responsibility of \u003cb\u003eteaching\u003c/b\u003e a \u003cb\u003eFront-end Project\u003c/b\u003e course at Vietnam Australia Center.\",\"Designed and delivered \u003cb\u003eengaging lectures\u003c/b\u003e, providing hands-on guidance to students on front-end development projects.\",\"Focused on fostering a \u003cb\u003ecollaborative\u003c/b\u003e learning environment, encouraging \u003cb\u003eteamwork\u003c/b\u003e for \u003cb\u003e12 students\u003c/b\u003e, and aligning coursework with industry best practices.\",\"Provided personalized \u003cb\u003efeedback\u003c/b\u003e and \u003cb\u003ementoring\u003c/b\u003e, supporting students in \u003cb\u003eovercoming challenges\u003c/b\u003e and ensuring a comprehensive understanding of the course material.\"]},\"mona\":{\"accomplishments\":[\"Developed a comprehensive mobile application, Mona House, using \u003cb\u003eReact Native\u003c/b\u003e and Realm DB for efficient house management.\",\"Specialized in creating cross-platform apps with a focus on \u003cb\u003ereusable components\u003c/b\u003e, smooth animations, and seamless integration with native modules.\",\"Demonstrated strong \u003cb\u003eproblem-solving\u003c/b\u003e and \u003cb\u003etroubleshooting\u003c/b\u003e skills, swiftly identifying and resolving complex issues through advanced debugging tools and performance profiling.\",\"Exhibited \u003cb\u003eadaptability\u003c/b\u003e and a \u003cb\u003equick learning curve\u003c/b\u003e for new technologies, allowing seamless implementation of new frameworks, programming languages, or tools to ensure project completion.\"]},\"mobivi\":{\"accomplishments\":[\"Developed a \u003cb\u003efull-stack web application\u003c/b\u003e at Mobivi, focusing on ingesting and processing data over \u003cb\u003e20 Excel files\u003c/b\u003e, each containing over \u003cb\u003e20,000 records\u003c/b\u003e.\",\"The application was designed to efficiently handle progressively calculated transactional data from users, \u003cb\u003eensuring accurate and reliable reporting\u003c/b\u003e.\"]},\"savyu\":{\"accomplishments\":[\"Played a pivotal role in the development of \u003cb\u003etwo mobile\u003c/b\u003e applications at Synova - one catering to merchants and the other targeting consumers.\",\"Contributed to the creation of a \u003cb\u003eweb application\u003c/b\u003e empowering administrators to efficiently manage user data.\",\"Demonstrated \u003cb\u003eproficiency in mobile app\u003c/b\u003e development, collaborating with cross-functional teams to ensure the successful delivery of \u003cb\u003eintuitive\u003c/b\u003e and \u003cb\u003ehigh-performing\u003c/b\u003e applications.\"]}},\"CTA\":{\"eyebrow\":\"Let's build something\",\"title\":\"Have a hard problem worth shipping?\",\"body\":\"I'm most useful where products are scaling fast, teams need clarity, and infrastructure has to behave under load. Reach out — I read every message.\",\"emailMe\":\"Email me\",\"resumePdf\":\"Résumé (PDF)\",\"linkedin\":\"LinkedIn\"},\"SEO\":{\"home\":{\"title\":\"Nguyen Le Phong — Senior Software Engineer \u0026 Tech Lead\",\"description\":\"Senior Software Engineer \u0026 Head of Tech with 8+ years building product, leading delivery, and architecting Micro-Frontend, Kubernetes, and rollout systems. Bachelor of IT — Very Good (GPA 3.36).\"}},\"Pages\":{\"cv\":{\"title\":\"Software Engineer\"},\"about\":{\"heading\":\"About me\"},\"apps\":{\"heading\":\"Apps\"},\"gallery\":{\"eyebrow\":\"Gallery\",\"title\":\"A record of the work\",\"sub\":\"Certificates, awards, projects, and a few off-screen moments. Click any item to open the full image or its verification link.\",\"back\":\"← Back to CV\",\"all\":\"All\",\"categories\":{\"certificates\":\"Certifications\",\"awards\":\"Awards\",\"projects\":\"Projects\",\"activities\":\"Activities\"}},\"thoughts\":{\"eyebrow\":\"Thought garden\",\"title\":\"Thoughts\",\"intro\":\"A small, living graph of notes. Some are ripe; most are still seedlings. Click any title to read more.\",\"empty\":\"No thoughts yet.\",\"backToIndex\":\"Back to thoughts\",\"backlinks\":\"Backlinks\",\"maturity\":{\"seed
