          </style><script type="application/ld+json">{"@context":"https://schema.org","@type":"CollectionPage","@id":"https://nguyenlephong.github.io/fr/studio#studio","name":"Studio — Engineering Flows, AI Notes & System Design","description":"A public working shelf for system design flows, release readiness, AI-assisted delivery, machine setup, daily learning checklists, and skill libraries.","url":"https://nguyenlephong.github.io/fr/studio","inLanguage":"fr","isPartOf":{"@type":"WebSite","@id":"https://nguyenlephong.github.io/#website"},"author":{"@type":"Person","@id":"https://nguyenlephong.github.io/#person"},"hasPart":[{"@type":"TechArticle","headline":"AI Operating System","description":"This note turns the AI stack into a daily operating system: NotebookLM keeps source-backed truth, GPT plans, Claude critiques, Codex ships code, Antigravity verifies prototypes, and every useful lesson becomes a reusable artifact.","url":"https://nguyenlephong.github.io/fr/studio#ai-operating-system","dateModified":"2026-06-21","keywords":"AI OS, NotebookLM, GPT, Claude, Codex, Antigravity, Daily learning"},{"@type":"TechArticle","headline":"AI-Driven Engineering Foundation","description":"This note keeps the long-term learning direction visible: AI can generate code quickly, but senior leverage comes from asking the right technical questions, choosing the right trade-offs, verifying failure modes, and owning production behavior.","url":"https://nguyenlephong.github.io/fr/studio#ai-driven-engineering-foundation","dateModified":"2026-06-21","keywords":"Engineering roadmap, Architecture, Data, Resilience, Observability, AI workflow"},{"@type":"TechArticle","headline":"AI-Driven System Engineering Roadmap","description":"This roadmap keeps the next learning layer visible: AI can write code faster, but a senior engineer must own architecture decisions, verify distributed failure modes, understand storage trade-offs, and use AI as a disciplined reviewer.","url":"https://nguyenlephong.github.io/fr/studio#ai-system-engineering-roadmap","dateModified":"2026-06-21","keywords":"AI up-skill, System engineering, SDLC, Distributed systems, Storage, AI workflow"},{"@type":"TechArticle","headline":"Antigravity Awesome Skills","description":"This is not a list of every installed skill. It is the install note I need when I move to a new machine: what to run, where the source lives, and what to ask an agent to restore.","url":"https://nguyenlephong.github.io/fr/studio#antigravity-awesome-skills","dateModified":"2026-06-20","keywords":"AI setup, Antigravity, Codex, Claude, Gemini, Skills"},{"@type":"TechArticle","headline":"Open Design","description":"Open Design can support this Studio direction as a design reference and future MCP integration. I do not have a callable Open Design tool in this session, but the project itself is worth keeping in the setup notes.","url":"https://nguyenlephong.github.io/fr/studio#open-design","dateModified":"2026-06-20","keywords":"Design, MCP, Codex, Claude, Gemini, Antigravity"},{"@type":"TechArticle","headline":"Computer setup","description":"This note is for the non-terminal part of a new engineering machine: folders, browsers, fonts, login flows, and basic safety rules.","url":"https://nguyenlephong.github.io/fr/studio#computer-baseline","dateModified":"2026-06-20","keywords":"Computer setup, macOS, Browser, Security"},{"@type":"TechArticle","headline":"Terminal setup","description":"This note keeps the command-line setup close to the actual work: Git, GitHub CLI, Node/Bun, Java/PlantUML, deployment commands, and AI CLI install commands.","url":"https://nguyenlephong.github.io/fr/studio#terminal-baseline","dateModified":"2026-06-20","keywords":"Terminal setup, Git, Node, Bun, PlantUML"},{"@type":"TechArticle","headline":"Multi-agent AI","description":"Future note for patterns where multiple agents help plan, code, review, test, or research without turning the workflow into noise.","url":"https://nguyenlephong.github.io/fr/studio#multi-agent-ai","dateModified":"2026-06-20","keywords":"AI learning, Multi-agent, Workflow"},{"@type":"TechArticle","headline":"OpenHands","description":"A placeholder note for OpenHands. The useful future version should include install commands, project fit, and where it overlaps with Codex or Claude.","url":"https://nguyenlephong.github.io/fr/studio#openhands","dateModified":"2026-06-20","keywords":"AI learning, OpenHands"},{"@type":"TechArticle","headline":"CrewAI","description":"A placeholder note for CrewAI. The future note should focus on when a crew abstraction helps more than a plain script or a single agent.","url":"https://nguyenlephong.github.io/fr/studio#crewai","dateModified":"2026-06-20","keywords":"AI learning, CrewAI, Agents"},{"@type":"HowTo","name":"System Design Interview Flow for Senior Software Engineers","description":"A practical system design flow for framing requirements, choosing boundaries, modeling data, handling scale, and explaining trade-offs clearly.","url":"https://nguyenlephong.github.io/fr/studio?route=flow-system-design&flow=system-design#flow-system-design","keywords":"System Design, Architecture, Trade-offs, Interview","step":[{"@type":"HowToStep","position":1,"name":"Frame the problem","text":"Restate users, jobs, constraints, and non-goals before naming any technology. A short problem frame and a list of assumptions to confirm."},{"@type":"HowToStep","position":2,"name":"Shape the interfaces","text":"Sketch APIs, events, user actions, and admin actions around the real workflow. API/event contract notes with the first boundary decisions."},{"@type":"HowToStep","position":3,"name":"Model the data","text":"Choose ownership, consistency rules, indexes, retention, and migration direction. Data model sketch plus consistency and migration notes."},{"@type":"HowToStep","position":4,"name":"Design the runtime","text":"Place services, queues, cache, workers, and gateways only where they solve a named pressure. Runtime architecture with the reason behind each moving part."},{"@type":"HowToStep","position":5,"name":"Stress the failure modes","text":"Walk through slow dependencies, duplicate requests, partial writes, bad deploys, and stale reads. Failure-mode table with mitigation and monitoring hooks."},{"@type":"HowToStep","position":6,"name":"Explain the evolution path","text":"Name the first practical version, the breaking points, and the next design when traffic or team size changes. Versioned roadmap: v1, scale trigger, and rejected alternatives."}]},{"@type":"HowTo","name":"Architecture Decision Flow with RFC and ADR Thinking","description":"A practical architecture decision flow for comparing options, scoring trade-offs, documenting risks, and aligning teams before implementation.","url":"https://nguyenlephong.github.io/fr/studio?route=flow-architecture-decision&flow=architecture-decision#flow-architecture-decision","keywords":"RFC, ADR, Architecture Review, Decision Matrix","step":[{"@type":"HowToStep","position":1,"name":"Name the decision","text":"Write the decision in one sentence and make the scope small enough to approve. Decision statement with scope and non-goals."},{"@type":"HowToStep","position":2,"name":"Extract invariants","text":"List what must remain true for users, money, permissions, data, audit, and support. Invariant list that every option must satisfy."},{"@type":"HowToStep","position":3,"name":"Compare real options","text":"Evaluate two or three practical options, not a perfect design against a strawman. Option table with honest trade-offs."},{"@type":"HowToStep","position":4,"name":"Set risk gates","text":"Define validation, telemetry, rollout, and rollback before implementation starts. Decision gates and launch conditions."},{"@type":"HowToStep","position":5,"name":"Write the decision","text":"Keep the final note short enough to read during review, but complete enough to survive handoff. ADR/RFC entry ready for review."}]},{"@type":"HowTo","name":"Production Incident Response Flow for Engineering Teams","description":"A production incident flow for triage, blast-radius control, rollback, communication, root cause analysis, and follow-up tracking.","url":"https://nguyenlephong.github.io/fr/studio?route=flow-incident-response&flow=incident-response#flow-incident-response","keywords":"Incident, SRE, Rollback, Postmortem","step":[{"@type":"HowToStep","position":1,"name":"Confirm the signal","text":"Separate a real user-impacting incident from a noisy metric or isolated dependency blip. Incident status, severity, and initial owner."},{"@type":"HowToStep","position":2,"name":"Contain blast radius","text":"Protect users first with flags, rate limits, rollback, traffic shift, or temporary disablement. Mitigation action with expected user impact."},{"@type":"HowToStep","position":3,"name":"Coordinate the room","text":"Assign incident lead, comms, investigation, and verification so the team does not duplicate effort. Shared incident timeline and communication cadence."},{"@type":"HowToStep","position":4,"name":"Verify recovery","text":"Do not close the incident just because one graph improves; check the user path and downstream queues. Recovery confirmation and watch window."},{"@type":"HowToStep","position":5,"name":"Write the follow-up","text":"Turn the incident into prevention work without blaming the person who touched the deploy. Postmortem, action items, owners, and due dates."}]},{"@type":"HowTo","name":"Release Readiness Flow for Safe Software Rollouts","description":"A release readiness flow for validating tests, analytics, migration safety, observability, communication, rollout gates, and rollback plans.","url":"https://nguyenlephong.github.io/fr/studio?route=flow-release-readiness&flow=release-readiness#flow-release-readiness","keywords":"Release, Rollout, QA, Observability","step":[{"@type":"HowToStep","position":1,"name":"Confirm scope","text":"Match the release to the ticket, acceptance criteria, non-goals, and user-facing behavior. Release scope and explicit non-goals."},{"@type":"HowToStep","position":2,"name":"Verify behavior","text":"Run the checks that match the risk: unit, integration, E2E, accessibility, typecheck, and manual smoke. Verification note with remaining risk."},{"@type":"HowToStep","position":3,"name":"Check data and migrations","text":"Review schema changes, backfills, indexes, caches, analytics events, and SEO paths. Data and tracking readiness checklist."},{"@type":"HowToStep","position":4,"name":"Prepare observability","text":"Make sure the release can be watched after deploy with actionable signals, not vanity graphs. Watch plan and escalation path."},{"@type":"HowToStep","position":5,"name":"Make the rollout decision","text":"Choose gradual rollout, immediate release, hold, or rollback based on evidence. Go/hold decision with rollback trigger."}]},{"@type":"HowTo","name":"AI-Assisted Software Delivery Flow with Human Review","description":"An AI-assisted delivery flow for scoping tasks, packaging context, applying changes, verifying behavior, and handing off review-ready work.","url":"https://nguyenlephong.github.io/fr/studio?route=flow-ai-delivery&flow=ai-delivery#flow-ai-delivery","keywords":"AI Delivery, Agents, Code Review, Verification","step":[{"@type":"HowToStep","position":1,"name":"Scope the task","text":"Translate the request into acceptance criteria, affected surfaces, non-goals, and privacy boundaries. Task brief with clear boundaries."},{"@type":"HowToStep","position":2,"name":"Package context","text":"Give the agent the files, examples, conventions, tests, and warnings that matter. Context pack and implementation hints."},{"@type":"HowToStep","position":3,"name":"Execute in small slices","text":"Keep edits narrow, use existing abstractions, and verify each risky boundary before moving on. Focused implementation diff."},{"@type":"HowToStep","position":4,"name":"Verify and review","text":"Run tests, inspect the diff, check copy quality, analytics wiring, and security/privacy implications. Verification summary and review notes."},{"@type":"HowToStep","position":5,"name":"Handoff cleanly","text":"Prepare commit, PR, release notes, or deployment only when the human request allows it. Commit/PR/deploy-ready handoff."}]},{"@type":"HowTo","name":"Engineering Portfolio Story Flow for CV and Interview Proof","description":"A portfolio story flow for turning engineering work into clear context, actions, trade-offs, impact, evidence, and next-step learning.","url":"https://nguyenlephong.github.io/fr/studio?route=flow-portfolio-story&flow=portfolio-story#flow-portfolio-story","keywords":"CV, Portfolio, Writing, Career","step":[{"@type":"HowToStep","position":1,"name":"Capture context","text":"Name the team situation, user pain, constraints, and why the work mattered at that moment. Context paragraph that feels specific, not inflated."},{"@type":"HowToStep","position":2,"name":"Show the actions","text":"Describe what you changed, decided, coordinated, or simplified in plain engineering language. Action list with technical and collaboration detail."},{"@type":"HowToStep","position":3,"name":"Name the trade-offs","text":"Explain the constraint that made the work interesting: time, reliability, UX, cost, privacy, or team capacity. Trade-off note that shows judgment."},{"@type":"HowToStep","position":4,"name":"Prove the impact","text":"Use numbers when available, but also capture reduced risk, cleaner handoff, better reliability, or faster support. Impact statement with evidence and caveat."},{"@type":"HowToStep","position":5,"name":"Shape the story","text":"Turn the raw material into the right format for CV, interview, blog, or portfolio page. CV bullet, STAR answer, blog outline, or case-study draft."}]},{"@type":"HowTo","name":"React Flow Example for Software Diagrams","description":"A React Flow studio demo with built-in node styles, custom architecture shapes, grouping, layout, validation, whiteboard annotation, edge types, labels, markers, minimap, controls, and background.","url":"https://nguyenlephong.github.io/fr/studio?route=flow-react-flow-architecture-demo&flow=react-flow-architecture-demo#flow-react-flow-architecture-demo","keywords":"React Flow, XYFlow, Architecture Diagram, Node Shapes, Edge Types","step":[{"@type":"HowToStep","position":1,"name":"Show node primitives","text":"Render input, default, output, and group-style nodes before adding custom architecture vocabulary. A baseline canvas that shows the primitives React Flow starts from."},{"@type":"HowToStep","position":2,"name":"Add architecture shapes","text":"Use custom nodes for API gateways, services, workers, databases, cache, queues, topics, external systems, decisions, risks, and notes. A reusable shape catalog for system diagrams."},{"@type":"HowToStep","position":3,"name":"Compare edge types","text":"Show default, straight, step, smoothstep, and simplebezier edges with labels, arrows, and animated async paths. An edge language that makes architecture diagrams easier to read."},{"@type":"HowToStep","position":4,"name":"Use canvas controls","text":"Keep Background, Controls, MiniMap, fitView, zoom, and pan available so large architecture maps remain inspectable. A diagram surface that works for both overview and inspection."},{"@type":"HowToStep","position":5,"name":"Model system architecture","text":"Place client, edge, domain, data, external, and operations zones in one architecture story. A checkout-style reference architecture that demonstrates the full shape set."},{"@type":"HowToStep","position":6,"name":"Turn demo into a template","text":"Use the demo as a starting point for architecture review, RFC, ADR, onboarding, or incident explanation. A React Flow architecture template ready to adapt."}]},{"@type":"HowTo","name":"React Flow System Design Blueprint Example","description":"A large React Flow system design blueprint with grouped architecture zones, custom nodes, labeled edges, animated async paths, minimap, controls, and focused diagram views.","url":"https://nguyenlephong.github.io/fr/studio?route=flow-react-flow-system-blueprint&flow=react-flow-system-blueprint#flow-react-flow-system-blueprint","keywords":"React Flow, System Design, Blueprint, Distributed Systems, Media Pipeline","step":[{"@type":"HowToStep","position":1,"name":"Map edge entry","text":"Show how the domain lookup, resolver, CDN, request metadata, security policy, and API gateway connect before traffic reaches services. A visible ingress path that makes the request journey clear."},{"@type":"HowToStep","position":2,"name":"Show runtime topology","text":"Separate load balancing, frontend servers, backend services, message dispatch, and connection ownership. A runtime zone that explains where live traffic is accepted, routed, and dispatched."},{"@type":"HowToStep","position":3,"name":"Surface coordination","text":"Make distributed IDs, locks, concurrency choices, and metadata tables first-class parts of the diagram. A coordination layer that shows how writes and streaming chunks stay stable."},{"@type":"HowToStep","position":4,"name":"Trace storage and media","text":"Connect primary databases, shards, replicas, cache, object storage, queue, processing workers, and encoded output. A data and media pipeline that can be inspected without leaving the canvas."},{"@type":"HowToStep","position":5,"name":"Fan out downstream","text":"Show downstream consumers such as notification, recommendations, logging, search, analytics, and payment charge. A fan-out zone that makes secondary effects visible instead of hiding them behind one box."}]}]}</script><div aria-label="Studio Admin dashboard" data-studio-shadow-host="" style="display:block;min-height:100vh"></div></main><!--$--><!--/$--><footer class="app-footer"><div class="app-footer-inner"><div class="footer-meta"><p class="footer-name">Nguyen Le Phong</p><p class="footer-tag">Senior Software Engineer · Tech Lead</p></div><div class="footer-center" tebookLM, GPT, Claude, Codex, Antigravity, Daily learning\"},{\"@type\":\"TechArticle\",\"headline\":\"AI-Driven Engineering Foundation\",\"description\":\"This note keeps the long-term learning direction visible: AI can generate code quickly, but senior leverage comes from asking the right technical questions, choosing the right trade-offs, verifying failure modes, and owning production behavior.\",\"url\":\"https://nguyenlephong.github.io/fr/studio#ai-driven-engineering-foundation\",\"dateModified\":\"2026-06-21\",\"keywords\":\"Engineering roadmap, Architecture, Data, Resilience, Observability, AI workflow\"},{\"@type\":\"TechArticle\",\"headline\":\"AI-Driven System Engineering Roadmap\",\"description\":\"This roadmap keeps the next learning layer visible: AI can write code faster, but a senior engineer must own architecture decisions, verify distributed failure modes, understand storage trade-offs, and use AI as a disciplined reviewer.\",\"url\":\"https://nguyenlephong.github.io/fr/studio#ai-system-engineering-roadmap\",\"dateModified\":\"2026-06-21\",\"keywords\":\"AI up-skill, System engineering, SDLC, Distributed systems, Storage, AI workflow\"},{\"@type\":\"TechArticle\",\"headline\":\"Antigravity Awesome Skills\",\"description\":\"This is not a list of every installed skill. It is the install note I need when I move to a new machine: what to run, where the source lives, and what to ask an agent to restore.\",\"url\":\"https://nguyenlephong.github.io/fr/studio#antigravity-awesome-skills\",\"dateModified\":\"2026-06-20\",\"keywords\":\"AI setup, Antigravity, Codex, Claude, Gemini, Skills\"},{\"@type\":\"TechArticle\",\"headline\":\"Open Design\",\"description\":\"Open Design can support this Studio direction as a design reference and future MCP integration. I do not have a callable Open Design tool in this session, but the project itself is worth keeping in the setup notes.\",\"url\":\"https://nguyenlephong.github.io/fr/studio#open-design\",\"dateModified\":\"2026-06-20\",\"keywords\":\"Design, MCP, Codex, Claude, Gemini, Antigravity\"},{\"@type\":\"TechArticle\",\"headline\":\"Computer setup\",\"description\":\"This note is for the non-terminal part of a new engineering machine: folders, browsers, fonts, login flows, and basic safety rules.\",\"url\":\"https://nguyenlephong.github.io/fr/studio#computer-baseline\",\"dateModified\":\"2026-06-20\",\"keywords\":\"Computer setup, macOS, Browser, Security\"},{\"@type\":\"TechArticle\",\"headline\":\"Terminal setup\",\"description\":\"This note keeps the command-line setup close to the actual work: Git, GitHub CLI, Node/Bun, Java/PlantUML, deployment commands, and AI CLI install commands.\",\"url\":\"https://nguyenlephong.github.io/fr/studio#terminal-baseline\",\"dateModified\":\"2026-06-20\",\"keywords\":\"Terminal setup, Git, Node, Bun, PlantUML\"},{\"@type\":\"TechArticle\",\"headline\":\"Multi-agent AI\",\"description\":\"Future note for patterns where multiple agents help plan, code, review, test, or research without turning the workflow into noise.\",\"url\":\"https://nguyenlephong.github.io/fr/studio#multi-agent-ai\",\"dateModified\":\"2026-06-20\",\"keywords\":\"AI learning, Multi-agent, Workflow\"},{\"@type\":\"TechArticle\",\"headline\":\"OpenHands\",\"description\":\"A placeholder note for OpenHands. The useful future version should include install commands, project fit, and where it overlaps with Codex or Claude.\",\"url\":\"https://nguyenlephong.github.io/fr/studio#openhands\",\"dateModified\":\"2026-06-20\",\"keywords\":\"AI learning, OpenHands\"},{\"@type\":\"TechArticle\",\"headline\":\"CrewAI\",\"description\":\"A placeholder note for CrewAI. The future note should focus on when a crew abstraction helps more than a plain script or a single agent.\",\"url\":\"https://nguyenlephong.github.io/fr/studio#crewai\",\"dateModified\":\"2026-06-20\",\"keywords\":\"AI learning, CrewAI, Agents\"},{\"@type\":\"HowTo\",\"name\":\"System Design Interview Flow for Senior Software Engineers\",\"description\":\"A practical system design flow for framing requirements, choosing boundaries, modeling data, handling scale, and explaining trade-offs clearly.\",\"url\":\"https://nguyenlephong.github.io/fr/studio?route=flow-system-design\u0026flow=system-design#flow-system-design\",\"keywords\":\"System Design, Architecture, Trade-offs, Interview\",\"step\":[{\"@type\":\"HowToStep\",\"position\":1,\"name\":\"Frame the problem\",\"text\":\"Restate users, jobs, constraints, and non-goals before naming any technology. A short problem frame and a list of assumptions to confirm.\"},{\"@type\":\"HowToStep\",\"position\":2,\"name\":\"Shape the interfaces\",\"text\":\"Sketch APIs, events, user actions, and admin actions around the real workflow. API/event contract notes with the first boundary decisions.\"},{\"@type\":\"HowToStep\",\"position\":3,\"name\":\"Model the data\",\"text\":\"Choose ownership, consistency rules, indexes, retention, and migration direction. Data model sketch plus consistency and migration notes.\"},{\"@type\":\"HowToStep\",\"position\":4,\"name\":\"Design the runtime\",\"text\":\"Place services, queues, cache, workers, and gateways only where they solve a named pressure. Runtime architecture with the reason behind each moving part.\"},{\"@type\":\"HowToStep\",\"position\":5,\"name\":\"Stress the failure modes\",\"text\":\"Walk through slow dependencies, duplicate requests, partial writes, bad deploys, and stale reads. Failure-mode table with mitigation and monitoring hooks.\"},{\"@type\":\"HowToStep\",\"position\":6,\"name\":\"Explain the evolution path\",\"text\":\"Name the first practical version, the breaking points, and the next design when traffic or team size changes. Versioned roadmap: v1, scale trigger, and rejected alternatives.\"}]},{\"@type\":\"HowTo\",\"name\":\"Architecture Decision Flow with RFC and ADR Thinking\",\"description\":\"A practical architecture decision flow for comparing options, scoring trade-offs, documenting risks, and aligning teams before implementation.\",\"url\":\"https://nguyenlephong.github.io/fr/studio?route=flow-architecture-decision\u0026flow=architecture-decision#flow-architecture-decision\",\"keywords\":\"RFC, ADR, Architecture Review, Decision Matrix\",\"step\":[{\"@type\":\"HowToStep\",\"position\":1,\"name\":\"Name the decision\",\"text\":\"Write the decision in one sentence and make the scope small enough to approve. Decision statement with scope and non-goals.\"},{\"@type\":\"HowToStep\",\"position\":2,\"name\":\"Extract invariants\",\"text\":\"List what must remain true for users, money, permissions, data, audit, and support. Invariant list that every option must satisfy.\"},{\"@type\":\"HowToStep\",\"position\":3,\"name\":\"Compare real options\",\"text\":\"Evaluate two or three practical options, not a perfect design against a strawman. Option table with honest trade-offs.\"},{\"@type\":\"HowToStep\",\"position\":4,\"name\":\"Set risk gates\",\"text\":\"Define validation, telemetry, rollout, and rollback before implementation starts. Decision gates and launch conditions.\"},{\"@type\":\"HowToStep\",\"position\":5,\"name\":\"Write the decision\",\"text\":\"Keep the final note short enough to read during review, but complete enough to survive handoff. ADR/RFC entry ready for review.\"}]},{\"@type\":\"HowTo\",\"name\":\"Production Incident Response Flow for Engineering Teams\",\"description\":\"A production incident flow for triage, blast-radius control, rollback, communication, root cause analysis, and follow-up tracking.\",\"url\":\"https://nguyenlephong.github.io/fr/studio?route=flow-incident-response\u0026flow=incident-response#flow-incident-response\",\"keywords\":\"Incident, SRE, Rollback, Postmortem\",\"step\":[{\"@type\":\"HowToStep\",\"position\":1,\"name\":\"Confirm the signal\",\"text\":\"Separate a real user-impacting incident from a noisy metric or isolated dependency blip. Incident status, severity, and initial owner.\"},{\"@type\":\"HowToStep\",\"position\":2,\"name\":\"Contain blast radius\",\"text\":\"Protect users first with flags, rate limits, rollback, traffic shift, or temporary disablement. Mitigation action with expected user impact.\"},{\"@type\":\"HowToStep\",\"position\":3,\"name\":\"Coordinate the room\",\"text\":\"Assign incident lead, comms, investigation, and verification so the team does not duplicate effort. Shared incident timeline and communication cadence.\"},{\"@type\":\"HowToStep\",\"position\":4,\"name\":\"Verify recovery\",\"text\":\"Do not close the incident just because one graph improves; check the user path and downstream queues. Recovery confirmation and watch window.\"},{\"@type\":\"HowToStep\",\"position\":5,\"name\":\"Write the follow-up\",\"text\":\"Turn the incident into prevention work without blaming the person who touched the deploy. Postmortem, action items, owners, and due dates.\"}]},{\"@type\":\"HowTo\",\"name\":\"Release Readiness Flow for Safe Software Rollouts\",\"description\":\"A release readiness flow for validating tests, analytics, migration safety, observability, communication, rollout gates, and rollback plans.\",\"url\":\"https://nguyenlephong.github.io/fr/studio?route=flow-release-readiness\u0026flow=release-readiness#flow-release-readiness\",\"keywords\":\"Release, Rollout, QA, Observability\",\"step\":[{\"@type\":\"HowToStep\",\"position\":1,\"name\":\"Confirm scope\",\"text\":\"Match the release to the ticket, acceptance criteria, non-goals, and user-facing behavior. Release scope and explicit non-goals.\"},{\"@type\":\"HowToStep\",\"position\":2,\"name\":\"Verify behavior\",\"text\":\"Run the checks that match the risk: unit, integration, E2E, accessibility, typecheck, and manual smoke. Verification note with remaining risk.\"},{\"@type\":\"HowToStep\",\"position\":3,\"name\":\"Check data and migrations\",\"text\":\"Review schema changes, backfills, indexes, caches, analytics events, and SEO paths. Data and tracking readiness checklist.\"},{\"@type\":\"HowToStep\",\"position\":4,\"name\":\"Prepare observability\",\"text\":\"Make sure the release can be watched after deploy with actionable signals, not vanity graphs. Watch plan and escalation path.\"},{\"@type\":\"HowToStep\",\"position\":5,\"name\":\"Make the rollout decision\",\"text\":\"Choose gradual rollout, immediate release, hold, or rollback based on evidence. Go/hold decision with rollback trigger.\"}]},{\"@type\":\"HowTo\",\"name\":\"AI-Assisted Software Delivery Flow with Human Review\",\"description\":\"An AI-assisted delivery flow for scoping tasks, packaging context, applying changes, verifying behavior, and handing off review-ready work.\",\"url\":\"https://nguyenlephong.github.io/fr/studio?route=flow-ai-delivery\u0026flow=ai-delivery#flow-ai-delivery\",\"keywords\":\"AI Delivery, Agents, Code Review, Verification\",\"step\":[{\"@type\":\"HowToStep\",\"position\":1,\"name\":\"Scope the task\",\"text\":\"Translate the request into acceptance criteria, affected surfaces, non-goals, and privacy boundaries. Task brief with clear boundaries.\"},{\"@type\":\"HowToStep\",\"position\":2,\"name\":\"Package context\",\"text\":\"Give the agent the files, examples, conventions, tests, and warnings that matter. Context pack and implementation hints.\"},{\"@type\":\"HowToStep\",\"position\":3,\"name\":\"Execute in small slices\",\"text\":\"Keep edits narrow, use existing abstractions, and verify each risky boundary before moving on. Focused implementation diff.\"},{\"@type\":\"HowToStep\",\"position\":4,\"name\":\"Verify and review\",\"text\":\"Run tests, inspect the diff, check copy quality, analytics wiring, and security/privacy implications. Verification summary and review notes.\"},{\"@type\":\"HowToStep\",\"position\":5,\"name\":\"Handoff cleanly\",\"text\":\"Prepare commit, PR, release notes, or deployment only when the human request allows it. Commit/PR/deploy-ready handoff.\"}]},{\"@type\":\"HowTo\",\"name\":\"Engineering Portfolio Story Flow for CV and Interview Proof\",\"description\":\"A portfolio story flow for turning engineering work into clear context, actions, trade-offs, impact, evidence, and next-step learning.\",\"url\":\"https://nguyenlephong.github.io/fr/studio?route=flow-portfolio-story\u0026flow=portfolio-story#flow-portfolio-story\",\"keywords\":\"CV, Portfolio, Writing, Career\",\"step\":[{\"@type\":\"HowToStep\",\"position\":1,\"name\":\"Capture context\",\"text\":\"Name the team situation, user pain, constraints, and why the work mattered at that moment. Context paragraph that feels specific, not inflated.\"},{\"@type\":\"HowToStep\",\"position\":2,\"name\":\"Show the actions\",\"text\":\"Describe what you changed, decided, coordinated, or simplified in plain engineering language. Action list with technical and collaboration detail.\"},{\"@type\":\"HowToStep\",\"position\":3,\"name\":\"Name the trade-offs\",\"text\":\"Explain the constraint that made the work interesting: time, reliability, UX, cost, privacy, or team capacity. Trade-off note that shows judgment.\"},{\"@type\":\"HowToStep\",\"position\":4,\"name\":\"Prove the impact\",\"text\":\"Use numbers when available, but also capture reduced risk, cleaner handoff, better reliability, or faster support. Impact statement with evidence and caveat.\"},{\"@type\":\"HowToStep\",\"position\":5,\"name\":\"Shape the story\",\"text\":\"Turn the raw material into the right format for CV, interview, blog, or portfolio page. CV bullet, STAR answer, blog outline, or case-study draft.\"}]},{\"@type\":\"HowTo\",\"name\":\"React Flow Example for Software Diagrams\",\"description\":\"A React Flow studio demo with built-in node styles, custom architecture shapes, grouping, layout, validation, whiteboard annotation, edge types, labels, markers, minimap, controls, and background.\",\"url\":\"https://nguyenlephong.github.io/fr/studio?route=flow-react-flow-architecture-demo\u0026flow=react-flow-architecture-demo#flow-react-flow-architecture-demo\",\"keywords\":\"React Flow, XYFlow, Architecture Diagram, Node Shapes, Edge Types\",\"step\":[{\"@type\":\"HowToStep\",\"position\":1,\"name\":\"Show node primitives\",\"text\":\"Render input, default, output, and group-style nodes before adding custom architecture vocabulary. A baseline canvas that shows the primitives React Flow starts from.\"},{\"@type\":\"HowToStep\",\"position\":2,\"name\":\"Add architecture shapes\",\"text\":\"Use custom nodes for API gateways, services, workers, databases, cache, queues, topics, external systems, decisions, risks, and notes. A reusable shape catalog for system diagrams.\"},{\"@type\":\"HowToStep\",\"position\":3,\"name\":\"Compare edge types\",\"text\":\"Show default, straight, step, smoothstep, and simplebezier edges with labels, arrows, and animated async paths. An edge language that makes architecture diagrams easier to read.\"},{\"@type\":\"HowToStep\",\"position\":4,\"name\":\"Use canvas controls\",\"text\":\"Keep Background, Controls, MiniMap, fitView, zoom, and pan available so large architecture maps remain inspectable. A diagram surface that works for both overview and inspection.\"},{\"@type\":\"HowToStep\",\"position\":5,\"name\":\"Model system architecture\",\"text\":\"Place client, edge, domain, data, external, and operations zones in one architecture story. A checkout-style reference architecture that demonstrates the full shape set.\"},{\"@type\":\"HowToStep\",\"position\":6,\"name\":\"Turn demo into a template\",\"text\":\"Use the demo as a starting point for architecture review, RFC, ADR, onboarding, or incident explanation. A React Flow architecture template ready to adapt.\"}]},{\"@type\":\"HowTo\",\"name\":\"React Flow System Design Blueprint Example\",\"description\":\"A large React Flow system design blueprint with grouped architecture zones, custom nodes, labeled edges, animated async paths, minimap, controls, and focused diagram views.\",\"url\":\"https://nguyenlephong.github.io/fr/studio?route=flow-react-flow-system-blueprint\u0026flow=react-flow-system-blueprint#flow-react-flow-system-blueprint\",\"keywords\":\"React Flow, System Design, Blueprint, Distributed Systems, Media Pipeline\",\"step\":[{\"@type\":\"HowToStep\",\"position\":1,\"name\":\"Map edge entry\",\"text\":\"Show how the domain lookup, resolver, CDN, request metadata, security policy, and API gateway connect before traffic reaches services. A visible ingress path that makes the request journey clear.\"},{\"@type\":\"HowToStep\",\"position\":2,\"name\":\"Show runtime topology\",\"text\":\"Separate load balancing, frontend servers, backend services, message dispatch, and connection ownership. A runtime zone that explains where live traffic is accepted, routed, and dispatched.\"},{\"@type\":\"HowToStep\",\"position\":3,\"name\":\"Surface coordination\",\"text\":\"Make distributed IDs, locks, concurrency choices, and metadata tables first-class parts of the diagram. A coordination layer that shows how writes and streaming chunks stay stable.\"},{\"@type\":\"HowToStep\",\"position\":4,\"name\":\"Trace storage and media\",\"text\":\"Connect primary databases, shards, replicas, cache, object storage, queue, processing workers, and encoded output. A data and media pipeline that can be inspected without leaving the canvas.\"},{\"@type\":\"HowToStep\",\"position\":5,\"name\":\"Fan out downstream\",\"text\":\"Show downstream consumers such as notification, recommendations, logging, search, analytics, and payment charge. A fan-out zone that makes secondary effects visible instead of hiding them behind one box.\"}]}]}"])</script><script>self.__next_f.push([1,"5:[\"$\",\"main\",null,{\"className\":\"studio-route-shell\",\"children\":[[\"$\",\"style\",null,{\"dangerouslySetInnerHTML\":{\"__html\":\"$e\"}}],[\"$\",\"script\",null,{\"type\":\"application/ld+json\",\"dangerouslySetInnerHTML\":{\"__html\":\"$f\"}}],\"$L10\",\"$L11\"]}]\n"])</script><script>self.__next_f.push([1,"12:I[48677,[\"/_next/static/chunks/  propos\",\"aboutMe\":\"À propos\",\"experience\":\"Expérience\",\"projects\":\"Projets\",\"contact\":\"Contact\",\"gallery\":\"Galerie\",\"blog\":\"Blog\",\"notes\":\"Notes\",\"studio\":\"Studio\",\"resume\":\"CV\",\"font\":{\"label\":\"Police de lecture\",\"sans\":\"Sans-serif\",\"serif\":\"Serif\"},\"background\":{\"label\":\"Fond de lecture\",\"plain\":\"Simple\",\"parchment\":\"Parchemin\",\"linen\":\"Lin\",\"sepia\":\"Sépia\",\"sage\":\"Sauge\",\"mist\":\"Brume\",\"night\":\"Nuit\"}},\"Footer\":{\"tag\":\"Senior Software Engineer · Tech Lead\",\"copy\":\"© {year} Nguyen Le Phong.\",\"language\":\"Langue\"},\"Hero\":{\"eyebrow\":\"Ouvert aux opportunités senior / lead\",\"role\":\"Senior Software Engineer · Tech Lead\",\"roleSub\":\"Full-stack · Platform engineering · Direction de la livraison\",\"bio\":\"Je conçois et exploite des systèmes de bout en bout — applications front-end, services backend, pipelines CI/CD, workflows de release et infrastructure de production. Actuellement, je dirige une équipe de 11 personnes qui livre des plateformes multi-tenant, des intégrations financières sécurisées et des architectures Micro-Frontend.\",\"location\":\"Hô Chi Minh-Ville, Vietnam\",\"downloadResume\":\"Télécharger le CV\",\"getInTouch\":\"Me contacter\",\"careerHighlights\":\"Faits marquants de carrière\",\"socialProfiles\":\"Profils sociaux\",\"proof\":{\"scale\":\"80M+ utilisateurs touchés via Zalo et des produits plateforme\",\"team\":\"Équipe delivery de 11 personnes dirigée entre développement et QC\",\"platform\":\"Plateforme de rollout 30+ tenants avec intégrations sécurisées\"},\"stats\":{\"yearsShipping\":\"Années de livraison\",\"yearsShippingCaption\":\"Code en production, jour après jour\",\"hoursCoding\":\"Heures de code\",\"hoursCodingCaption\":\"Suivi via WakaTime depuis 2021\",\"usersTouched\":\"Utilisateurs touchés\",\"usersTouchedCaption\":\"Zalo · CDP · échelle fintech\",\"engineersLed\":\"Ingénieurs dirigés\",\"engineersLedCaption\":\"Devs · QC · transversal\",\"tenantsPowered\":\"Tenants en production\",\"tenantsPoweredCaption\":\"Feature flags multi-tenant\",\"domainsDelivered\":\"Domaines livrés\",\"domainsDeliveredCaption\":\"Fintech · CDP · immobilier · éducation\",\"projectsLaunched\":\"Projets lancés\",\"projectsLaunchedCaption\":\"SDK · plateformes · apps mobiles\",\"testCasesAuthored\":\"Cas de test rédigés\",\"testCasesAuthoredCaption\":\"BDD · E2E · sécurité de régression\"}},\"Sections\":{\"aboutEyebrow\":\"Profil\",\"aboutTitle\":\"Un aperçu de qui je suis et comment je travaille\",\"experienceEyebrow\":\"Carrière\",\"experienceTitle\":\"Là où j'ai livré\",\"projectsEyebrow\":\"Travaux\",\"projectsTitle\":\"Projets sélectionnés\"},\"Summary\":{\"intro1\":\"Titulaire d'une Licence en Technologies de l'Information (mineure en Génie Logiciel, \u003cb\u003eGPA 3,36\u003c/b\u003e) avec près de \u003cb\u003e8 ans d'expérience\u003c/b\u003e en développement logiciel full-stack, dont \u003cb\u003e3+ ans\u003c/b\u003e en leadership technique, décisions architecturales et coordination de livraison inter-équipes.\",\"intro2\":\"Expérience concrète dans la conception, la construction et l'exploitation de systèmes de bout en bout — des applications front-end et services backend aux pipelines CI/CD, workflows de release et infrastructure de production — avec un fort accent sur l'automatisation, la clarté opérationnelle et la livraison fiable.\",\"intro3\":\"\u003ci\u003eVoici mes compétences techniques privilégiées ces dernières années :\u003c/i\u003e\",\"visionEyebrow\":\"Comment je travaille\",\"hardSkillsEyebrow\":\"Compétences techniques\",\"pillars\":{\"endToEnd\":{\"title\":\"Ingénieur end-to-end\",\"body\":\"Front-end, backend, CI/CD, release et infra production — un seul responsable sur tout le cycle de vie.\",\"chip\":\"FE · BE · Infra\"},\"multiTenant\":{\"title\":\"Plateformes multi-tenant\",\"body\":\"Feature flags, RBAC, rollouts par pourcentage/segment, valeurs JSON-config, évaluation runtime sans état.\",\"chip\":\"30+ tenants en prod\"},\"leadership\":{\"title\":\"Leadership de livraison\",\"body\":\"Dirige 11+ ingénieurs — recrutement, organisation, RFC, runbooks, playbooks de rollout, coaching 1:1.\",\"chip\":\"Équipe de 11\"},\"fintech\":{\"title\":\"Intégrations fintech sécurisées\",\"body\":\"Handshake RSA-4096, payload AES-256, mTLS, certificate pinning, contrats idempotents, files de retry.\",\"chip\":\"Gtel · Napas\"},\"mfe\":{\"title\":\"Micro-frontend \u0026 SDK\",\"body\":\"Host Angular + modules React pour déploiements indépendants. SDK JS \u003c200 Ko, chargement \u003c150 ms.\",\"chip\":\"MFE · \u003c150 ms\"},\"ai\":{\"title\":\"Ingénierie AI-first\",\"body\":\"Conception d'agents IA pour la revue de code, l'assistance au déploiement, les quotas de service, la santé des API et l'analyse des releases.\",\"chip\":\"Agents en prod\"}},\"skills\":{\"backend\":\"\u003cb\u003eBack-end\u003c/b\u003e : expérience solide avec \u003cb\u003eNode.js\u003c/b\u003e, \u003cb\u003eJava (Spring)\u003c/b\u003e ; conception d'API REST/GraphQL avec contrats clairs, mécanismes d'authentification et chiffrement, rétrocompatibilité et résilience pour intégrations entreprises et tierces.\",\"frontend\":\"\u003cb\u003eFront-end\u003c/b\u003e : expérience confirmée dans la construction et la maintenance d'applications clientes complexes avec \u003cb\u003eReact\u003c/b\u003e (TypeScript, Next.js), \u003cb\u003eReact Native\u003c/b\u003e et hosts Micro-Frontend basés sur Angular ; optimisation des performances, gestion d'état et patterns d'architecture UI scalables.\",\"databases\":\"\u003cb\u003eBases de données\u003c/b\u003e : expérience pratique approfondie avec \u003cb\u003eMySQL\u003c/b\u003e, axée sur la conception de schémas et de modèles de données, les stratégies d'indexation, l'optimisation des requêtes, les frontières transactionnelles, la planification des migrations et les compromis de cohérence dans les systèmes distribués à fort débit.\",\"infra\":\"\u003cb\u003eInfrastructure \u0026 Platform Engineering\u003c/b\u003e : maîtrise de \u003cb\u003eDocker\u003c/b\u003e et \u003cb\u003eKubernetes\u003c/b\u003e sur plusieurs environnements ; exploitation de clusters managés (\u003cb\u003eAKS\u003c/b\u003e, \u003cb\u003eEKS\u003c/b\u003e, \u003cb\u003eFKE\u003c/b\u003e, \u003cb\u003eK3S\u003c/b\u003e), déploiements GitOps avec \u003cb\u003eArgoCD\u003c/b\u003e, pipelines CI/CD, configuration d'environnements, gestion des domaines et certificats SSL.\",\"architecture\":\"\u003cb\u003eArchitecture \u0026 pratiques de livraison\u003c/b\u003e : application d'architectures Micro-Frontend et multi-tenant, rollouts pilotés par feature flags, stratégies de livraison progressive et observabilité pour des releases sûres et un diagnostic en production efficace.\",\"testing\":\"\u003cb\u003eTests\u003c/b\u003e : utilisation maîtrisée de Jest, Cucumber, Puppeteer et Testing Library pour garantir la sécurité de régression, la confiance en release et la maturité pour la production des services et applications.\",\"libraries\":\"\u003cb\u003eBibliothèques\u003c/b\u003e : maîtrise de \u003cb\u003eFirebase\u003c/b\u003e, Strapi, Directus, React Flow, Webpack, \u003cb\u003eRedux\u003c/b\u003e, React Query et G2plot.\",\"other\":\"\u003cb\u003eAutres\u003c/b\u003e : également à l'aise avec l'architecture \u003cb\u003eMicro-frontend\u003c/b\u003e, le responsive design, la compatibilité cross-browser, le \u003cb\u003eSEO\u003c/b\u003e, GraphQL et Electron.\"}},\"Experience\":{\"labels\":{\"location\":\"Lieu\",\"duration\":\"Durée\",\"keyContributions\":\"Contributions clés\",\"keyTechnologies\":\"Technologies clés\"},\"ndsvn\":{\"summary\":\"Responsable de la livraison produit et de la direction technique après le départ du CTO, pilotant les décisions d'architecture, les systèmes de rollout, les intégrations enterprise et l'alignement inter-équipes, tout en encadrant une équipe de livraison de 8 développeurs (dont 4 seniors) et 3 ingénieurs QC.\",\"contributions\":[\"Conception d'un système de feature flags multi-tenant en .NET Core \u003cb\u003e(30+ tenants, ~40k utilisateurs)\u003c/b\u003e avec un moteur de règles prioritaires, rollout par pourcentage (tenant/segment/env), valeurs JSON-config et évaluation runtime sans état — alimentant des apps mobile/web et permettant des releases progressives contrôlées sur des tenants à fort trafic.\",\"Construction d'intégrations sécurisées avec \u003cb\u003eGtel \u0026 Napas\u003c/b\u003e : handshake RSA-4096, chiffrement payload AES-256, authentification mutuelle \u003cb\u003emTLS\u003c/b\u003e, certificate pinning, files de retry, contrats d'API idempotents et monitoring piloté par ACK pour des services tiers instables.\",\"Mise en œuvre d'une architecture \u003cb\u003eMicro-Frontend\u003c/b\u003e (host Angular + modules React) permettant des cycles de déploiement indépendants et l'isolation des features — réduisant la surface de régression et le couplage de déploiement entre équipes.\",\"Introduction d'une stack d'observabilité (PostHog + pipeline de métriques + workflow) pour l'impact des rollouts, l'adoption des features, la détection d'anomalies et le traçage des régressions — réduction significative du temps de debug/analyse sur les cycles de release.\",\"Prise en charge de l'infrastructure héritée pour maintenir l'organisation en mouvement — absorbant en silence les incidents de production, les échecs de pipeline, les particularités de cluster et l'instabilité des intégrations afin que le produit et les équipes ne s'arrêtent jamais ; transformation d'ArgoCD, CI/CD, domaines/SSL et clusters \u003cb\u003eAKS/FKE/K3S/EKS\u003c/b\u003e en systèmes \u003cb\u003ediagnosticables, récupérables et stables plutôt qu'en inconnues récurrentes\u003c/b\u003e.\",\"Conception d'\u003cb\u003eagents IA\u003c/b\u003e pour la revue de code, l'assistant de déploiement, la validation des quotas de service, le monitoring de la santé des API et l'analyse des releases ; raccourcissement des boucles de décision et de livraison pour les équipes produit.\",\"Développement de simulations d'intégration et de modules sandbox/démo pour gérer des partenaires instables et sécuriser la validation pré-contrat avec les écosystèmes tiers.\",\"\u003cb\u003eRestructuration de l'organisation d'ingénierie\u003c/b\u003e après la transition du leadership : définition de l'organigramme, de la matrice de compétences, du routage de la charge de travail et des frontières de responsabilité — libérant l'autonomie et réduisant le lead-time des décisions techniques.\",\"Mise en place d'un playbook d'ingénierie unifié : stratégie de branches, conventions de commit, tagging des releases, critères de rollout, règles API/intégration et référentiel de specs techniques (RFC, runbooks, guides de troubleshooting).\",\"Pilotage des cycles de recrutement et de montée en compétences : entretiens structurés (QC/Fullstack), parcours d'onboarding, coaching 1:1, cycles de performance review et résolution de conflits inter-équipes pour maintenir une livraison collaborative et orientée résultats.\",\"Maintien de la qualité de livraison grâce à une culture documentation-first et des garde-fous de process (checklists, règles de handover, prêt au rollback), assurant une cadence de releases prévisible en phase de scaling.\"]},\"zalo\":{\"summary1\":\"Développeur cœur de l'application multi-plateforme \u003cb\u003eZalo PC\u003c/b\u003e (Web, macOS, Windows), servant \u003cb\u003e15M+ MAU\u003c/b\u003e. Livraison de fonctionnalités clés comme le dark mode, le thème dynamique et le suivi des comportements utilisateurs. Pilotage du développement d'un flow promotionnel et d'un \u003cb\u003edesign system\u003c/b\u003e scalable pour \u003cb\u003e50+ développeurs\u003c/b\u003e. Optimisation des performances, amélioration de la maintenabilité et contribution à la croissance via des solutions robustes et efficaces.\",\"summary2\":\"Maintenance active et amélioration de l'application mobile \u003cb\u003eZalo Android\u003c/b\u003e, garantissant la \u003cb\u003estabilité\u003c/b\u003e et la \u003cb\u003eperformance\u003c/b\u003e des fonctionnalités critiques pour près de \u003cb\u003e80 millions d'utilisateurs\u003c/b\u003e.\",\"contributions\":[\"Livraison de plus de \u003cb\u003e10 fonctionnalités\u003c/b\u003e, incluant dark mode, module de téléchargement, bot Kiki, log tracking, etc., améliorant l'UX et l'engagement.\",\"Développement d'un \u003cb\u003eflow promotionnel\u003c/b\u003e avec systèmes de tracking et monitoring intégrés, stimulant le succès d'activation sur \u003cb\u003e15M+ MAU\u003c/b\u003e.\",\"Pilotage du développement d'un \u003cb\u003edesign system\u003c/b\u003e scalable basé sur Storybook, garantissant la cohérence UI et l'efficacité pour \u003cb\u003e50+ développeurs\u003c/b\u003e.\",\"Support proactif de \u003cb\u003e50+ utilisateurs clients\u003c/b\u003e, résolution rapide des problèmes avec \u003cb\u003edévouement\u003c/b\u003e et \u003cb\u003erésolution efficace\u003c/b\u003e, obtenant des retours très positifs.\",\"Maintenance et amélioration de \u003cb\u003e3+\u003c/b\u003e fonctionnalités dans l'app \u003cb\u003eZalo Android\u003c/b\u003e, axées sur \u003cb\u003estabilité\u003c/b\u003e, \u003cb\u003eperformance\u003c/b\u003e et expérience fluide pour près de \u003cb\u003e80 millions d'utilisateurs\u003c/b\u003e.\"]},\"primedata\":{\"summary\":\"L'entreprise développe un produit dit CDxP. Il s'agit d'une plateforme de données sur mesure pour héberger et traiter des profils clients (la pierre angulaire étant la capacité à identifier et unifier les données clients à partir de schémas et formats hétérogènes provenant de services et systèmes divergents).\",\"contributions\":[\"Pilotage de l'équipe Front-end, livraison de \u003cb\u003e10+ projets\u003c/b\u003e incluant l'app CDxP, des démos Magento \u0026 WordPress, des SDK JS, des SDK mobiles, etc.\",\"Encadrement d'une équipe de \u003cb\u003e4 membres\u003c/b\u003e, alignement avec la roadmap produit pour satisfaire plusieurs partenaires majeurs, amélioration de l'UI/UX et implémentation de fonctionnalités avancées comme les profils 360 et les campaign builders.\",\"Développement d'un SDK JS léger avec toutes les fonctionnalités (\u003cb\u003e\u003c200 Ko, \u003c150 ms\u003c/b\u003e de chargement), facilitant une intégration fluide entre projets.\",\"Démonstration d'une \u003cb\u003erésolution de problèmes\u003c/b\u003e rapide, assurant des démos de fonctionnalités immédiates pour convaincre clients et investisseurs.\"]},\"splus\":{\"summary\":\"Société d'outsourcing. La plupart des projets gravitent autour d'\u003cb\u003eapplications mobiles et web\u003c/b\u003e.\",\"contributions\":[\"Avec une expertise sur le \u003cb\u003eprocessus de production logicielle end-to-end\u003c/b\u003e, j'ai \u003cb\u003edirigé une petite équipe\u003c/b\u003e, maîtrisant les phases de la collecte des besoins à la sécurisation du projet, posant les bases de futurs rôles de leadership.\",\"Engagement dans \u003cb\u003e8+\u003c/b\u003e projets variés dans les domaines \u003cb\u003eéducation, food and drink, banque\u003c/b\u003e et \u003cb\u003ee-commerce\u003c/b\u003e, j'ai acquis des connaissances précieuses en développement d'applications web et mobiles.\",\"En tant que project mercenary, j'ai remporté des projets clés comme Savyu et Bank Tool, générant plus de \u003cb\u003e20 000 $\u003c/b\u003e de revenus et obtenant la reconnaissance de \u003cb\u003eBest Rookie of the Year\u003c/b\u003e pour mes contributions marquantes.\"]},\"propman\":{\"summary\":\"Startup dans le \u003cb\u003edomaine immobilier\u003c/b\u003e. J'étais l'un des ingénieurs fondateurs.\",\"contributions\":[\"Implication initiale dans le développement de l'app web principale en tant que Front-end Developer. Acquisition des compétences fondamentales de développement web, avec une spécialisation en \u003cb\u003eReact JS\u003c/b\u003e et technologies associées. Collaboration sur des projets responsive design, priorisant l'amélioration de l'expérience utilisateur.\"]}},\"Projects\":{\"sat\":{\"accomplishments\":[\"Orchestration du développement produit couvrant design UI/UX, ingénierie produit et analyse comportementale, aboutissant à une base utilisateurs globale dépassant \u003cb\u003e10 000\u003c/b\u003e visites et \u003cb\u003e3 000\u003c/b\u003e inscriptions en deux mois.\",\"Amélioration du classement de recherche Google via des initiatives SEO stratégiques, incluant la maîtrise du \u003cb\u003eparasite SEO\u003c/b\u003e. Ces efforts ont conduit à des gains de performance significatifs et un positionnement efficace face aux concurrents du secteur.\",\"Démonstration d'efficacité et d'optimisation des ressources dans le développement front-end en exploitant une seule instance Cloud Run avec \u003cb\u003e1 CPU\u003c/b\u003e et une limite mémoire de \u003cb\u003e256 Mio\u003c/b\u003e.\",\"Pilotage du développement d'une application mobile avec une approche \u003cb\u003emobile-first\u003c/b\u003e, permettant un déploiement rapide sur les app stores en \u003cb\u003edeux jours\u003c/b\u003e. Garantie d'une installation \u003cb\u003ePWA\u003c/b\u003e fluide sur tous appareils, améliorant accessibilité et expérience.\",\"Développement de \u003cb\u003efonctionnalités de monétisation\u003c/b\u003e, incluant l'intégration de \u003cb\u003eGoogle Ads\u003c/b\u003e et la mise en place du flow de paiement \u003cb\u003eStripe\u003c/b\u003e, pour accroître la génération de revenus.\"]},\"cdp\":{\"accomplishments\":[\"Pilotage de l'architecture et de l'implémentation du projet CDxP, axé sur les fonctionnalités \u003cb\u003eUI/UX\u003c/b\u003e, qui ont amélioré l'expérience globale et accru l'engagement utilisateur.\",\"Configuration de routeurs imbriqués, maintien d'une structure projet \u003cb\u003escalable\u003c/b\u003e et démonstration de solides connaissances ES6, TypeScript et types de données, \u003cb\u003eaméliorant la maintenabilité\u003c/b\u003e et réduisant les problèmes de code.\",\"\u003cb\u003eSuivi efficace des erreurs\u003c/b\u003e et améliorations, support des corrections de bugs, garantissant la \u003cb\u003estabilité\u003c/b\u003e du projet, améliorant la fiabilité du système et réduisant les temps d'arrêt.\",\"Mise en place de hooks \u003cb\u003eRBAC\u003c/b\u003e pour vérifier l'autorisation d'accès aux composants dans des configurations clients adaptatives. Construction de plus de \u003cb\u003e20 utilitaires réutilisables\u003c/b\u003e partagés entre projets grâce à leur design modulaire.\",\"Ingénierie de \u003cb\u003e10+ fonctionnalités avancées\u003c/b\u003e comme les profils, campagnes, analytics, etc.\",\"Mise en place d'un flow de tests robuste, couvrant les fonctionnalités cœur du CDP avec \u003cb\u003e100+ scénarios\u003c/b\u003e et \u003cb\u003e1000+ cas de test\u003c/b\u003e.\",\"Acquisition d'expertise métier et excellence dans les méthodologies de test, incluant BDD, tests unitaires et \u003cb\u003etests E2E\u003c/b\u003e, améliorant la couverture et réduisant les bugs logiciels de \u003cb\u003e30 %\u003c/b\u003e.\",\"Développement d'un \u003cb\u003efeature flag\u003c/b\u003e pour le toggling runtime, permettant A/B testing et groupage par segments clients, optimisant la livraison et augmentant l'adoption.\",\"\u003cb\u003eDocumentation\u003c/b\u003e claire des composants pour faciliter la maintenance, améliorant la lisibilité du code et réduisant le temps de maintenance.\"]},\"sdk\":{\"accomplishments\":[\"Développement réussi de plus de \u003cb\u003e5 modules\u003c/b\u003e, intégrant plus de \u003cb\u003e10 fonctionnalités avancées\u003c/b\u003e en \u003cb\u003evanilla JS\u003c/b\u003e. Atteinte d'une taille de bundle impressionnante de \u003cb\u003e\u003c200 Ko et un temps de chargement \u003c150 ms\u003c/b\u003e (métriques mesurées avant l'application de toutes les techniques d'optimisation du bundle).\",\"Utilisation de \u003cb\u003eweb workers et service workers\u003c/b\u003e pour faciliter le multitâche en arrière-plan, gérant efficacement des fonctionnalités complexes et traitant \u003cb\u003eplusieurs cas limites\u003c/b\u003e, comme l'usage multi-onglets simultané.\",\"Conception et implémentation d'une \u003cb\u003efonctionnalité de recommandation personnalisée\u003c/b\u003e via une architecture \u003cb\u003emicro-frontend\u003c/b\u003e, plus précisément un bloc carrousel mettant en avant les produits que les utilisateurs pourraient aimer, améliorant ainsi l'expérience et l'engagement.\",\"Parmi les fonctionnalités avancées construites figurent web pop-ups, web push notifications, \u003cb\u003eembedding de web components\u003c/b\u003e, intégration WebSocket et gestion des pop-ups intrusives sur plusieurs onglets.\",\"Exploitation des \u003cb\u003eclosures JS\u003c/b\u003e pour structurer les modules, permettant l'export fluide de fonctionnalités ou l'\u003cb\u003eencapsulation des données\u003c/b\u003e, \u003cb\u003eévitant ainsi les conflits\u003c/b\u003e dans le scope global.\"]},\"vac\":{\"accomplishments\":[\"Prise en charge de l'\u003cb\u003eenseignement\u003c/b\u003e d'un cours \u003cb\u003eFront-end Project\u003c/b\u003e au Vietnam Australia Center.\",\"Conception et animation de \u003cb\u003ecours engageants\u003c/b\u003e, avec guidance pratique pour les étudiants sur des projets de développement front-end.\",\"Mise en place d'un environnement d'apprentissage \u003cb\u003ecollaboratif\u003c/b\u003e, encourageant le \u003cb\u003etravail en équipe\u003c/b\u003e pour \u003cb\u003e12 étudiants\u003c/b\u003e et alignement du programme sur les bonnes pratiques de l'industrie.\",\"Fourniture de \u003cb\u003eretours\u003c/b\u003e et \u003cb\u003ementorat\u003c/b\u003e personnalisés, accompagnant les étudiants pour \u003cb\u003esurmonter les défis\u003c/b\u003e et assurer une compréhension complète du contenu du cours.\"]},\"mona\":{\"accomplishments\":[\"Développement d'une application mobile complète, Mona House, en \u003cb\u003eReact Native\u003c/b\u003e et Realm DB pour une gestion efficace du logement.\",\"Spécialisation dans la création d'apps cross-platform avec un focus sur des \u003cb\u003ecomposants réutilisables\u003c/b\u003e, des animations fluides et une intégration fluide avec des modules natifs.\",\"Démonstration de solides compétences en \u003cb\u003erésolution de problèmes\u003c/b\u003e et \u003cb\u003etroubleshooting\u003c/b\u003e, identification et résolution rapides de problèmes complexes via des outils de debug avancés et du profiling de performance.\",\"Démonstration d'\u003cb\u003eadaptabilité\u003c/b\u003e et d'une \u003cb\u003ecourbe d'apprentissage rapide\u003c/b\u003e pour les nouvelles technologies, permettant l'implémentation fluide de nouveaux frameworks, langages ou outils pour assurer la livraison du projet.\"]},\"mobivi\":{\"accomplishments\":[\"Développement d'une \u003cb\u003eapplication web full-stack\u003c/b\u003e chez Mobivi, axée sur l'ingestion et le traitement de données sur \u003cb\u003e20 fichiers Excel\u003c/b\u003e, chacun contenant plus de \u003cb\u003e20 000 enregistrements\u003c/b\u003e.\",\"L'application est conçue pour traiter efficacement les données transactionnelles calculées progressivement à partir des utilisateurs, \u003cb\u003eassurant un reporting précis et fiable\u003c/b\u003e.\"]},\"savyu\":{\"accomplishments\":[\"Rôle clé dans le développement de \u003cb\u003edeux applications mobiles\u003c/b\u003e chez Synova — une destinée aux marchands et une aux consommateurs.\",\"Contribution à la création d'une \u003cb\u003eapplication web\u003c/b\u003e permettant aux administrateurs de gérer efficacement les données utilisateurs.\",\"Démonstration d'une \u003cb\u003emaîtrise du développement mobile\u003c/b\u003e, en collaboration avec des équipes transverses pour livrer avec succès des applications \u003cb\u003eintuitives\u003c/b\u003e et \u003cb\u003eperformantes\u003c/b\u003e.\"]}},\"CTA\":{\"eyebrow\":\"Construisons quelque chose\",\"title\":\"Un problème ext\":\"Suivant\",\"goToPage\":\"Aller à la page {page}\"}},\"engagement\":{\"views\":\"vues\",\"reactionsPrompt\":\"Qu'en avez-vous pensé ?\",\"share\":\"Partager\",\"copyLink\":\"Copier le lien\",\"copied\":\"Copié !\",\"close\":\"Fermer\",\"reactions\":{\"like\":\"J'aime\",\"love\":\"Adoré\",\"insightful\":\"Pertinent\",\"clap\":\"Bravo\"}}},\"blog\":{\"controls\":{\"searchPlaceholder\":\"Rechercher des articles…\",\"searchLabel\":\"Rechercher des articles\",\"clearSearch\":\"Effacer la recherche\",\"filtersLabel\":\"Filtrer par thème\",\"allCategories\":\"Tous\",\"popularTags\":\"Tags populaires\",\"clear\":\"Réinitialiser les filtres\",\"results\":\"{count, plural, =0 {Aucun article} one {# article} other {# articles}}\",\"noResults\":\"Aucun article ne correspond à votre recherche.\",\"pagination\":{\"label\":\"Pages du blog\",\"prev\":\"Précédent\",\"next\":\"Suivant\",\"goToPage\":\"Aller à la page {page}\"}},\"eyebrow\":\"Articles\",\"title\":\"Blog\",\"intro\":\"Des analyses approfondies sur l'architecture logicielle et la façon de structurer le code source — écrites pour être comprises par les débutants, tout en restant utiles aux équipes qui livrent à grande échelle. Des schémas, des exemples concrets, sans bla-bla.\",\"categoriesHeading\":\"Parcourir par thème\",\"latestHeading\":\"Derniers articles\",\"empty\":\"Aucun article pour l'instant — le premier arrive bientôt.\",\"backToBlog\":\"Retour au blog\",\"backToCategory\":\"Retour à {category}\",\"readingTime\":\"{minutes} min de lecture\",\"articleCount\":\"{count, plural, one {# article} other {# articles}}\",\"writtenBy\":\"Par {author}\",\"onThisPage\":\"Sur cette page\",\"readerTools\":{\"label\":\"Outils de lecture\",\"scrollTop\":\"Remonter en haut\",\"scrollBottom\":\"Aller en bas\",\"font\":\"Changer la police de lecture\",\"background\":\"Changer le fond de lecture\",\"language\":\"Changer de langue\"},\"partOf\":\"Partie {part} sur {total}\",\"nextUp\":\"À suivre\",\"previously\":\"Précédemment\",\"relatedHeading\":\"Lectures liées\",\"relatedIntro\":\"Quelques articles proches pour poursuivre le même fil avec plus de contexte.\",\"faqHeading\":\"Questions fréquentes\",\"seriesNames\":{\"foundations\":\"Les fondamentaux de l'architecture logicielle\",\"ways-of-working\":\"Façons de travailler\",\"ai-in-practice\":\"L'IA en pratique\",\"kind-engineering\":\"Une ingénierie bienveillante et efficace\"},\"engagement\":{\"reactionsPrompt\":\"Qu'en avez-vous pensé ?\",\"views\":\"vues\",\"share\":\"Partager\",\"copyLink\":\"Copier le lien\",\"copied\":\"Copié !\",\"reactions\":{\"like\":\"J'aime\",\"love\":\"Adoré\",\"insightful\":\"Pertinent\",\"clap\":\"Bravo\"},\"close\":\"Fermer\"}}},\"About\":{\"hero\":{\"eyebrow\":\"Engineering profile\",\"title\":\"I build product systems that can be shipped, observed, and recovered.\",\"lead\":\"My work now sits between \u003cstrong\u003eproduct engineering\u003c/strong\u003e and \u003cstrong\u003eplatform reliability\u003c/strong\u003e: front-end surfaces, backend services, secure integrations, rollout systems, Kubernetes infrastructure, and the operating model that lets a team release with less guesswork.\",\"metricsLabel\":\"Current engineering signals\",\"metrics\":[{\"value\":\"8+\",\"label\":\"years shipping production software\"},{\"value\":\"11\",\"label\":\"people in the delivery team I lead\"},{\"value\":\"30+\",\"label\":\"tenants served by rollout systems\"},{\"value\":\"~40k\",\"label\":\"users behind the feature-flag platform\"}]},\"systems\":{\"eyebrow\":\"Current focus\",\"title\":\"The layer I operate in now\",\"intro\":\"I still care about polished user interfaces, but my current value is broader: connecting product decisions with backend contracts, infrastructure paths, release control, and production diagnosis.\",\"items\":[{\"title\":\"Backend services \u0026 secure integration\",\"body\":\"I work with \u003cstrong\u003e.NET Core\u003c/strong\u003e, \u003cstrong\u003eNode.js\u003c/strong\u003e, and \u003cstrong\u003eJava Spring\u003c/strong\u003e services, focusing on REST/GraphQL contracts, auth, encryption, backward compatibility, retry behavior, idempotency, and partner-system instability.\",\"tags\":[\".NET Core\",\"Node.js\",\"Java Spring\",\"REST/GraphQL\",\"mTLS\"]},{\"title\":\"Platform, infra \u0026 traffic path\",\"body\":\"I have been involved in the production path around \u003cstrong\u003eDocker\u003c/strong\u003e, \u003cstrong\u003eKubernetes\u003c/strong\u003e, \u003cstrong\u003eAKS/FKE/K3S/EKS\u003c/strong\u003e, \u003cstrong\u003eArgoCD\u003c/strong\u003e, CI/CD, domains/SSL, ingress and load-balancer routing, and recovery work when the system is already under pressure.\",\"tags\":[\"Kubernetes\",\"ArgoCD\",\"CI/CD\",\"Ingress\",\"Load balancer\"]},{\"title\":\"Progressive delivery\",\"body\":\"I engineered a \u003cstrong\u003emulti-tenant feature-flag platform\u003c/strong\u003e with priority rules, tenant/segment/env rollout, JSON-config values, and stateless runtime evaluation so releases can move gradually instead of all at once.\",\"tags\":[\"Feature flags\",\"30+ tenants\",\"Rollout rules\",\"Runtime config\"]},{\"title\":\"Observability \u0026 operating clarity\",\"body\":\"I build the feedback loops around releases: PostHog, metrics pipelines, API health checks, anomaly review, rollback readiness, RFCs, runbooks, and release criteria that make incidents easier to understand.\",\"tags\":[\"PostHog\",\"Metrics\",\"Runbooks\",\"Rollback\",\"Release review\"]}]},\"stack\":{\"eyebrow\":\"Technical depth\",\"title\":\"The engineering details I pay attention to\",\"intro\":\"The systems I prefer are not only feature-complete. They have clear contracts, known failure modes, and enough operational signs for the team to find the problem before users feel it.\",\"groups\":[{\"title\":\"Backend techniques\",\"items\":[\"\u003cstrong\u003eBackward-compatible API contracts\u003c/strong\u003e for mobile, web, and enterprise clients.\",\"\u003cstrong\u003eRSA-4096 handshake, AES-256 payload encryption, mTLS, certificate pinning\u003c/strong\u003e, and ACK-driven monitoring for financial integrations.\",\"\u003cstrong\u003eRetry queues and idempotent APIs\u003c/strong\u003e for partners that are slow, unstable, or asynchronous.\",\"\u003cstrong\u003eStateless runtime evaluation\u003c/strong\u003e for rollout rules, JSON config, tenant and segment targeting.\"]},{\"title\":\"Infrastructure techniques\",\"items\":[\"\u003cstrong\u003eKubernetes cluster operations\u003c/strong\u003e across AKS, FKE, K3S, and EKS environments.\",\"\u003cstrong\u003eIngress, load balancer, domain and SSL paths\u003c/strong\u003e treated as part of the product delivery flow, not as a black box.\",\"\u003cstrong\u003eArgoCD and CI/CD pipelines\u003c/strong\u003e for repeatable releases, environment control, and recovery.\",\"\u003cstrong\u003eProduction diagnosis\u003c/strong\u003e through logs, metrics, health checks, and documented recovery steps.\"]},{\"title\":\"Release architecture\",\"items\":[\"\u003cstrong\u003eMicro-Frontend composition\u003c/strong\u003e with Angular host and React modules to reduce deployment coupling.\",\"\u003cstrong\u003eFeature-flag rollout\u003c/strong\u003e by tenant, segment, environment, and percentage.\",\"\u003cstrong\u003eObservability workflows\u003c/strong\u003e for feature adoption, regression tracing, and anomaly review.\",\"\u003cstrong\u003eRollback criteria and release checklists\u003c/strong\u003e so delivery stays deliberate under pressure.\"]},{\"title\":\"Team systems\",\"items\":[\"\u003cstrong\u003eOwnership boundaries\u003c/strong\u003e, org chart, competency matrix, and workload routing after leadership transition.\",\"\u003cstrong\u003eRFCs, runbooks, technical specs\u003c/strong\u003e, and troubleshooting guides that reduce hidden knowledge.\",\"\u003cstrong\u003eHiring, onboarding, 1:1 coaching\u003c/strong\u003e, and review loops for developers and QC engineers.\",\"\u003cstrong\u003eBranch strategy, commit convention, release tagging\u003c/strong\u003e, and integration rules that keep delivery predictable.\"]}]},\"principles\":{\"eyebrow\":\"How I work\",\"title\":\"Principles I bring into production systems\",\"intro\":\"These are practical habits, not slogans. They come from seeing systems fail in ordinary ways and learning how to make the next release easier to reason about.\",\"items\":[{\"title\":\"Trace before rewriting\",\"body\":\"When a system behaves strangely, I first look for the path: request flow, data contract, logs, metrics, release history, and infrastructure changes.\"},{\"title\":\"Contracts before code volume\",\"body\":\"A good backend service is easier to operate when its API, retries, idempotency, security boundary, and compatibility rules are clear.\"},{\"title\":\"Rollout before big-bang release\",\"body\":\"Feature flags, tenant targeting, staged deployment, and rollback criteria keep product movement steady without making every release a gamble.\"},{\"title\":\"Documentation should reduce interruption\",\"body\":\"Specs, runbooks, and checklists are useful when they let another engineer diagnose, recover, or continue the work without waiting for one person.\"}]},\"closing\":{\"label\":\"About closing note\",\"body\":\"I am most useful in teams where \u003cstrong\u003eproduct ambition\u003c/strong\u003e, \u003cstrong\u003ebackend complexity\u003c/strong\u003e, and \u003cstrong\u003eproduction reliability\u003c/strong\u003e meet. That is where careful engineering turns unclear systems into something the team can ship, observe, and improve.\"}},\"ReaderTools\":{\"label\":\"Reader tools\",\"scrollTop\":\"Scroll to top\",\"scrollBottom\":\"Scroll to bottom\",\"font\":\"Change reading font\",\"background\":\"Change reading background\",\"language\":\"Change language\"}},\"now\":\"$undefined\",\"timeZone\":\"Asia/Saigon\",\"children\":[\"$L1f\",\"$L20\"]}]\n"])</script><script>self.__next_f.push([1,"21:I[34416,[\"/_
