          </style><script type="application/ld+json">{"@context":"https://schema.org","@type":"CollectionPage","@id":"https://nguyenlephong.github.io/vi/studio#studio","name":"Studio — Engineering Flows, AI Notes & System Design","description":"A public working shelf for system design flows, release readiness, AI-assisted delivery, machine setup, daily learning checklists, and skill libraries.","url":"https://nguyenlephong.github.io/vi/studio","inLanguage":"vi","isPartOf":{"@type":"WebSite","@id":"https://nguyenlephong.github.io/#website"},"author":{"@type":"Person","@id":"https://nguyenlephong.github.io/#person"},"hasPart":[{"@type":"TechArticle","headline":"AI Operating System","description":"This note turns the AI stack into a daily operating system: NotebookLM keeps source-backed truth, GPT plans, Claude critiques, Codex ships code, Antigravity verifies prototypes, and every useful lesson becomes a reusable artifact.","url":"https://nguyenlephong.github.io/vi/studio#ai-operating-system","dateModified":"2026-06-21","keywords":"AI OS, NotebookLM, GPT, Claude, Codex, Antigravity, Daily learning"},{"@type":"TechArticle","headline":"AI-Driven Engineering Foundation","description":"This note keeps the long-term learning direction visible: AI can generate code quickly, but senior leverage comes from asking the right technical questions, choosing the right trade-offs, verifying failure modes, and owning production behavior.","url":"https://nguyenlephong.github.io/vi/studio#ai-driven-engineering-foundation","dateModified":"2026-06-21","keywords":"Engineering roadmap, Architecture, Data, Resilience, Observability, AI workflow"},{"@type":"TechArticle","headline":"AI-Driven System Engineering Roadmap","description":"This roadmap keeps the next learning layer visible: AI can write code faster, but a senior engineer must own architecture decisions, verify distributed failure modes, understand storage trade-offs, and use AI as a disciplined reviewer.","url":"https://nguyenlephong.github.io/vi/studio#ai-system-engineering-roadmap","dateModified":"2026-06-21","keywords":"AI up-skill, System engineering, SDLC, Distributed systems, Storage, AI workflow"},{"@type":"TechArticle","headline":"Antigravity Awesome Skills","description":"This is not a list of every installed skill. It is the install note I need when I move to a new machine: what to run, where the source lives, and what to ask an agent to restore.","url":"https://nguyenlephong.github.io/vi/studio#antigravity-awesome-skills","dateModified":"2026-06-20","keywords":"AI setup, Antigravity, Codex, Claude, Gemini, Skills"},{"@type":"TechArticle","headline":"Open Design","description":"Open Design can support this Studio direction as a design reference and future MCP integration. I do not have a callable Open Design tool in this session, but the project itself is worth keeping in the setup notes.","url":"https://nguyenlephong.github.io/vi/studio#open-design","dateModified":"2026-06-20","keywords":"Design, MCP, Codex, Claude, Gemini, Antigravity"},{"@type":"TechArticle","headline":"Computer setup","description":"This note is for the non-terminal part of a new engineering machine: folders, browsers, fonts, login flows, and basic safety rules.","url":"https://nguyenlephong.github.io/vi/studio#computer-baseline","dateModified":"2026-06-20","keywords":"Computer setup, macOS, Browser, Security"},{"@type":"TechArticle","headline":"Terminal setup","description":"This note keeps the command-line setup close to the actual work: Git, GitHub CLI, Node/Bun, Java/PlantUML, deployment commands, and AI CLI install commands.","url":"https://nguyenlephong.github.io/vi/studio#terminal-baseline","dateModified":"2026-06-20","keywords":"Terminal setup, Git, Node, Bun, PlantUML"},{"@type":"TechArticle","headline":"Multi-agent AI","description":"Future note for patterns where multiple agents help plan, code, review, test, or research without turning the workflow into noise.","url":"https://nguyenlephong.github.io/vi/studio#multi-agent-ai","dateModified":"2026-06-20","keywords":"AI learning, Multi-agent, Workflow"},{"@type":"TechArticle","headline":"OpenHands","description":"A placeholder note for OpenHands. The useful future version should include install commands, project fit, and where it overlaps with Codex or Claude.","url":"https://nguyenlephong.github.io/vi/studio#openhands","dateModified":"2026-06-20","keywords":"AI learning, OpenHands"},{"@type":"TechArticle","headline":"CrewAI","description":"A placeholder note for CrewAI. The future note should focus on when a crew abstraction helps more than a plain script or a single agent.","url":"https://nguyenlephong.github.io/vi/studio#crewai","dateModified":"2026-06-20","keywords":"AI learning, CrewAI, Agents"},{"@type":"HowTo","name":"Flow system design cho senior software engineer","description":"Flow system design thực dụng để làm rõ requirement, chọn boundary, model dữ liệu, xử lý scale và giải thích trade-off mạch lạc.","url":"https://nguyenlephong.github.io/vi/studio?route=flow-system-design&flow=system-design#flow-system-design","keywords":"System Design, Architecture, Trade-off, Interview","step":[{"@type":"HowToStep","position":1,"name":"Đóng khung bài toán","text":"Nói lại user, job, constraint và non-goal trước khi gọi tên công nghệ. Problem frame ngắn và danh sách assumption cần confirm."},{"@type":"HowToStep","position":2,"name":"Định hình interface","text":"Phác API, event, user action và admin action quanh workflow thật. Ghi chú API/event contract cùng các boundary đầu tiên."},{"@type":"HowToStep","position":3,"name":"Model dữ liệu","text":"Chọn ownership, consistency rule, index, retention và hướng migration. Data sketch kèm consistency và migration note."},{"@type":"HowToStep","position":4,"name":"Thiết kế runtime","text":"Đặt service, queue, cache, worker và gateway chỉ khi chúng giải quyết một áp lực rõ. Runtime architecture có lý do cho từng phần chuyển động."},{"@type":"HowToStep","position":5,"name":"Stress failure modes","text":"Đi qua dependency chậm, request trùng, partial write, deploy lỗi và stale read. Failure-mode table với mitigation và monitoring hook."},{"@type":"HowToStep","position":6,"name":"Giải thích hướng tiến hóa","text":"Nói rõ bản đầu tiên thực tế, điểm gãy và design tiếp theo khi traffic hoặc team lớn hơn. Roadmap theo phiên bản: v1, trigger scale và alternative đã từ chối."}]},{"@type":"HowTo","name":"Flow quyết định kiến trúc với tư duy RFC và ADR","description":"Flow quyết định kiến trúc để so sánh option, cân trade-off, ghi rủi ro và align team trước khi implement.","url":"https://nguyenlephong.github.io/vi/studio?route=flow-architecture-decision&flow=architecture-decision#flow-architecture-decision","keywords":"RFC, ADR, Architecture Review, Decision Matrix","step":[{"@type":"HowToStep","position":1,"name":"Gọi tên quyết định","text":"Viết quyết định thành một câu và thu scope đủ nhỏ để có thể approve. Decision statement có scope và non-goal."},{"@type":"HowToStep","position":2,"name":"Rút invariant","text":"Liệt kê điều luôn phải đúng với user, tiền, permission, data, audit và support. Danh sách invariant mà mọi option phải giữ được."},{"@type":"HowToStep","position":3,"name":"So sánh option thật","text":"Đánh giá hai hoặc ba hướng thực dụng, không dựng một design hoàn hảo để thắng strawman. Option table với trade-off trung thực."},{"@type":"HowToStep","position":4,"name":"Đặt risk gate","text":"Chốt validation, telemetry, rollout và rollback trước khi implementation bắt đầu. Decision gate và launch condition."},{"@type":"HowToStep","position":5,"name":"Viết decision note","text":"Giữ note đủ ngắn để đọc lúc review, nhưng đủ đầy để sống qua handoff. ADR/RFC entry sẵn sàng review."}]},{"@type":"HowTo","name":"Flow xử lý production incident cho engineering team","description":"Flow incident cho triage, kiểm soát blast radius, rollback, communication, root cause analysis và follow-up.","url":"https://nguyenlephong.github.io/vi/studio?route=flow-incident-response&flow=incident-response#flow-incident-response","keywords":"Incident, SRE, Rollback, Postmortem","step":[{"@type":"HowToStep","position":1,"name":"Xác nhận signal","text":"Tách incident có impact thật khỏi metric nhiễu hoặc một dependency chập chờn. Trạng thái incident, severity và owner ban đầu."},{"@type":"HowToStep","position":2,"name":"Giới hạn blast radius","text":"Bảo vệ user trước bằng flag, rate limit, rollback, shift traffic hoặc tạm disable. Mitigation action kèm impact dự kiến."},{"@type":"HowToStep","position":3,"name":"Điều phối phòng incident","text":"Chia incident lead, comms, investigation và verification để team không giẫm chân nhau. Timeline incident và cadence communication chung."},{"@type":"HowToStep","position":4,"name":"Xác nhận recovery","text":"Đừng đóng incident chỉ vì một graph đẹp hơn; kiểm user path và downstream queue. Recovery confirmation và watch window."},{"@type":"HowToStep","position":5,"name":"Viết follow-up","text":"Biến incident thành prevention work mà không đổ lỗi cho người chạm deploy. Postmortem, action item, owner và due date."}]},{"@type":"HowTo","name":"Flow release readiness cho rollout phần mềm an toàn","description":"Flow release readiness để kiểm test, analytics, migration safety, observability, communication, rollout gate và rollback plan.","url":"https://nguyenlephong.github.io/vi/studio?route=flow-release-readiness&flow=release-readiness#flow-release-readiness","keywords":"Release, Rollout, QA, Observability","step":[{"@type":"HowToStep","position":1,"name":"Xác nhận scope","text":"So release với ticket, acceptance criteria, non-goal và behavior user thấy được. Scope release và non-goal rõ ràng."},{"@type":"HowToStep","position":2,"name":"Verify behavior","text":"Chạy check đúng với risk: unit, integration, E2E, accessibility, typecheck và smoke thủ công. Verification note kèm residual risk."},{"@type":"HowToStep","position":3,"name":"Kiểm data và migration","text":"Review schema change, backfill, index, cache, analytics event và SEO path. Checklist sẵn sàng cho data và tracking."},{"@type":"HowToStep","position":4,"name":"Chuẩn bị observability","text":"Đảm bảo release quan sát được bằng signal có thể hành động, không chỉ graph đẹp. Watch plan và escalation path."},{"@type":"HowToStep","position":5,"name":"Chốt rollout decision","text":"Chọn gradual rollout, release ngay, hold hoặc rollback dựa trên evidence. Go/hold decision kèm rollback trigger."}]},{"@type":"HowTo","name":"Flow delivery phần mềm có AI hỗ trợ và human review","description":"Flow AI-assisted delivery để scope task, đóng gói context, apply change, verify behavior và handoff công việc sẵn sàng review.","url":"https://nguyenlephong.github.io/vi/studio?route=flow-ai-delivery&flow=ai-delivery#flow-ai-delivery","keywords":"AI Delivery, Agents, Code Review, Verification","step":[{"@type":"HowToStep","position":1,"name":"Scope task","text":"Dịch request thành acceptance criteria, surface bị ảnh hưởng, non-goal và privacy boundary. Task brief có ranh giới rõ."},{"@type":"HowToStep","position":2,"name":"Đóng gói context","text":"Đưa cho agent file, example, convention, test và cảnh báo thật sự liên quan. Context pack và implementation hint."},{"@type":"HowToStep","position":3,"name":"Làm theo lát nhỏ","text":"Giữ edit hẹp, dùng abstraction sẵn có và verify từng boundary rủi ro trước khi đi tiếp. Implementation diff tập trung."},{"@type":"HowToStep","position":4,"name":"Verify và review","text":"Chạy test, đọc diff, kiểm chất lượng copy, analytics wiring và security/privacy implication. Verification summary và review note."},{"@type":"HowToStep","position":5,"name":"Handoff sạch","text":"Chuẩn bị commit, PR, release note hoặc deploy chỉ khi request của người dùng cho phép. Handoff sẵn sàng cho commit/PR/deploy."}]},{"@type":"HowTo","name":"Flow kể câu chuyện engineering portfolio cho CV và phỏng vấn","description":"Flow portfolio story để biến công việc engineering thành context, action, trade-off, impact, evidence và bài học tiếp theo.","url":"https://nguyenlephong.github.io/vi/studio?route=flow-portfolio-story&flow=portfolio-story#flow-portfolio-story","keywords":"CV, Portfolio, Writing, Career","step":[{"@type":"HowToStep","position":1,"name":"Ghi lại context","text":"Nói rõ tình huống team, pain của user, constraint và vì sao việc này quan trọng lúc đó. Context paragraph cụ thể, không phóng đại."},{"@type":"HowToStep","position":2,"name":"Cho thấy hành động","text":"Mô tả điều anh đổi, quyết định, phối hợp hoặc làm đơn giản hơn bằng ngôn ngữ engineering rõ. Action list có cả technical detail và collaboration detail."},{"@type":"HowToStep","position":3,"name":"Gọi tên trade-off","text":"Giải thích constraint làm công việc này đáng chú ý: thời gian, reliability, UX, cost, privacy hoặc sức team. Trade-off note thể hiện judgment."},{"@type":"HowToStep","position":4,"name":"Chứng minh impact","text":"Dùng số liệu khi có, nhưng vẫn ghi lại risk giảm, handoff sạch hơn, reliability tốt hơn hoặc support nhanh hơn. Impact statement có evidence và caveat."},{"@type":"HowToStep","position":5,"name":"Định dạng câu chuyện","text":"Biến raw material thành đúng format cho CV, interview, blog hoặc portfolio page. CV bullet, STAR answer, blog outline hoặc case-study draft."}]},{"@type":"HowTo","name":"React Flow Example cho nhiều dạng sơ đồ kỹ thuật","description":"Studio demo React Flow với node mặc định, custom architecture shape, grouping, layout, validation, whiteboard annotation, edge type, label, marker, minimap, control và background.","url":"https://nguyenlephong.github.io/vi/studio?route=flow-react-flow-architecture-demo&flow=react-flow-architecture-demo#flow-react-flow-architecture-demo","keywords":"React Flow, XYFlow, Architecture Diagram, Node Shapes, Edge Types","step":[{"@type":"HowToStep","position":1,"name":"Hiện node primitive","text":"Render input, default, output và group-style node trước khi thêm vocabulary kiến trúc riêng. Một canvas baseline cho thấy primitive React Flow bắt đầu từ đâu."},{"@type":"HowToStep","position":2,"name":"Thêm shape kiến trúc","text":"Dùng custom node cho API gateway, service, worker, database, cache, queue, topic, external system, decision, risk và note. Một shape catalog tái dùng cho system diagram."},{"@type":"HowToStep","position":3,"name":"So sánh edge type","text":"Hiện default, straight, step, smoothstep và simplebezier edge với label, arrow và async path có animation. Một edge language giúp sơ đồ architecture dễ đọc hơn."},{"@type":"HowToStep","position":4,"name":"Dùng canvas control","text":"Giữ Background, Controls, MiniMap, fitView, zoom và pan để architecture map lớn vẫn inspect được. Một diagram surface dùng được cho cả overview lẫn inspect chi tiết."},{"@type":"HowToStep","position":5,"name":"Model system architecture","text":"Đặt client, edge, domain, data, external và operations zone vào cùng một câu chuyện kiến trúc. Một checkout-style reference architecture dùng để demo toàn bộ shape set."},{"@type":"HowToStep","position":6,"name":"Biến demo thành template","text":"Dùng demo làm điểm bắt đầu cho architecture review, RFC, ADR, onboarding hoặc giải thích incident. Một React Flow architecture template sẵn để adapt."}]},{"@type":"HowTo","name":"React Flow System Design Blueprint Example","description":"Blueprint system design lớn bằng React Flow với architecture zone được group, custom node, edge có label, async path có animation, minimap, control và focused view.","url":"https://nguyenlephong.github.io/vi/studio?route=flow-react-flow-system-blueprint&flow=react-flow-system-blueprint#flow-react-flow-system-blueprint","keywords":"React Flow, System Design, Blueprint, Distributed Systems, Media Pipeline","step":[{"@type":"HowToStep","position":1,"name":"Map edge entry","text":"Cho thấy domain lookup, resolver, CDN, request metadata, security policy và API gateway nối với nhau trước khi traffic vào service. Ingress path rõ ràng để đọc được hành trình request."},{"@type":"HowToStep","position":2,"name":"Hiện runtime topology","text":"Tách load balancing, frontend server, backend service, message dispatch và connection ownership thành các vùng dễ đọc. Runtime zone giải thích traffic được nhận, route và dispatch ở đâu."},{"@type":"HowToStep","position":3,"name":"Đưa coordination lên bề mặt","text":"Biến distributed ID, lock, concurrency choice và metadata table thành thành phần chính của diagram. Coordination layer cho thấy write và streaming chunk ổn định bằng cách nào."},{"@type":"HowToStep","position":4,"name":"Trace storage và media","text":"Nối database chính, shard, replica, cache, object storage, queue, processing worker và encoded output. Data và media pipeline có thể inspect ngay trong canvas."},{"@type":"HowToStep","position":5,"name":"Fan out downstream","text":"Hiện các consumer như notification, recommendation, log processing, search, analytics và payment charge. Fan-out zone làm rõ secondary effect thay vì giấu sau một box."}]}]}</script><div aria-label="Studio Admin dashboard" data-studio-shadow-host="" style="display:block;min-height:100vh"></div></main><!--$--><!--/$--><footer class="app-footer"><div class="app-footer-inner"><div class="footer-meta"><p class="footer-name">Nguyen Le Phong</p><p class="footer-tag">Senior Software Engineer · Technical Lead</p></div><div class="footer-center"><ul class="footer-social" aria-label="Social profiles"><li><a aria-label="Apps" title="Apps" href="/vi/apps"><svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" height="18" width="18" xmlns="http://www.w3.org/2000/svg"><rect x="2" y="4" width="20" height="16" rx="2"></rect><path d="M10 4v4"></path><path d="M2 8h20"></path><path d="M6 4v4"></path></svg></a></li><li><a aria-label="Studio" title="Studio" href="/vi/studio"><svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" height="18" width="18" xmln "headline\":\"AI-Driven System Engineering Roadmap\",\"description\":\"This roadmap keeps the next learning layer visible: AI can write code faster, but a senior engineer must own architecture decisions, verify distributed failure modes, understand storage trade-offs, and use AI as a disciplined reviewer.\",\"url\":\"https://nguyenlephong.github.io/vi/studio#ai-system-engineering-roadmap\",\"dateModified\":\"2026-06-21\",\"keywords\":\"AI up-skill, System engineering, SDLC, Distributed systems, Storage, AI workflow\"},{\"@type\":\"TechArticle\",\"headline\":\"Antigravity Awesome Skills\",\"description\":\"This is not a list of every installed skill. It is the install note I need when I move to a new machine: what to run, where the source lives, and what to ask an agent to restore.\",\"url\":\"https://nguyenlephong.github.io/vi/studio#antigravity-awesome-skills\",\"dateModified\":\"2026-06-20\",\"keywords\":\"AI setup, Antigravity, Codex, Claude, Gemini, Skills\"},{\"@type\":\"TechArticle\",\"headline\":\"Open Design\",\"description\":\"Open Design can support this Studio direction as a design reference and future MCP integration. I do not have a callable Open Design tool in this session, but the project itself is worth keeping in the setup notes.\",\"url\":\"https://nguyenlephong.github.io/vi/studio#open-design\",\"dateModified\":\"2026-06-20\",\"keywords\":\"Design, MCP, Codex, Claude, Gemini, Antigravity\"},{\"@type\":\"TechArticle\",\"headline\":\"Computer setup\",\"description\":\"This note is for the non-terminal part of a new engineering machine: folders, browsers, fonts, login flows, and basic safety rules.\",\"url\":\"https://nguyenlephong.github.io/vi/studio#computer-baseline\",\"dateModified\":\"2026-06-20\",\"keywords\":\"Computer setup, macOS, Browser, Security\"},{\"@type\":\"TechArticle\",\"headline\":\"Terminal setup\",\"description\":\"This note keeps the command-line setup close to the actual work: Git, GitHub CLI, Node/Bun, Java/PlantUML, deployment commands, and AI CLI install commands.\",\"url\":\"https://nguyenlephong.github.io/vi/studio#terminal-baseline\",\"dateModified\":\"2026-06-20\",\"keywords\":\"Terminal setup, Git, Node, Bun, PlantUML\"},{\"@type\":\"TechArticle\",\"headline\":\"Multi-agent AI\",\"description\":\"Future note for patterns where multiple agents help plan, code, review, test, or research without turning the workflow into noise.\",\"url\":\"https://nguyenlephong.github.io/vi/studio#multi-agent-ai\",\"dateModified\":\"2026-06-20\",\"keywords\":\"AI learning, Multi-agent, Workflow\"},{\"@type\":\"TechArticle\",\"headline\":\"OpenHands\",\"description\":\"A placeholder note for OpenHands. The useful future version should include install commands, project fit, and where it overlaps with Codex or Claude.\",\"url\":\"https://nguyenlephong.github.io/vi/studio#openhands\",\"dateModified\":\"2026-06-20\",\"keywords\":\"AI learning, OpenHands\"},{\"@type\":\"TechArticle\",\"headline\":\"CrewAI\",\"description\":\"A placeholder note for CrewAI. The future note should focus on when a crew abstraction helps more than a plain script or a single agent.\",\"url\":\"https://nguyenlephong.github.io/vi/studio#crewai\",\"dateModified\":\"2026-06-20\",\"keywords\":\"AI learning, CrewAI, Agents\"},{\"@type\":\"HowTo\",\"name\":\"Flow system design cho senior software engineer\",\"description\":\"Flow system design thực dụng để làm rõ requirement, chọn boundary, model dữ liệu, xử lý scale và giải thích trade-off mạch lạc.\",\"url\":\"https://nguyenlephong.github.io/vi/studio?route=flow-system-design\u0026flow=system-design#flow-system-design\",\"keywords\":\"System Design, Architecture, Trade-off, Interview\",\"step\":[{\"@type\":\"HowToStep\",\"position\":1,\"name\":\"Đóng khung bài toán\",\"text\":\"Nói lại user, job, constraint và non-goal trước khi gọi tên công nghệ. Problem frame ngắn và danh sách assumption cần confirm.\"},{\"@type\":\"HowToStep\",\"position\":2,\"name\":\"Định hình interface\",\"text\":\"Phác API, event, user action và admin action quanh workflow thật. Ghi chú API/event contract cùng các boundary đầu tiên.\"},{\"@type\":\"HowToStep\",\"position\":3,\"name\":\"Model dữ liệu\",\"text\":\"Chọn ownership, consistency rule, index, retention và hướng migration. Data sketch kèm consistency và migration note.\"},{\"@type\":\"HowToStep\",\"position\":4,\"name\":\"Thiết kế runtime\",\"text\":\"Đặt service, queue, cache, worker và gateway chỉ khi chúng giải quyết một áp lực rõ. Runtime architecture có lý do cho từng phần chuyển động.\"},{\"@type\":\"HowToStep\",\"position\":5,\"name\":\"Stress failure modes\",\"text\":\"Đi qua dependency chậm, request trùng, partial write, deploy lỗi và stale read. Failure-mode table với mitigation và monitoring hook.\"},{\"@type\":\"HowToStep\",\"position\":6,\"name\":\"Giải thích hướng tiến hóa\",\"text\":\"Nói rõ bản đầu tiên thực tế, điểm gãy và design tiếp theo khi traffic hoặc team lớn hơn. Roadmap theo phiên bản: v1, trigger scale và alternative đã từ chối.\"}]},{\"@type\":\"HowTo\",\"name\":\"Flow quyết định kiến trúc với tư duy RFC và ADR\",\"description\":\"Flow quyết định kiến trúc để so sánh option, cân trade-off, ghi rủi ro và align team trước khi implement.\",\"url\":\"https://nguyenlephong.github.io/vi/studio?route=flow-architecture-decision\u0026flow=architecture-decision#flow-architecture-decision\",\"keywords\":\"RFC, ADR, Architecture Review, Decision Matrix\",\"step\":[{\"@type\":\"HowToStep\",\"position\":1,\"name\":\"Gọi tên quyết định\",\"text\":\"Viết quyết định thành một câu và thu scope đủ nhỏ để có thể approve. Decision statement có scope và non-goal.\"},{\"@type\":\"HowToStep\",\"position\":2,\"name\":\"Rút invariant\",\"text\":\"Liệt kê điều luôn phải đúng với user, tiền, permission, data, audit và support. Danh sách invariant mà mọi option phải giữ được.\"},{\"@type\":\"HowToStep\",\"position\":3,\"name\":\"So sánh option thật\",\"text\":\"Đánh giá hai hoặc ba hướng thực dụng, không dựng một design hoàn hảo để thắng strawman. Option table với trade-off trung thực.\"},{\"@type\":\"HowToStep\",\"position\":4,\"name\":\"Đặt risk gate\",\"text\":\"Chốt validation, telemetry, rollout và rollback trước khi implementation bắt đầu. Decision gate và launch condition.\"},{\"@type\":\"HowToStep\",\"position\":5,\"name\":\"Viết decision note\",\"text\":\"Giữ note đủ ngắn để đọc lúc review, nhưng đủ đầy để sống qua handoff. ADR/RFC entry sẵn sàng review.\"}]},{\"@type\":\"HowTo\",\"name\":\"Flow xử lý production incident cho engineering team\",\"description\":\"Flow incident cho triage, kiểm soát blast radius, rollback, communication, root cause analysis và follow-up.\",\"url\":\"https://nguyenlephong.github.io/vi/studio?route=flow-incident-response\u0026flow=incident-response#flow-incident-response\",\"keywords\":\"Incident, SRE, Rollback, Postmortem\",\"step\":[{\"@type\":\"HowToStep\",\"position\":1,\"name\":\"Xác nhận signal\",\"text\":\"Tách incident có impact thật khỏi metric nhiễu hoặc một dependency chập chờn. Trạng thái incident, severity và owner ban đầu.\"},{\"@type\":\"HowToStep\",\"position\":2,\"name\":\"Giới hạn blast radius\",\"text\":\"Bảo vệ user trước bằng flag, rate limit, rollback, shift traffic hoặc tạm disable. Mitigation action kèm impact dự kiến.\"},{\"@type\":\"HowToStep\",\"position\":3,\"name\":\"Điều phối phòng incident\",\"text\":\"Chia incident lead, comms, investigation và verification để team không giẫm chân nhau. Timeline incident và cadence communication chung.\"},{\"@type\":\"HowToStep\",\"position\":4,\"name\":\"Xác nhận recovery\",\"text\":\"Đừng đóng incident chỉ vì một graph đẹp hơn; kiểm user path và downstream queue. Recovery confirmation và watch window.\"},{\"@type\":\"HowToStep\",\"position\":5,\"name\":\"Viết follow-up\",\"text\":\"Biến incident thành prevention work mà không đổ lỗi cho người chạm deploy. Postmortem, action item, owner và due date.\"}]},{\"@type\":\"HowTo\",\"name\":\"Flow release readiness cho rollout phần mềm an toàn\",\"description\":\"Flow release readiness để kiểm test, analytics, migration safety, observability, communication, rollout gate và rollback plan.\",\"url\":\"https://nguyenlephong.github.io/vi/studio?route=flow-release-readiness\u0026flow=release-readiness#flow-release-readiness\",\"keywords\":\"Release, Rollout, QA, Observability\",\"step\":[{\"@type\":\"HowToStep\",\"position\":1,\"name\":\"Xác nhận scope\",\"text\":\"So release với ticket, acceptance criteria, non-goal và behavior user thấy được. Scope release và non-goal rõ ràng.\"},{\"@type\":\"HowToStep\",\"position\":2,\"name\":\"Verify behavior\",\"text\":\"Chạy check đúng với risk: unit, integration, E2E, accessibility, typecheck và smoke thủ công. Verification note kèm residual risk.\"},{\"@type\":\"HowToStep\",\"position\":3,\"name\":\"Kiểm data và migration\",\"text\":\"Review schema change, backfill, index, cache, analytics event và SEO path. Checklist sẵn sàng cho data và tracking.\"},{\"@type\":\"HowToStep\",\"position\":4,\"name\":\"Chuẩn bị observability\",\"text\":\"Đảm bảo release quan sát được bằng signal có thể hành động, không chỉ graph đẹp. Watch plan và escalation path.\"},{\"@type\":\"HowToStep\",\"position\":5,\"name\":\"Chốt rollout decision\",\"text\":\"Chọn gradual rollout, release ngay, hold hoặc rollback dựa trên evidence. Go/hold decision kèm rollback trigger.\"}]},{\"@type\":\"HowTo\",\"name\":\"Flow delivery phần mềm có AI hỗ trợ và human review\",\"description\":\"Flow AI-assisted delivery để scope task, đóng gói context, apply change, verify behavior và handoff công việc sẵn sàng review.\",\"url\":\"https://nguyenlephong.github.io/vi/studio?route=flow-ai-delivery\u0026flow=ai-delivery#flow-ai-delivery\",\"keywords\":\"AI Delivery, Agents, Code Review, Verification\",\"step\":[{\"@type\":\"HowToStep\",\"position\":1,\"name\":\"Scope task\",\"text\":\"Dịch request thành acceptance criteria, surface bị ảnh hưởng, non-goal và privacy boundary. Task brief có ranh giới rõ.\"},{\"@type\":\"HowToStep\",\"position\":2,\"name\":\"Đóng gói context\",\"text\":\"Đưa cho agent file, example, convention, test và cảnh báo thật sự liên quan. Context pack và implementation hint.\"},{\"@type\":\"HowToStep\",\"position\":3,\"name\":\"Làm theo lát nhỏ\",\"text\":\"Giữ edit hẹp, dùng abstraction sẵn có và verify từng boundary rủi ro trước khi đi tiếp. Implementation diff tập trung.\"},{\"@type\":\"HowToStep\",\"position\":4,\"name\":\"Verify và review\",\"text\":\"Chạy test, đọc diff, kiểm chất lượng copy, analytics wiring và security/privacy implication. Verification summary và review note.\"},{\"@type\":\"HowToStep\",\"position\":5,\"name\":\"Handoff sạch\",\"text\":\"Chuẩn bị commit, PR, release note hoặc deploy chỉ khi request của người dùng cho phép. Handoff sẵn sàng cho commit/PR/deploy.\"}]},{\"@type\":\"HowTo\",\"name\":\"Flow kể câu chuyện engineering portfolio cho CV và phỏng vấn\",\"description\":\"Flow portfolio story để biến công việc engineering thành context, action, trade-off, impact, evidence và bài học tiếp theo.\",\"url\":\"https://nguyenlephong.github.io/vi/studio?route=flow-portfolio-story\u0026flow=portfolio-story#flow-portfolio-story\",\"keywords\":\"CV, Portfolio, Writing, Career\",\"step\":[{\"@type\":\"HowToStep\",\"position\":1,\"name\":\"Ghi lại context\",\"text\":\"Nói rõ tình huống team, pain của user, constraint và vì sao việc này quan trọng lúc đó. Context paragraph cụ thể, không phóng đại.\"},{\"@type\":\"HowToStep\",\"position\":2,\"name\":\"Cho thấy hành động\",\"text\":\"Mô tả điều anh đổi, quyết định, phối hợp hoặc làm đơn giản hơn bằng ngôn ngữ engineering rõ. Action list có cả technical detail và collaboration detail.\"},{\"@type\":\"HowToStep\",\"position\":3,\"name\":\"Gọi tên trade-off\",\"text\":\"Giải thích constraint làm công việc này đáng chú ý: thời gian, reliability, UX, cost, privacy hoặc sức team. Trade-off note thể hiện judgment.\"},{\"@type\":\"HowToStep\",\"position\":4,\"name\":\"Chứng minh impact\",\"text\":\"Dùng số liệu khi có, nhưng vẫn ghi lại risk giảm, handoff sạch hơn, reliability tốt hơn hoặc support nhanh hơn. Impact statement có evidence và caveat.\"},{\"@type\":\"HowToStep\",\"position\":5,\"name\":\"Định dạng câu chuyện\",\"text\":\"Biến raw material thành đúng format cho CV, interview, blog hoặc portfolio page. CV bullet, STAR answer, blog outline hoặc case-study draft.\"}]},{\"@type\":\"HowTo\",\"name\":\"React Flow Example cho nhiều dạng sơ đồ kỹ thuật\",\"description\":\"Studio demo React Flow với node mặc định, custom architecture shape, grouping, layout, validation, whiteboard annotation, edge type, label, marker, minimap, control và background.\",\"url\":\"https://nguyenlephong.github.io/vi/studio?route=flow-react-flow-architecture-demo\u0026flow=react-flow-architecture-demo#flow-react-flow-architecture-demo\",\"keywords\":\"React Flow, XYFlow, Architecture Diagram, Node Shapes, Edge Types\",\"step\":[{\"@type\":\"HowToStep\",\"position\":1,\"name\":\"Hiện node primitive\",\"text\":\"Render input, default, output và group-style node trước khi thêm vocabulary kiến trúc riêng. Một canvas baseline cho thấy primitive React Flow bắt đầu từ đâu.\"},{\"@type\":\"HowToStep\",\"position\":2,\"name\":\"Thêm shape kiến trúc\",\"text\":\"Dùng custom node cho API gateway, service, worker, database, cache, queue, topic, external system, decision, risk và note. Một shape catalog tái dùng cho system diagram.\"},{\"@type\":\"HowToStep\",\"position\":3,\"name\":\"So sánh edge type\",\"text\":\"Hiện default, straight, step, smoothstep và simplebezier edge với label, arrow và async path có animation. Một edge language giúp sơ đồ architecture dễ đọc hơn.\"},{\"@type\":\"HowToStep\",\"position\":4,\"name\":\"Dùng canvas control\",\"text\":\"Giữ Background, Controls, MiniMap, fitView, zoom và pan để architecture map lớn vẫn inspect được. Một diagram surface dùng được cho cả overview lẫn inspect chi tiết.\"},{\"@type\":\"HowToStep\",\"position\":5,\"name\":\"Model system architecture\",\"text\":\"Đặt client, edge, domain, data, external và operations zone vào cùng một câu chuyện kiến trúc. Một checkout-style reference architecture dùng để demo toàn bộ shape set.\"},{\"@type\":\"HowToStep\",\"position\":6,\"name\":\"Biến demo thành template\",\"text\":\"Dùng demo làm điểm bắt đầu cho architecture review, RFC, ADR, onboarding hoặc giải thích incident. Một React Flow architecture template sẵn để adapt.\"}]},{\"@type\":\"HowTo\",\"name\":\"React Flow System Design Blueprint Example\",\"description\":\"Blueprint system design lớn bằng React Flow với architecture zone được group, custom node, edge có label, async path có animation, minimap, control và focused view.\",\"url\":\"https://nguyenlephong.github.io/vi/studio?route=flow-react-flow-system-blueprint\u0026flow=react-flow-system-blueprint#flow-react-flow-system-blueprint\",\"keywords\":\"React Flow, System Design, Blueprint, Distributed Systems, Media Pipeline\",\"step\":[{\"@type\":\"HowToStep\",\"position\":1,\"name\":\"Map edge entry\",\"text\":\"Cho thấy domain lookup, resolver, CDN, request metadata, security policy và API gateway nối với nhau trước khi traffic vào service. Ingress path rõ ràng để đọc được hành trình request.\"},{\"@type\":\"HowToStep\",\"position\":2,\"name\":\"Hiện runtime topology\",\"text\":\"Tách load balancing, frontend server, backend service, message dispatch và connection ownership thành các vùng dễ đọc. Runtime zone giải thích traffic được nhận, route và dispatch ở đâu.\"},{\"@type\":\"HowToStep\",\"position\":3,\"name\":\"Đưa coordination lên bề mặt\",\"text\":\"Biến distributed ID, lock, concurrency choice và metadata table thành thành phần chính của diagram. Coordination layer cho thấy write và streaming chunk ổn định bằng cách nào.\"},{\"@type\":\"HowToStep\",\"position\":4,\"name\":\"Trace storage và media\",\"text\":\"Nối database chính, shard, replica, cache, object storage, queue, processing worker và encoded output. Data và media pipeline có thể inspect ngay trong canvas.\"},{\"@type\":\"HowToStep\",\"position\":5,\"name\":\"Fan out downstream\",\"text\":\"Hiện các consumer như notification, recommendation, log processing, search, analytics và payment charge. Fan-out zone làm rõ secondary effect thay vì giấu sau một box.\"}]}]}"])</script><script>self.__next_f.push([1,"5:[\"$\",\"main\",null,{\"className\":\"studio-route-shell\",\"children\":[[\"$\",\"style\",null,{\"dangerouslySetInnerHTML\":{\"__html\":\"$e\"}}],[\"$\",\"script\",null,{\"type\":\"application/ld+json\",\"dangerouslySetInnerHTML\":{\"__html\":\"$f\"}}],\"$L10\",\"$L11\"]}]\n"])</script><script>self.__next_f.push([1,"12:I[48677,[\"/_next/static/chunks/3eb5526bf007241a.js\",\"/_next/static/chunks/76607804508f67af.js\",\"/_next/static/chunks/ef6dc99b3733f98f.js\",\"/_next/static/chunks/cd6b51a303fddcb4.js\",\"/_next/static/chunks/615749f3583e97a0.js\",\"/_next/static/chunks/adb371ef802fb2d4.js\",\"/_next/static/chunks/0b1b953501cc1989.js\",\"/_next/static/chunks/cd3771531ac7d570.js\"],\"default\"]\n13:I[55526,[\"/_next/static/chunks/3eb5526bf007241a.js\",\"/_next/static/chunks/76607804508f67af.js\",\"/_next/static/chunks/ef6dc99b3733f98f.js\",\"/_next/static/chunks/cd6b51a303fddcb4.js\",\"/_next/static/chunks/615749f3583e97a0.js\",\"/_next/static/chunks/adb371ef802fb2d4.js\",\"/_next/static/chunks/0b1b953501cc1989.js\",\"/_next/static/chunks/cd3771531ac7d570.js\"],\"default\"]\n10:[\"$\",\"$L12\",null,{\"page\":\"studio\",\"eventName\":\"studio_view\",\"section\":\"notes_admin\"}]\n11:[\"$\",\"$L13\",null,{\"locale\":\"vi\"}]\n"])</script><script>self.__next_f.push([1,"a:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover\"}],[\"$\",\"meta\",\"2\",{\"name\":\"theme-color\",\"media\":\"(prefers-color-scheme: light)\",\"content\":\"#fafafa\"}],[\"$\",\"meta\",\"3\",{\"name\":\"theme-color\",\"media\":\" p bền bỉ\",\"body\":\"Những hoạt động ngoài công việc giúp mình rèn sức bền, giữ năng lượng và học cách kiên trì qua từng chặng.\"}},\"story\":{\"label\":\"Đọc theo một mạch\",\"title\":\"Mỗi tấm ảnh là một đoạn đường nhỏ\",\"body\":\"Có ảnh nói về việc học, có ảnh nói về team, có ảnh nói về những dự án từng làm, cũng có ảnh nhắc mình về sức bền. Gom lại, chúng kể một câu chuyện đơn giản hơn: mình vẫn đang cố gắng tốt lên từng chút.\"},\"categoryNotes\":{\"all\":\"Xem trọn mạch từ học tập, dự án, ghi nhận tới thói quen đi đường dài.\",\"certificates\":\"Những lần học thêm để hiểu việc sâu hơn và làm cẩn thận hơn.\",\"awards\":\"Những lời ghi nhận nhỏ cho sự chủ động, trách nhiệm và bền bỉ.\",\"projects\":\"Những thứ từng được xây, được thử, được trình bày hoặc đưa vào làm thật.\",\"activities\":\"Những khoảnh khắc đời thường giúp mình giữ năng lượng và sức bền.\"},\"categoryIntros\":{\"certificates\":{\"body\":\"Đây là những lần mình chọn ngồi lại học thêm: có khi để hiểu rõ hơn về quality, có khi để cẩn thận hơn với compliance, security và cách sản phẩm vận hành ngoài đời thật.\",\"signal\":\"Mình học đều để hiểu việc sâu hơn và làm chắc hơn theo thời gian.\"},\"awards\":{\"body\":\"Mỗi ghi nhận ở đây đều gắn với một giai đoạn cụ thể: có lúc mình mới vào việc, có lúc đi cùng team qua một thử thách, có lúc tự đặt mục tiêu dài hơi và hoàn thành nó.\",\"signal\":\"Những ghi nhận này đến từ môi trường làm việc thật, nơi sự đều đặn và trách nhiệm được nhìn thấy rõ nhất.\"},\"projects\":{\"body\":\"Phần này là vài lát cắt từ sản phẩm, demo và bài làm. Điều mình quý không chỉ là màn hình cuối cùng, mà là quá trình biến một ý tưởng thành thứ có thể chạy, có thể giải thích và tiếp tục cải thiện.\",\"signal\":\"Mình thích biến ý tưởng thành thứ cụ thể, chạy được, giải thích được và còn có thể cải thiện tiếp.\"},\"activities\":{\"body\":\"Có những thứ không nằm trong Jira ticket hay release note, nhưng vẫn ảnh hưởng trực tiếp tới cách làm việc: góc bàn, thói quen, sức bền và trước\",\"relatedHeading\":\"Bài liên quan\",\"relatedIntro\":\"Một vài bài gần chủ đề này để bạn đọc tiếp mạch suy nghĩ với nhiều ngữ cảnh hơn.\",\"faqHeading\":\"Câu hỏi thường gặp\",\"seriesNames\":{\"foundations\":\"Software Architecture Foundations\",\"ways-of-working\":\"Ways of Working\",\"ai-in-practice\":\"AI in Practice\",\"kind-engineering\":\"Kind Engineering\"},\"engagement\":{\"reactionsPrompt\":\"Bạn thấy bài viết thế nào?\",\"views\":\"lượt xem\",\"share\":\"Chia sẻ\",\"copyLink\":\"Sao chép liên kết\",\"copied\":\"Đã sao chép!\",\"reactions\":{\"like\":\"Thích\",\"love\":\"Yêu thích\",\"insightful\":\"Sâu sắc\",\"clap\":\"Tuyệt vời\"},\"close\":\"Đóng\"}}},\"About\":{\"hero\":{\"eyebrow\":\"Hồ sơ kỹ thuật\",\"title\":\"Tôi xây dựng hệ thống sản phẩm có thể release, quan sát và phục hồi.\",\"lead\":\"Công việc hiện tại của tôi nằm giữa \u003cstrong\u003eproduct engineering\u003c/strong\u003e và \u003cstrong\u003eplatform reliability\u003c/strong\u003e: giao diện front-end, backend service, integration bảo mật, hệ thống rollout, hạ tầng Kubernetes và mô hình vận hành giúp team release ít phải đoán mò hơn.\",\"metricsLabel\":\"Tín hiệu kỹ thuật hiện tại\",\"metrics\":[{\"value\":\"8+\",\"label\":\"năm ship phần mềm production\"},{\"value\":\"11\",\"label\":\"thành viên trong delivery team tôi đang lead\"},{\"value\":\"30+\",\"label\":\"tenant được phục vụ bởi hệ thống rollout\"},{\"value\":\"~40k\",\"label\":\"người dùng phía sau nền tảng feature flag\"}]},\"systems\":{\"eyebrow\":\"Trọng tâm hiện tại\",\"title\":\"Lớp hệ thống tôi đang vận hành\",\"intro\":\"Tôi vẫn quan tâm đến giao diện chỉn chu, nhưng giá trị hiện tại rộng hơn: nối quyết định sản phẩm với backend contract, đường đi hạ tầng, kiểm soát release và khả năng chẩn đoán production.\",\"items\":[{\"title\":\"Backend service \u0026 integration bảo mật\",\"body\":\"Tôi làm việc với \u003cstrong\u003e.NET Core\u003c/strong\u003e, \u003cstrong\u003eNode.js\u003c/strong\u003e và \u003cstrong\u003eJava Spring\u003c/strong\u003e, tập trung vào REST/GraphQL contract, auth, mã hoá, backward compatibility, retry, idempotency và độ bất ổn từ hệ thống đối tác.\",\"tags\":[\".NET Core\",\"Node.js\",\"Java Spring\",\"REST/GraphQL\",\"mTLS\"]},{\"title\":\"Platform, infra \u0026 traffic path\",\"body\":\"Tôi tham gia vào đường đi production quanh \u003cstrong\u003eDocker\u003c/strong\u003e, \u003cstrong\u003eKubernetes\u003c/strong\u003e, \u003cstrong\u003eAKS/FKE/K3S/EKS\u003c/strong\u003e, \u003cstrong\u003eArgoCD\u003c/strong\u003e, CI/CD, domain/SSL, ingress, load balancer routing và các bước phục hồi khi hệ thống đang chịu áp lực.\",\"tags\":[\"Kubernetes\",\"ArgoCD\",\"CI/CD\",\"Ingress\",\"Load balancer\"]},{\"title\":\"Progressive delivery\",\"body\":\"Tôi đã xây dựng \u003cstrong\u003enền tảng feature flag multi-tenant\u003c/strong\u003e với rule ưu tiên, rollout theo tenant/segment/env, JSON-config values và runtime stateless để release đi từng bước thay vì bật toàn bộ cùng lúc.\",\"tags\":[\"Feature flags\",\"30+ tenant\",\"Rollout rules\",\"Runtime config\"]},{\"title\":\"Observability \u0026 vận hành rõ ràng\",\"body\":\"Tôi xây các feedback loop quanh release: PostHog, metrics pipeline, API health check, anomaly review, rollback readiness, RFC, runbook và release criteria để sự cố dễ hiểu hơn.\",\"tags\":[\"PostHog\",\"Metrics\",\"Runbook\",\"Rollback\",\"Release review\"]}]},\"stack\":{\"eyebrow\":\"Chiều sâu kỹ thuật\",\"title\":\"Những chi tiết kỹ thuật tôi chú ý\",\"intro\":\"Hệ thống tốt với tôi không chỉ đủ feature. Nó cần contract rõ, failure mode có thể đoán được và đủ dấu hiệu vận hành để team tìm ra vấn đề trước khi người dùng cảm nhận.\",\"groups\":[{\"title\":\"Kỹ thuật backend\",\"items\":[\"\u003cstrong\u003eAPI contract tương thích ngược\u003c/strong\u003e cho mobile, web và enterprise client.\",\"\u003cstrong\u003eRSA-4096 handshake, AES-256 payload encryption, mTLS, certificate pinning\u003c/strong\u003e và ACK-driven monitoring cho integration tài chính.\",\"\u003cstrong\u003eRetry queue và idempotent API\u003c/strong\u003e cho đối tác chậm, bất ổn hoặc xử lý bất đồng bộ.\",\"\u003cstrong\u003eStateless runtime evaluation\u003c/strong\u003e cho rollout rule, JSON config, tenant và segment targeting.\"]},{\"title\":\"Kỹ thuật hạ tầng\",\"items\":[\"\u003cstrong\u003eVận hành Kubernetes cluster\u003c/strong\u003e trên các môi trường AKS, FKE, K3S và EKS.\",\"\u003cstrong\u003eIngress, load balancer, domain và SSL path\u003c/strong\u003e được xem là một phần của product delivery flow, không phải hộp đen.\",\"\u003cstrong\u003eArgoCD và CI/CD pipeline\u003c/strong\u003e cho release lặp lại được, kiểm soát môi trường và phục hồi.\",\"\u003cstrong\u003eChẩn đoán production\u003c/strong\u003e qua log, metric, health check và recovery step được tài liệu hoá.\"]},{\"title\":\"Kiến trúc release\",\"items\":[\"\u003cstrong\u003eMicro-Frontend composition\u003c/strong\u003e với Angular host và React module để giảm coupling khi deploy.\",\"\u003cstrong\u003eFeature-flag rollout\u003c/strong\u003e theo tenant, segment, environment và percentage.\",\"\u003cstrong\u003eObservability workflow\u003c/strong\u003e cho feature adoption, regression tracing và anomaly review.\",\"\u003cstrong\u003eRollback criteria và release checklist\u003c/strong\u003e để delivery vẫn có kiểm soát khi áp lực cao.\"]},{\"title\":\"Hệ thống cho team\",\"items\":[\"\u003cstrong\u003eOwnership boundary\u003c/strong\u003e, org chart, competency matrix và workload routing sau giai đoạn chuyển giao leadership.\",\"\u003cstrong\u003eRFC, runbook, technical spec\u003c/strong\u003e và troubleshooting guide để giảm kiến thức ẩn.\",\"\u003cstrong\u003eHiring, onboarding, 1:1 coaching\u003c/strong\u003e và review loop cho developer và QC engineer.\",\"\u003cstrong\u003eBranch strategy, commit convention, release tagging\u003c/strong\u003e và integration rule giúp delivery dễ dự đoán hơn.\"]}]},\"principles\":{\"eyebrow\":\"Cách tôi làm việc\",\"title\":\"Nguyên tắc tôi mang vào hệ thống production\",\"intro\":\"Đây là các thói quen thực tế, không phải khẩu hiệu. Chúng đến từ việc nhìn thấy hệ thống lỗi theo những cách rất đời thường và học cách để lần release sau dễ hiểu hơn.\",\"items\":[{\"title\":\"Trace trước khi rewrite\",\"body\":\"Khi hệ thống hành xử lạ, tôi nhìn đường đi trước: request flow, data contract, log, metric, lịch sử release và thay đổi hạ tầng.\"},{\"title\":\"Contract trước số lượng code\",\"body\":\"Backend service dễ vận hành hơn khi API, retry, idempotency, security boundary và compatibility rule rõ ràng.\"},{\"title\":\"Rollout trước big-bang release\",\"body\":\"Feature flag, tenant targeting, staged deployment và rollback criteria giúp sản phẩm đi tiếp đều hơn mà không biến mỗi release thành một canh bạc.\"},{\"title\":\"Tài liệu phải giảm gián đoạn\",\"body\":\"Spec, runbook và checklist hữu ích khi chúng giúp một kỹ sư khác chẩn đoán, phục hồi hoặc tiếp tục công việc mà không phải chờ một người duy nhất.\"}]},\"closing\":{\"label\":\"Ghi chú kết About\",\"body\":\"Tôi hữu ích nhất ở những team nơi \u003cstrong\u003etham vọng sản phẩm\u003c/strong\u003e, \u003cstrong\u003eđộ phức tạp backend\u003c/strong\u003e và \u003cstrong\u003eđộ ổn định production\u003c/strong\u003e gặp nhau. Đó là nơi engineering cẩn thận biến hệ thống mơ hồ thành thứ team có thể ship, quan sát và cải tiến.\"}},\"ReaderTools\":{\"label\":\"Công cụ đọc\",\"scrollTop\":\"Lên đầu trang\",\"scrollBottom\":\"Xuống cuối trang\",\"font\":\"Đổi font đọc\",\"background\":\"Đổi nền đọc\",\"language\":\"Đổi ngôn ngữ\"}},\"now\":\"$undefined\",\"timeZone\":\"Asia/Saigon\",\"children\":[\"$L1f\",\"$L20\"]}]\n"])</script><script>self.__next_f.push([1,"21:I[34416,[\"/_next/static/chunks/3eb5526bf007241a.js\",\"/_next/static/chunks/76607804508f67af.js\",\"/_next/static/chunks/ef6dc99b3733f98f.js\",\"/_next/static/chunks/cd6b51a303fddcb4.js\",\"/_next/static/chunks/615749f3583e97a0.js\",\"/_next/static/chunks/adb371ef802f
