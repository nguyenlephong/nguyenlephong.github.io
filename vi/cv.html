"eyebrow\":\"Sẵn sàng cho vị trí senior / lead\",\"role\":\"Senior Software Engineer · Tech Lead\",\"roleSub\":\"Full-stack · Platform engineering · Quản lý vận hành\",\"bio\":\"Tôi thiết kế và vận hành các hệ thống end-to-end — từ ứng dụng front-end, dịch vụ backend, pipeline CI/CD, quy trình release đến hạ tầng production. Hiện tại đang dẫn dắt đội ngũ 11 người xây dựng nền tảng multi-tenant, các integration tài chính bảo mật và kiến trúc Micro-Frontend.\",\"location\":\"TP. Hồ Chí Minh, Việt Nam\",\"downloadResume\":\"Tải CV\",\"getInTouch\":\"Liên hệ ngay\",\"careerHighlights\":\"Điểm nổi bật sự nghiệp\",\"socialProfiles\":\"Mạng xã hội\",\"stats\":{\"yearsShipping\":\"Năm kinh nghiệm\",\"yearsShippingCaption\":\"Code production mỗi ngày\",\"hoursCoding\":\"Giờ coding\",\"hoursCodingCaption\":\"Đo bằng WakaTime từ 2021\",\"usersTouched\":\"Người dùng phục vụ\",\"usersTouchedCaption\":\"Zalo · CDP · fintech quy mô lớn\",\"engineersLed\":\"Kỹ sư đã dẫn dắt\",\"engineersLedCaption\":\"Dev · QC · liên phòng ban\",\"tenantsPowered\":\"Tenant đang vận hành\",\"tenantsPoweredCaption\":\"Hệ thống feature flag multi-tenant\",\"domainsDelivered\":\"Lĩnh vực đã làm\",\"domainsDeliveredCaption\":\"Fintech · CDP · BĐS · giáo dục\",\"projectsLaunched\":\"Dự án đã ra mắt\",\"projectsLaunchedCaption\":\"SDK · platform · ứng dụng di động\",\"testCasesAuthored\":\"Test case đã viết\",\"testCasesAuthoredCaption\":\"BDD · E2E · đảm bảo chống regression\"}},\"Sections\":{\"aboutEyebrow\":\"Hồ sơ\",\"aboutTitle\":\"Đôi nét về tôi và cách tôi làm việc\",\"experienceEyebrow\":\"Sự nghiệp\",\"experienceTitle\":\"Những nơi tôi đã làm\",\"projectsEyebrow\":\"Công việc\",\"projectsTitle\":\"Dự án tiêu biểu\"},\"Summary\":{\"intro1\":\"Cử nhân Công nghệ Thông tin (chuyên ngành phụ Kỹ thuật Phần mềm, \u003cb\u003eGPA 3.36\u003c/b\u003e) với gần \u003cb\u003e8 năm kinh nghiệm\u003c/b\u003e phát triển phần mềm full-stack, trong đó \u003cb\u003e3+ năm\u003c/b\u003e tham gia leadership kỹ thuật, ra quyết định kiến trúc và điều phối delivery liên đội.\",\"intro2\":\"Trực tiếp thiết kế, xây dựng và vận hành các hệ thống end-to-end — từ ứng dụng front-end, dịch vụ backend đến pipeline CI/CD, quy trình release và hạ tầng production — luôn ưu tiên tự động hoá, minh bạch vận hành và đảm bảo delivery ổn định.\",\"intro3\":\"\u003ci\u003eĐây là những kỹ năng cứng tôi tập trung trong những năm gần đây:\u003c/i\u003e\",\"visionEyebrow\":\"Cách tôi làm việc\",\"hardSkillsEyebrow\":\"Kỹ năng cứng\",\"pillars\":{\"endToEnd\":{\"title\":\"Kỹ sư end-to-end\",\"body\":\"Front-end, backend, CI/CD, release và hạ tầng production — một người chịu trách nhiệm toàn bộ vòng đời.\",\"chip\":\"FE · BE · Hạ tầng\"},\"multiTenant\":{\"title\":\"Nền tảng multi-tenant\",\"body\":\"Feature flag, RBAC, rollout theo phần trăm/segment, JSON-config values, đánh giá runtime stateless.\",\"chip\":\"30+ tenant đang chạy\"},\"leadership\":{\"title\":\"Lãnh đạo delivery\",\"body\":\"Dẫn dắt 11+ kỹ sư — tuyển dụng, thiết kế tổ chức, RFC, runbook, playbook rollout, coaching 1:1.\",\"chip\":\"Team 11 người\"},\"fintech\":{\"title\":\"Integration fintech bảo mật\",\"body\":\"RSA-4096 handshake, AES-256 payload, mTLS, certificate pinning, contract idempotent, retry queue.\",\"chip\":\"Gtel · Napas\"},\"mfe\":{\"title\":\"Micro-frontend \u0026 SDK\",\"body\":\"Angular host + module React để deploy độc lập. SDK JS dưới \u003c200KB, tải \u003c150ms.\",\"chip\":\"MFE · \u003c150ms\"},\"ai\":{\"title\":\"AI-first engineering\",\"body\":\"Xây dựng AI agent cho code review, hỗ trợ deploy, quota dịch vụ, giám sát API và phân tích release.\",\"chip\":\"Agent đang production\"}},\"skills\":{\"backend\":\"\u003cb\u003eBack-end\u003c/b\u003e: Kinh nghiệm vững với \u003cb\u003eNode.js\u003c/b\u003e, \u003cb\u003eJava (Spring)\u003c/b\u003e; thiết kế REST/GraphQL API với contract rõ ràng, cơ chế xác thực và mã hoá, tương thích ngược và độ bền cho integration enterprise và bên thứ ba.\",\"frontend\":\"\u003cb\u003eFront-end\u003c/b\u003e: Kinh nghiệm xây dựng và bảo trì các ứng dụng client phức tạp với \u003cb\u003eReact\u003c/b\u003e (TypeScript, Next.js), \u003cb\u003eReact Native\u003c/b\u003e và host Micro-Frontend trên Angular; áp dụng tối ưu hiệu năng, quản lý state và các pattern kiến trúc UI mở rộng được.\",\"databases\":\"\u003cb\u003eCơ sở dữ liệu\u003c/b\u003e: Kinh nghiệm thực tế sâu với \u003cb\u003eMySQL\u003c/b\u003e, tập trung vào thiết kế schema và data model, chiến lược index, tối ưu query, ranh giới transaction, lập kế hoạch migration và đánh đổi consistency trong hệ thống phân tán, throughput cao.\",\"infra\":\"\u003cb\u003eHạ tầng \u0026 Platform Engineering\u003c/b\u003e: Trực tiếp làm việc với \u003cb\u003eDocker\u003c/b\u003e và \u003cb\u003eKubernetes\u003c/b\u003e trên nhiều môi trường; vận hành cluster managed (\u003cb\u003eAKS\u003c/b\u003e, \u003cb\u003eEKS\u003c/b\u003e, \u003cb\u003eFKE\u003c/b\u003e, \u003cb\u003eK3S\u003c/b\u003e), deployment GitOps với \u003cb\u003eArgoCD\u003c/b\u003e, pipeline CI/CD, cấu hình môi trường và quản lý domain/SSL.\",\"architecture\":\"\u003cb\u003eKiến trúc \u0026 Delivery\u003c/b\u003e: Kinh nghiệm áp dụng kiến trúc Micro-Frontend và multi-tenant, rollout dựa trên feature flag, progressive delivery và observability để hỗ trợ release an toàn và chẩn đoán production.\",\"testing\":\"\u003cb\u003eTesting\u003c/b\u003e: Sử dụng thành thạo Jest, Cucumber, Puppeteer và Testing Library để đảm bảo an toàn regression, tự tin khi release và sẵn sàng production cho dịch vụ và ứng dụng.\",\"libraries\":\"\u003cb\u003eThư viện\u003c/b\u003e: Thành thạo \u003cb\u003eFirebase\u003c/b\u003e, Strapi, Directus, React Flow, Webpack, \u003cb\u003eRedux\u003c/b\u003e, React Query và G2plot.\",\"other\":\"\u003cb\u003eKhác\u003c/b\u003e: Quen với kiến trúc \u003cb\u003eMicro-frontend\u003c/b\u003e, Responsive Design, Cross-Browser Compatibility, \u003cb\u003eSEO\u003c/b\u003e, GraphQL và Electron.\"}},\"Experience\":{\"labels\":{\"location\":\"Địa điểm\",\"duration\":\"Thời gian\",\"keyContributions\":\"Đóng góp chính\",\"keyTechnologies\":\"Công nghệ chính\"},\"ndsvn\":{\"summary\":\"Nhận trách nhiệm về delivery sản phẩm và định hướng kỹ thuật sau khi CTO chuyển giao, dẫn dắt các quyết định kiến trúc, hệ thống rollout, integration enterprise-grade và phối hợp liên đội — quản lý đội delivery gồm 8 developer (4 senior) và 3 QC engineer.\",\"contributions\":[\"Thiết kế hệ thống feature flag multi-tenant trên .NET Core \u003cb\u003e(30+ tenant, ~40k người dùng)\u003c/b\u003e với rule engine ưu tiên, rollout theo phần trăm (tenant/segment/env), JSON-config values và đánh giá runtime stateless — cung cấp cho ứng dụng mobile/web và cho phép release production tiến triển có kiểm soát trên các tenant lưu lượng cao.\",\"Xây dựng integration bảo mật với \u003cb\u003eGtel \u0026 Napas\u003c/b\u003e: handshake RSA-4096, mã hoá payload AES-256, xác thực hai chiều \u003cb\u003emTLS\u003c/b\u003e, certificate pinning, retry queue, contract API idempotent và giám sát theo ACK cho dịch vụ bên thứ ba không ổn định.\",\"Triển khai kiến trúc \u003cb\u003eMicro-Frontend\u003c/b\u003e (Angular host + module React) cho phép chu kỳ deploy độc lập và cô lập feature — giảm bề mặt regression và sự phụ thuộc deployment giữa các đội.\",\"Giới thiệu observability stack (PostHog + pipeline metric + workflow) cho tác động rollout, mức độ áp dụng feature, phát hiện anomaly và truy vết regression — cắt giảm đáng kể thời gian debug/phân tích qua các chu kỳ release.\",\"Nhận trách nhiệm về hạ tầng kế thừa và giữ cho tổ chức vận hành — âm thầm xử lý các sự cố production, lỗi pipeline, các vấn đề cluster và bất ổn integration để sản phẩm và đội không bị đình trệ; định hình ArgoCD, CI/CD, domain/SSL và các cluster \u003cb\u003eAKS/FKE/K3S/EKS\u003c/b\u003e thành hệ thống \u003cb\u003echẩn đoán được, phục hồi được và ổn định thay vì các ẩn số lặp lại\u003c/b\u003e.\",\"Xây dựng \u003cb\u003eAI agent\u003c/b\u003e hỗ trợ code review, deployment assistant, kiểm tra service-quota, giám sát API và phân tích release; rút ngắn vòng lặp ra quyết định \u0026 delivery cho các đội sản phẩm.\",\"Phát triển integration simulation và module sandbox/demo để xử lý đối tác không ổn định và đảm bảo validation pre-contract với hệ sinh thái bên thứ ba.\",\"\u003cb\u003eTái cấu trúc tổ chức kỹ thuật\u003c/b\u003e sau khi leadership chuyển giao: xác định org chart, ma trận năng lực, định tuyến công việc và ranh giới ownership — mở khoá tự chủ và giảm lead-time cho quyết định kỹ thuật.\",\"Xây dựng engineering playbook thống nhất: chiến lược branch, convention commit, tagging release, tiêu chí rollout, quy tắc API/integration và kho technical spec (RFC, runbook, troubleshooting guide).\",\"Dẫn dắt vòng tuyển dụng và phát triển năng lực: phỏng vấn có cấu trúc (QC/Fullstack), lộ trình onboarding, coaching 1:1, chu kỳ performance review và giải quyết xung đột liên đội để giữ delivery cộng tác và tập trung kết quả.\",\"Duy trì chất lượng delivery thông qua văn hoá documentation-first và process guardrail (checklist, quy tắc handover, sẵn sàng rollback), đảm bảo nhịp release ổn định trong giai đoạn scale.\"]},\"zalo\":{\"summary1\":\"Core developer của ứng dụng đa nền tảng \u003cb\u003eZalo PC\u003c/b\u003e (Web, macOS, Windows), phục vụ \u003cb\u003e15M+ MAU\u003c/b\u003e. Đã ra mắt các tính năng then chốt như dark mode, dynamic theming và theo dõi hành vi người dùng. Dẫn dắt phát triển promotion flow và một \u003cb\u003edesign system\u003c/b\u003e mở rộng được cho \u003cb\u003e50+ developer\u003c/b\u003e. Tối ưu hiệu năng, nâng cao khả năng bảo trì và đóng góp vào tăng trưởng kinh doanh qua các giải pháp bền vững, hiệu quả.\",\"summary2\":\"Chủ động bảo trì và cải thiện ứng dụng mobile \u003cb\u003eZalo Android\u003c/b\u003e, đảm bảo \u003cb\u003esự ổn định\u003c/b\u003e và \u003cb\u003ehiệu năng\u003c/b\u003e của các tính năng quan trọng cho gần \u003cb\u003e80 triệu người dùng\u003c/b\u003e.\",\"contributions\":[\"Ra mắt hơn \u003cb\u003e10 tính năng\u003c/b\u003e, gồm dark mode, module download, kiki bot, log tracking và nhiều tính năng khác, cải thiện UX và mức độ tương tác.\",\"Phát triển \u003cb\u003epromotion flow\u003c/b\u003e tích hợp hệ thống tracking và monitoring, thúc đẩy thành công activation trên \u003cb\u003e15M+ MAU\u003c/b\u003e.\",\"Dẫn dắt phát triển \u003cb\u003edesign system\u003c/b\u003e mở rộng được bằng Storybook, đảm bảo nhất quán UI và hiệu quả cho \u003cb\u003e50+ developer\u003c/b\u003e.\",\"Chủ động hỗ trợ \u003cb\u003e50+ client user\u003c/b\u003e, xử lý vấn đề nhanh chóng với \u003cb\u003esự tận tâm\u003c/b\u003e và \u003cb\u003egiải quyết vấn đề hiệu quả\u003c/b\u003e, nhận được phản hồi tích cực mạnh mẽ.\",\"Bảo trì và cải thiện \u003cb\u003e3+\u003c/b\u003e tính năng trong ứng dụng \u003cb\u003eZalo Android\u003c/b\u003e, tập trung vào \u003cb\u003esự ổn định\u003c/b\u003e, \u003cb\u003ehiệu năng\u003c/b\u003e và trải nghiệm liền mạch cho gần \u003cb\u003e80 triệu người dùng\u003c/b\u003e.\"]},\"primedata\":{\"summary\":\"Công ty xây dựng sản phẩm gọi là CDxP. Tóm lại, đây là nền tảng dữ liệu được thiết kế riêng để host và xử lý customer profile (giải pháp cốt lõi là làm sao có thể nhận diện và hợp nhất dữ liệu khách hàng từ các schema và format không đồng nhất đến từ nhiều dịch vụ và hệ thống khác nhau).\",\"contributions\":[\"Dẫn dắt đội Front-end, ra mắt \u003cb\u003e10+ dự án\u003c/b\u003e gồm ứng dụng CDxP, demo Magento \u0026 WordPress, JS SDK, mobile SDK và nhiều hơn nữa.\",\"Quản lý đội \u003cb\u003e4 thành viên\u003c/b\u003e, đồng bộ với product roadmap để đáp ứng nhiều đối tác lớn, nâng cao UI/UX và triển khai các tính năng nâng cao như 360 profile và campaign builder.\",\"Phát triển JS SDK nhẹ với đầy đủ chức năng (\u003cb\u003e\u003c200kb, \u003c150ms\u003c/b\u003e thời gian tải), hỗ trợ tích hợp liền mạch qua nhiều dự án.\",\"Thể hiện khả năng \u003cb\u003egiải quyết vấn đề\u003c/b\u003e nhanh, đảm bảo demo tính năng tức thì để gây ấn tượng với khách hàng và nhà đầu tư.\"]},\"splus\":{\"summary\":\"Công ty out-sourcing. Hầu hết dự án xoay quanh \u003cb\u003eứng dụng mobile và web\u003c/b\u003e.\",\"contributions\":[\"Với chuyên môn về \u003cb\u003equy trình sản xuất phần mềm end-to-end\u003c/b\u003e, tôi đã \u003cb\u003edẫn dắt một đội nhỏ\u003c/b\u003e, làm chủ các giai đoạn từ thu thập yêu cầu đến bảo mật dự án, đặt nền tảng cho các vai trò leadership sau này.\",\"Tham gia \u003cb\u003e8+\u003c/b\u003e dự án đa dạng thuộc các lĩnh vực \u003cb\u003egiáo dục, F\u0026B, ngân hàng\u003c/b\u003e và \u003cb\u003ethương mại điện tử\u003c/b\u003e, tôi đã thu được những hiểu biết quý giá về phát triển ứng dụng web lẫn mobile.\",\"Với vai trò project mercenary, tôi đã giành được các dự án quan trọng như Savyu và Bank Tool, tạo ra hơn \u003cb\u003e$20,000\u003c/b\u003e doanh thu và được công nhận là \u003cb\u003eBest Rookie of the Year\u003c/b\u003e nhờ những đóng góp ấn tượng.\"]},\"propman\":{\"summary\":\"Startup trong \u003cb\u003elĩnh vực bất động sản\u003c/b\u003e. Tôi là một trong những kỹ sư sáng lập.\",\"contributions\":[\"Bắt đầu tham gia phát triển web app chính với vai trò Front-end Developer. Đạt được các kỹ năng phát triển web nền tảng, chuyên sâu \u003cb\u003eReact JS\u003c/b\u003e và các công nghệ liên quan. Cộng tác trong các dự án responsive design, ưu tiên nâng cao trải nghiệm người dùng.\"]}},\"Projects\":{\"sat\":{\"accomplishments\":[\"Điều phối phát triển sản phẩm bao gồm thiết kế UI/UX, kỹ thuật sản phẩm và phân tích hành vi người dùng, mang lại tệp người dùng toàn cầu vượt \u003cb\u003e10,000\u003c/b\u003e lượt truy cập và \u003cb\u003e3,000\u003c/b\u003e đăng ký trong vòng hai tháng.\",\"Nâng cao thứ hạng tìm kiếm Google qua các sáng kiến SEO chiến lược, gồm thành thạo kỹ thuật \u003cb\u003eparasite SEO\u003c/b\u003e. Các nỗ lực này tạo nên cải thiện hiệu năng đáng kể và định vị sản phẩm hiệu quả ngang hàng với đối thủ trong ngành.\",\"Thể hiện sự hiệu quả và tối ưu tài nguyên trong phát triển ứng dụng front-end bằng cách tận dụng một Cloud Run instance duy nhất với \u003cb\u003e1 CPU\u003c/b\u003e và giới hạn memory \u003cb\u003e256 MiB\u003c/b\u003e.\",\"Dẫn dắt phát triển ứng dụng mobile với cách tiếp cận \u003cb\u003emobile-first\u003c/b\u003e, cho phép triển khai nhanh lên app store trong vòng \u003cb\u003ehai ngày\u003c/b\u003e. Đồng thời đảm bảo cài đặt \u003cb\u003ePWA\u003c/b\u003e liền mạch trên mọi thiết bị, nâng cao khả năng tiếp cận và trải nghiệm người dùng.\",\"Phát triển \u003cb\u003etính năng monetization\u003c/b\u003e, gồm tích hợp \u003cb\u003eGoogle Ads\u003c/b\u003e và triển khai luồng thanh toán \u003cb\u003eStripe\u003c/b\u003e, để gia tăng doanh thu.\"]},\"cdp\":{\"accomplishments\":[\"Dẫn dắt kiến trúc và triển khai dự án CDxP, tập trung vào các tính năng \u003cb\u003eUI/UX\u003c/b\u003e, qua đó nâng cao trải nghiệm tổng thể và gia tăng mức độ tương tác.\",\"Cấu hình nested router, duy trì cấu trúc dự án \u003cb\u003escalable\u003c/b\u003e và thể hiện kiến thức vững về ES6, Typescript và data type, \u003cb\u003ecải thiện khả năng bảo trì code\u003c/b\u003e và giảm các vấn đề liên quan đến code.\",\"\u003cb\u003eTheo dõi lỗi\u003c/b\u003e hiệu quả và các cải tiến, hỗ trợ fix bug đảm bảo \u003cb\u003esự ổn định\u003c/b\u003e của dự án, qua đó nâng cao độ tin cậy hệ thống và giảm downtime.\",\"Triển khai hook \u003cb\u003eRBAC\u003c/b\u003e để xác thực phân quyền truy cập component trong các cấu hình client adaptive. Thêm vào đó, đã xây dựng hơn \u003cb\u003e20 tính năng tiện ích tái sử dụng\u003c/b\u003e có thể dùng chung qua nhiều dự án nhờ thiết kế modular.\",\"Phát triển \u003cb\u003e10+ tính năng nâng cao\u003c/b\u003e như profile, campaign, analytics và nhiều hơn.\",\"Xây dựng quy trình testing vững chắc, bao phủ các tính năng cốt lõi của CDP với \u003cb\u003e100+ kịch bản\u003c/b\u003e và \u003cb\u003e1000+ test case\u003c/b\u003e.\",\"Tích luỹ chuyên môn lĩnh vực và xuất sắc trong các phương pháp testing, gồm BDD, unit testing và \u003cb\u003eE2E testing\u003c/b\u003e, qua đó cải thiện độ phủ test và giảm bug phần mềm \u003cb\u003e30%\u003c/b\u003e.\",\"Phát triển \u003cb\u003efeature flag\u003c/b\u003e cho toggling runtime, cho phép A/B testing và phân nhóm tính năng theo phân khúc khách hàng, tối ưu việc giao tính năng và tăng mức độ áp dụng.\",\"\u003cb\u003eDocument hoá\u003c/b\u003e các component rõ ràng và dễ bảo trì, nâng cao khả năng đọc code và giảm thời gian bảo trì.\"]},\"sdk\":{\"accomplishments\":[\"Phát triển thành công hơn \u003cb\u003e5 module\u003c/b\u003e, tích hợp hơn \u003cb\u003e10 tính năng nâng cao\u003c/b\u003e bằng \u003cb\u003evanilla JS\u003c/b\u003e. Đạt bundle size ấn tượng \u003cb\u003e\u003c200kb và thời gian tải \u003c150ms\u003c/b\u003e (số liệu đo trước khi áp dụng toàn bộ kỹ thuật tối ưu bundle).\",\"Sử dụng \u003cb\u003eweb worker và service worker\u003c/b\u003e để hỗ trợ multitasking ở nền, quản lý hiệu quả các chức năng phức tạp và xử lý \u003cb\u003enhiều edge case\u003c/b\u003e như sử dụng đa tab đồng thời.\",\"Đồng thời thiết kế và triển khai \u003cb\u003etính năng recommendation cá nhân hoá\u003c/b\u003e bằng kiến trúc \u003cb\u003emicro-frontend\u003c/b\u003e, cụ thể là một carousel block hiển thị sản phẩm người dùng có thể thích, qua đó nâng cao trải nghiệm và tương tác.\",\"Trong các tính năng nâng cao đã xây dựng có web pop-up, web push notification, \u003cb\u003enhúng web component\u003c/b\u003e, tích hợp WebSocket và quản lý pop-up gây phiền nhiễu trên nhiều tab.\",\"Hơn nữa, tận dụng \u003cb\u003eJS Closure\u003c/b\u003e để tổ chức cấu trúc module, cho phép export tính năng liền mạch hoặc \u003cb\u003eđóng gói dữ liệu\u003c/b\u003e, qua đó \u003cb\u003etránh xung đột\u003c/b\u003e trong global scope.\"]},\"vac\":{\"accomplishments\":[\"Đảm nhận trách nhiệm \u003cb\u003egiảng dạy\u003c/b\u003e khoá học \u003cb\u003eFront-end Project\u003c/b\u003e tại Vietnam Australia Center.\",\"Thiết kế và truyền tải các \u003cb\u003ebài giảng hấp dẫn\u003c/b\u003e, hướng dẫn thực hành cho sinh viên về các dự án phát triển front-end.\",\"Tập trung nuôi dưỡng môi trường học tập \u003cb\u003ecộng tác\u003c/b\u003e, khuyến khích \u003cb\u003elàm việc nhóm\u003c/b\u003e cho \u003cb\u003e12 sinh viên\u003c/b\u003e và đồng bộ chương trình với best practice ngành.\",\"Cung cấp \u003cb\u003ephản hồi\u003c/b\u003e và \u003cb\u003ementoring\u003c/b\u003e cá nhân hoá, hỗ trợ sinh viên \u003cb\u003evượt qua thử thách\u003c/b\u003e và đảm bảo nắm vững toàn bộ nội dung khoá học.\"]},\"mona\":{\"accomplishments\":[\"Phát triển ứng dụng mobile toàn diện, Mona House, bằng \u003cb\u003eReact Native\u003c/b\u003e và Realm DB cho việc quản lý nhà ở hiệu quả.\",\"Chuyên về tạo ứng dụng cross-platform với trọng tâm \u003cb\u003ecomponent tái sử dụng\u003c/b\u003e, animation mượt và tích hợp liền mạch với module native.\",\"Thể hiện kỹ năng \u003cb\u003egiải quyết vấn đề\u003c/b\u003e và \u003cb\u003etroubleshooting\u003c/b\u003e mạnh, nhanh chóng xác định và xử lý các vấn đề phức tạp qua công cụ debug nâng cao và profiling hiệu năng.\",\"Thể hiện \u003cb\u003ekhả năng thích ứng\u003c/b\u003e và \u003cb\u003eđường cong học nhanh\u003c/b\u003e với công nghệ mới, cho phép triển khai liền mạch framework, ngôn ngữ lập trình hay công cụ mới để đảm bảo hoàn thành dự án.\"]},\"mobivi\":{\"accomplishments\":[\"Phát triển \u003cb\u003eứng dụng web full-stack\u003c/b\u003e tại Mobivi, tập trung vào ingest và xử lý dữ liệu trên \u003cb\u003e20 file Excel\u003c/b\u003e, mỗi file chứa hơn \u003cb\u003e20,000 bản ghi\u003c/b\u003e.\",\"Ứng dụng được thiết kế để xử lý hiệu quả dữ liệu giao dịch được tính toán tăng dần từ người dùng, \u003cb\u003eđảm bảo báo cáo chính xác và đáng tin cậy\u003c/b\u003e.\"]},\"savyu\":{\"accomplishments\":[\"Đóng vai trò then chốt trong phát triển \u003cb\u003ehai ứng dụng mobile\u003c/b\u003e tại Synova - một cho merchant và một cho người tiêu dùng.\",\"Đóng góp vào tạo ra \u003cb\u003eứng dụng web\u003c/b\u003e giúp quản trị viên quản lý dữ liệu người dùng hiệu quả.\",\"Thể hiện \u003cb\u003ethành thạo phát triển ứng dụng mobile\u003c/b\u003e, cộng tác với các đội liên chức năng để đảm bảo delivery thành công các ứng dụng \u003cb\u003etrực quan\u003c/b\u003e và \u003cb\u003ehiệu năng cao\u003c/b\u003e.\"]}},\"CTA\":{\"eyebrow\":\"Cùng xây điều gì đó\",\"title\":\"Có vấn đề khó đáng để ship không?\",\"body\":\"Tôi hữu ích nhất khi sản phẩm đang scale nhanh, đội cần sự rõ ràng và hạ tầng phải hoạt động ổn dưới tải. Liên hệ ngay — tôi đọc mọi tin nhắn.\",\"emailMe\":\"Gửi email\",\"resumePdf\":\"CV (PDF)\",\"linkedin\":\"LinkedIn\"},\"SEO\":{\"home\":{\"title\":\"Nguyễn Lê Phong — Senior Software Engineer \u0026 Tech Lead\",\"description\":\"Senior Software Engineer \u0026 Head of Tech với 8+ năm xây dựng sản phẩm, dẫn dắt delivery và kiến trúc hệ thống Micro-Frontend, Kubernetes và rollout. Cử nhân CNTT — loại Giỏi (GPA 3.36).\"}},\"Pages\":{\"cv\":{\"title\":\"Software Engineer\"},\"about\":{\"heading\":\"Về tôi\"},\"apps\":{\"heading\":\"Ứng dụng\"},\"gallery\":{\"eyebrow\":\"Bộ sưu tập\",\"title\":\"Dấu ấn công việc\",\"sub\":\"Chứng chỉ, giải thưởng, dự án và vài khoảnh khắc đời thường. Bấm vào ảnh để xem bản gốc hoặc link xác thực.\",\"back\":\"← Quay lại CV\",\"all\":\"Tất cả\",\"categories\":{\"certificates\":\"Chứng chỉ\",\"awards\":\"Giải thưởng\",\"projects\":\"Dự án\",\"activities\":\"Hoạt động\"}},\"thoughts\":{\"eyebrow\":\"Vườn ý nghĩ\",\"title\":\"Suy nghĩ\",\"intro\":\"Một mảnh vườn nhỏ chứa các ghi chú đang lớn dần. Bấm vào bất kỳ tựa nào để đọc thêm.\",\"empty\":\"Chưa có suy nghĩ nào.\",\"backToIndex\":\"Về danh sách\",\"backlinks\":\"Liên kết ngược\",\"maturity\":{\"seed\":\"Mầm\",\"budding\":\"Nẩy mầm\",\"evergreen\":\"Trưởng thành\"},\"credit\":\"Lấy cảm hứng và hiện đang phản chiếu ý nghĩ từ \u003clink\u003ehuylenq.github.io\u003c/link\u003e. Các ghi chú thuộc về anh ấy; bản mirror này riêng tư và có ghi nguồn.\",\"viewGraph\":\"Đồ thị\",\"
